絆監骨下腰下季脅本夾脊腎之募帶脈章門下寸八五樞章下寸八貫五樞去帶脈三寸季脅下四寸八分維道章下五寸三居髎章下八寸三章門緣是肝經穴下脘之旁九寸含環跳髀樞宛宛中髀樞中側臥屈上足伸下足以右手摸穴左搖撼取之屈上伸下取穴同風市垂手中指盡膝上五寸中瀆逢陽關陽陵上三寸陽陵膝下一寸從陽交外踝上七寸外邱踝上六寸容踝上五寸光明穴踝上四寸陽輔通踝上三寸懸鐘在丘墟踝前之陷中此去俠溪四寸五卻是膽經原穴功臨泣俠溪後寸半五會去溪一寸窮夾溪在岐骨內竅陰四五二指中計四十三穴左右共八十六穴十二足厥陰肝經穴圖及歌括肝經諸穴歌足厥陰一十三穴終起大敦於行間循太衝於中封蠡溝中都之會膝關曲泉之宮襲陰包於五里陰廉乃發尋羊矢於章門期門可攻肝經穴分寸歌足大指端名大敦內廁為隱白外側為大敦行間大指縫中存太衝本節後二寸跟前一寸號中封足內踝骨一寸筋里宛宛中蠡溝踝上五寸是內踝骨前上五寸中都踝後七寸中內踝上七䯒骨中膝關犢鼻下二寸曲泉曲膝盡橫紋陰包膝上方四寸股內廉兩筋間蜷足取之看膝內側必有槽中氣衝三寸下五里氣衝下三寸陰股中動脈應手陰廉衝下有二寸羊矢衝下一寸許氣衝卻是胃經穴鼠鼷之上一寸主鼠鼷橫骨端盡處相去中行四寸止章門下脘旁九寸肘尖盡處側臥取期門又在巨闕旁四寸五分無差矣七奇經八脈孔穴圖說及歌括一奇經八脈總說凡人一身有經脈絡脈直行曰經旁支曰絡經凡十二手之三陰三陽足之三陰三陽是也絡凡十五乃十二經各有一別絡而脾又有一大絡並任督二絡為十五絡也難經作陰絡陽絡共二十七氣相隨上下如泉之流如日月之行不得休息故陰脈營於五臟陽脈營於六腑陰陽相貫如環無端莫知其紀終而復始其流溢之氣入於奇經轉相灌溉內溫臟腑外濡腠理奇經凡八脈不拘制於十二正經無表裡配合故謂之奇蓋正經猶夫溝渠奇經猶夫湖澤正經之脈隆盛則溢於奇經故秦越人比之天雨降下溝渠溢滿滂霈妄行流於湖澤此發靈素未發之祕者也八脈散在群書者略而不悉醫不知此罔探病機仙不知此難安爐鼎茲參考諸說以備學仙學醫者筌蹄之用云二奇經八脈總歌正經經外是奇經八脈分司各有名任脈在前督屬後衝起會陰腎同行陽蹺跟外膀胱別陰起跟前隨少陰陽維維絡諸陽脈陰維維絡在諸陰帶脈圍腰如束帶不由常度號奇經脈有奇常十二經者常脈也奇經則不拘於常故謂之奇也奇經有八曰任督沖帶陽蹺陰蹺陽維陰維是也任脈起於會陰循腹而行於身之前為陰脈之承任故曰陰脈之海督脈起於會陰循背而行於身之後為陽脈之總督故曰陽脈之海衝脈起於會陰夾臍而行直衝於上為諸脈之衝要故曰十二經脈之海帶脈則橫圍於腰狀如束帶所以總約諸脈也陽蹺起於跟中循外踝上行於身之左右陰蹺起於跟中循內踝上行於身之左右所以使機關之蹺捷也陽維起於諸陽之會由外踝而上行於衛分陰維起於諸陰之交由內踝而上行於營分所以為一身之綱維也是故任沖主身前之陰督主身後之陽以南北言也帶脈橫束諸脈以六合言也陽蹺主一身左右之陽陰蹺主一身左右之陰以東西言也陽維主一身之表陰維主一身之裡以乾坤言也是故醫而知乎八脈則十二經十五絡之大旨得矣仙而知乎八脈則龍虎升降玄牝幽微之竅妙得矣三任脈穴圖四任脈穴歌經脈之循於身以前身以後者憑任督二脈以分上下左右任脈二十四穴行腹興胸會陰始兮曲骨從中極關元石門通氣海陰交會神闕水分逢下脘建里兮中脘上脘巨闕鳩尾兮中庭膻中玉堂上紫宮華蓋璇璣上天突之宮飲彼廉泉承漿味融任脈穴分寸歌任脈會陰兩陰間曲骨毛際陷中安中極臍下四寸取關元臍下三寸連臍下二寸石門穴臍下寸半氣海全臍下一寸陰交穴臍之中央號神闕臍上一寸為水分臍上二寸下脘列臍上三寸名建里中脘臍上四寸許臍上五寸上脘在巨闕臍上六寸五鳩尾蔽骨下五分中庭膻中寸六取膻中卻在兩乳間膻上寸六玉堂主膻上紫宮三寸二膻上華蓋四八舉四寸八分膻上璇璣五寸八璣上一寸天突起天突喉下約四寸廉泉頜下骨尖已承漿頤前唇稜下任脈中央行腹裡行腹中央共二十四穴五督脈穴圖六督脈穴歌督脈在背之中行二十七穴始長強舞腰俞兮歌陽關入命門兮懸樞當脊中筋縮造至陽靈臺神道身柱詳陶道大椎至啞門風府腦戶強間分後頂百會兮前頂囟會上星兮神庭素髎至水溝於鼻下兌端交斷交於內唇督脈穴分寸歌督脈齦交唇內鄉兌端正在唇端央水溝鼻下溝中索素髎宜向鼻端詳頭形北高面南下先以前後髮際量分為一尺有二寸發上五分神庭當發上一寸上星位發上二寸囟會良前頂發上三寸半百會發上五寸央在頂中央旋毛中兩耳尖上可容爪甲性理北溪陳氏曰略近些北猶天之極星居北夫言一尺有二而其數止一尺一寸者何也蓋前後髮際無穴而必以前後髮際量起則有一寸在也會後寸半即後頂會後三寸強間明會後腦戶四寸半後發入寸風府行項後髮際入一寸大筋內宛宛中疾言其肉立起言休立止即百會後五寸半也發上五分啞門在後髮際上五分項中央宛宛中仰頭取之入系舌本神庭至此十穴真自此項骨下脊骶分為二十有四椎大椎上有項骨在約有三椎莫算之尾有長強亦不算中間草一可排椎大椎大骨為第一二椎節後陶道知第三椎間身柱在第五神道不須疑第六靈臺至陽七第九身內筋縮思十一脊中之穴在十二懸樞之穴奇十四命門腎俞並十六陽關自可知二十一椎即腰俞脊尾骨端長短隨共二十七穴七衝脈穴圖八衝脈穴歌衝脈俠臍起橫骨太氣四注肓俞同商石陰通幽門穴至胸散布仍流行衝脈穴分寸見足少陰腎經九陽蹺脈穴圖十陽蹺脈穴歌陽蹺穴起申僕陽居髎肩髃巨骨鄉臑俞地倉巨髎泣終於睛明一穴強陽蹺脈分寸歌陽蹺脈起足大陽申脈外踝五分藏僕參後繞跟骨下附陽外踝三寸鄉居髎監骨上陷取肩髃一穴肩尖當肩上上行名巨骨肩胛之上臑俞坊口吻旁四地倉位鼻旁八分巨髎疆目下七分是承泣目內眥出睛明昂蹺者足也奇經涉於足者之名也曰陽者以其所行陽經也陽蹺者謂足太陽經之別脈也起於足太陽膀胱經足外踝下五分陷中申脈穴繞後跟骨下僕參穴又前斜足外踝上三寸附陽穴又與足少陽會於季脅軟骨端下八寸三分居髎穴又與手陽明會於膊骨頭肩端上肩髃穴又上行肩尖上兩叉骨巨骨穴又與手足太陽陽維會於肩後大骨下胛上廉臑俞穴又與手足陽明會夾口吻旁四分地倉穴行於鼻孔旁八分巨髎穴又與任脈足陽明會於目下七分承泣穴又與手足太陽足陽明陰蹺會於目內眥外一分睛明穴也十一陰蹺脈穴圖十二陰蹺脈穴歌陰蹺起於然骨後上行照海交信列二穴原本足少陰足之太陽睛明接陰蹺脈分寸歌陰蹺穴起足少陰足內踝前然骨後踝下一寸照海真踝上二寸交信列陰蹺者以其所行陰經為足少陰之別脈也起於腎經足內踝前大骨下陷中然骨後上循內踝之下一寸照海穴又循太溪郤於足內踝之上二寸直行交信穴從交信上循至目內眥合於太陽陽蹺上行氣並相還則為濡目之用矣此陰蹺循行之經穴也考正陰蹺穴道靈樞脈度篇曰蹺脈者少陰之別脈起於然谷之後上內踝之上直上入鳩屬目內眥合於太陽陽蹺而上行非謂起於然谷穴而終於睛明穴也而李時珍乃謂起於然谷穴終於睛明穴張介賓類經亦紀然谷交信照海睛明四穴金鑑孚而合之獨針灸大成只有照海交信二穴左右凡四穴豫甚駭然悉難為則沉思細考圖經交信為陰蹺之郤照海乃陰蹺所生然谷無生郤會之語而睛明穴下氣府論注曰手足太陽陽明陽蹺五脈之會並無陰蹺會屬之文無他時珍先生之謂起於然谷穴者是誤看後字也終於睛明穴者是誤看屬目內眥合於太陽之合字也介賓先生之紀四穴者是著書之繁冗失細諦之思也何者陰蹺之穴紀四而蹺脈分男女注內按有云陰蹺為少陰之別脈起於照海穴由此觀之矛盾不期而見之也二先生者俱為後學之指南而著作猶有差失籲著作之難不誠然哉豫不揣遵圖經之交信照海為陰蹺之郤會者而繪紀之不知有小補於陰蹺之當否十三陽維脈穴圖外關三焦經穴在掌背去腕二寸骨縫兩筋陷中伏手取之主風寒經絡皮肢病與臨泣主客相應凡治必先取外關而刺之十四陽維脈穴歌陽維脈起穴金門陽交日月臑俞經臂臑肩井天髎過風池腦空接承靈正營目窗並臨泣陽白仍還循本神風府啞門會督脈左右三十四穴成陽維脈分寸歌陽維穴起足太陽外踝一寸金門藏踝上七寸陽交郤肋端日月會少陽肩後胛上尋臑俞臂臑肘上七寸當肩上陷中肩井地天髎穴在缺盆鄉耳後陷中風池會枕骨之下腦空彰腦前寸五承靈市靈前一寸正營場目窗只隔正一寸入發五分臨泣詳陽白眉端一寸度本神入發四分量項後啞門入髮際入發一寸風府疆考正陽維穴道粵稽陽維穴道類經凡十三穴則無日月臂臑承靈目窗四穴李時珍左右凡三十二穴有居髎臑會而無日月風府啞門三穴又考針灸大成穴凡三十四有臑會而無臂臑合諸家稽之圖經穴道無陽維之會郤者去之有陽維之會郤者紀之實得一十七穴左右亦成三十四矣今遵圖經穴屬逐一而縷明之金門穴足太陽之郤陽維別屬也起足外踝下一寸行於足少陽經之足外踝上七寸陽蹺穴乃陽維之郤也三肋端橫之日月穴足太陰少陽陽維之會又與手足太陽及蹺脈會於肩後大骨下胛骨上廉臑俞穴也肘上七寸之臂臑是手足太陽陽維之會又會於肩上陷中肩井穴缺盆中上毖骨際之天髎穴乃手足少陽陽維之會也耳後陷中之風池枕骨下之腦空腦前寸五之承靈靈前一寸之正營隔營一寸之目窗眉上一寸之陽白入發四分之本神俱屬少陽陽維之會足太陽少陽陽維三脈之會者入發五分之臨泣穴也項後入發之啞門入發一寸之風府二穴者系督脈陽維之會也約上諸穴實陽維之左右三十四穴也晰明於此求正後之賢者十五陰維脈穴圖內關心包經穴去掌二寸兩筋間緊握拳取之主心膽脾胃之病與公子小主客相應凡治必先取內關而刺之十六陰維脈穴歌陰維之穴起築賓府舍大橫腹哀循期門天突連舌本此是陰維脈維陰陰維脈分寸歌陰維脈起足少陰內踝之上尋築賓少腹之下稱府舍大橫平臍是穴名此穴去中三寸半行至乳下腹哀明期門直乳二肋縫天突結喉下一寸喉上中央舌本下穴名廉泉通腎津陰維起於諸陰之交者謂起於足少陰腎經之內踝後上腨分中築賓穴與足太陰交於少腹下去腹中行三寸半府舍穴又平臍去中行三寸半大橫穴又行至乳下二肋端縫之下二寸腹哀穴又與足厥陰交於乳下二肋端縫期門穴又與任脈交於結喉下一寸宛宛中天突穴從天突上行在頷下結喉上口中舌本下廉泉穴而終此陰維脈氣所發也十七帶脈穴圖臨泣二穴足少陽經穴少陽所注為腧主四肢頭項耳目齒咽諸病與外關主客相應凡治必先取臨泣而刺之十八帶脈穴歌帶起少陽帶脈穴繞行五樞維道間京門之下居髎上周回季脅束帶然帶脈穴分寸歌帶脈部分足少陽季脅寸八是其鄉由帶三寸五樞穴過章五三維道當帶脈穴在季脅下一寸八分從帶脈穴下三寸即五樞穴也從五樞下行過肝經之章門穴下五寸三分即維道穴也考正帶脈穴道帶脈之穴李時珍謂起於季脅之章門循帶脈又與足少陽會於五樞維道左右凡八穴張介賓類經謂脈氣所發在季脅下一寸八分穴名帶脈又與足少陽會於維道凡四穴金鑑與針灸大成均言帶脈五樞維道凡六穴考之圖經帶脈五樞維道三穴屬帶脈之會章門穴乃脾之募藏之會非帶脈之會也時珍穴之四介賓穴之二較之圖經俱有差失今遵圖經金鑑大成穴屬而縷繪之以質後之賢者八針法祕傳針法手法不傳之祕盡在此卷學者其盡心焉一注解標幽賦此賦自宋元以來即相傳不廢針灸法之全體大用包括無遺在針灸各歌各賦中最關重要各書中亦多載有此賦但文多不全且無注解於讀者甚為不便茲照古本録其全文並加詳注以供學者之探討拯救之法妙用者針察歲時於天道定形氣於豫心春夏瘦而刺淺秋冬肥而刺深不窮經絡陰陽多逢刺禁既論臟腑虛實須向經尋第一韻專論針刺之當謹慎不可造次須辨經絡陰陽臟腑虛實而行補瀉也原夫起自中焦水初下漏太陰為始至厥陰而方終穴出雲門抵期門而最後第二韻專明十二經脈常行之度一日一周自寅手太陰之脈穴出雲門為始至醜足厥陰之脈穴出期門為終周而復始相為循環與滴漏天度無差號曰鬥合人統也正經十二別絡走三百餘支十二經絡督任兩經貫串三百六十餘穴以同日度並諸絡十二經奇經八脈皇絡孫絡橫絡絲絡未盡取名然不過一晝夜脈行一萬三千五百息血行八百一十丈一周而已矣正側仰伏氣血有六百餘候背為陽行於陰俞腹為陰行於陽俞總三百六十餘穴左右協助合穴六百餘候手足三陽手走頭而頭走足手足三陰足走腹而胸走手手三陽從手走至頭足三陽從頭走至足足三陰從足走至腹手三陰從胸走至手難經所載明矣要識迎隨須明逆順順經絡而刺是謂補逆經絡而刺是謂瀉手法在人依經用度況乎陰陽氣血多少為最厥陰太陽少氣多血太陰少陰少血多氣而又氣多血少者少陽之分氣盛血多者陽明之位先詳多少之宜次察應至之氣氣血多少已注經絡不必重論輕滑慢而未來沉澀緊而已至指彈其穴穴下氣輕滑慢氣未至也勿刺待氣至方可刺也穴下氣來沉澀而急即可刺也既至也量寒熱而留疾未至者據虛實而候氣氣至也可留則留可速則速寒則留熱則速不可失時候氣未至或進或退或按或提等引氣至方可刺也氣之至也若魚吞鉤餌之浮沉氣至穴下若魚吞鉤若蟻奔走或浮或沉也氣未至也似閒處幽堂之深邃穴下氣不至若虛堂無人刺之無功不可刺也氣至速而效速氣至遲而不治氣之至也刺之即愈氣未至也如刺繡工徒勞人爾觀夫九針之法毫針最微七星可應衆穴主持古針有九名毫針按七星斡運璇璣最為常用本形金也有觸邪扶正之道金者剛健中正之性可以去邪扶持正氣也本形言針之為物短長水也有決凝開滯之機水有開山穿石之力以潤下為功針之短長深淺如水之用也定刺象木或斜或正針刺可曲可直可斜可正猶木之曲直也口藏比火進陽補羸口溫針熱補調榮衛毋令冷熱相傷猶火之能炎上也循機捫而可塞以象土實應五行而可知土可以塞水針可以塞病源是以象土也一針之用五行俱全然是一寸六分包含妙理雖然擬於毫髮同貫多歧恆所用者毫針也按黃帝銅人流注之法肘前膝下一寸六分止有八分為針柄是針二寸四分也按氣血經絡變化無方惟針所治可平五臟之寒熱能調六腑之虛實臟腑要分表裡虛實寒熱針法在斯矣拘攣閉塞遣八邪而去矣寒熱痛痹開四關而已之太乙移宮之日八風之邪主人寒熱頭痛若能開闢四關病可除也四關者兩手兩足刺之而已矣正所謂六十六穴之中也凡刺者使本神朝而後入既刺也使本神定而氣隨神不朝而勿刺神已定而可施神者脈也脈息見於穴下氣至可刺之脈息不至則不均不全則不定穴下氣分不可刺也至慎至慎定腳處取氣血為主意下手處認水土是根基先占口鼻呼吸勻者可刺水土者太溪衝陽也絶則勿刺焉天地人三才也湧泉同璇璣百會百會在頂應天主乎氣湧泉在足底應地主乎精璇璣在胸應人主乎神得之者生失之者亡應乎三才者也上中下三部也大包與天樞地機上中下三部謂之三要大包在腋下三寸主脾之大井相依乎手足四肢也上下左右前後內外交平而百病可治也陽蹺陽維並督帶主肩背腰腿在表之病陰蹺陰維任衝脈去心腹脅肋在裡之疑疑者疾也二陵二蹺二交似續而交五大兩間兩商兩井相依而別兩支二陵者陰陵泉陽陵泉也二蹺者陰蹺陽蹺也二交者陰交陽交也續接續也五大者五體也言此六穴遞相交接於兩手兩足並頭也兩間者二間三間也兩商者少商商陽也兩井者天井肩井也言六穴相依而分別於手之兩支也大抵取穴之法必有分寸先審字意次觀肉分或伸屈而得之或平直而安定在陽部筋骨之側陷下為真在陰分郤膕之間動脈相應取穴莫熟於分寸詳字意最緊手背足背脊背陽部分在兩筋之旁以指按陷下者是穴手心腳底肚腹陰之分在筋骨郤膕之間以指下動脈應之是穴也取五穴用一穴而必端取三經使一經而可正取五穴者謂如陽經用甲丙戊庚壬時取一時分井榮俞經合五穴既定然後取一穴得時刺之三經者假令膽經受病宜取肝經拘關又取脾經甲膽與己脾為奇耦三經只取一經余同此例頭部與肩部詳分督脈與任脈易定此言經絡須要精熟督脈任脈一陽一陰在明師手指不可造次明標與本論刺深刺淺之經住痛移疼取相交相貫之徑日法寅卯辰上為標申酉戌下為本巳午未上為標亥子醜下為本故知標病大本病輕淺也交貫之路謂陰交陽會走經走絡配合之處也皆可互標而刺之豈不聞臟腑病而求門海俞募之微門海出入之道俞募終始之處五臟各有俞募經絡滯而求原別交會之道陰俞陰謂之交陽原陽謂之會更窮四根三結依標本而刺無不痊靈樞云太陽根於至陰結於命門陽明根於厲兌結於顙大少陽根於竅陰結於窗籠太陰根於隱白結於太倉少陰根於湧泉結於廉泉厥陰根於大敦結於玉英此謂三結四根有足太陽根於至陰溜於京骨注於崑崙入於天柱飛揚也足少陽根於竅陰溜於丘墟注於陽輔入於天容光明也足陽明根於厲兌溜於衝陽注於下陵入於人迎豐隆也手太陽根於少澤溜於陽谷注於少海入於天窗支正也手少陽根於關衝溜於陽池注於支溝入於天牖外關也手陽明根於商陽溜於合谷注於陽溪入於扶突偏歷也手太陰根於少商溜於太淵注於列缺入於迎香手少陰根於少衝溜於神門注於通里入於極泉手厥陰根於中衝溜於大陵注於內關入於天池郤門也按靈樞此篇不載後一段但用八法五門分主客而針無不效用針八法者迎隨一也轉針二也指法三也針頭四也虛實五也陰陽六也提按七也呼吸八也補虛瀉實損益在此八法五門者井滎俞經合也春刺井夏刺滎秋刺經冬刺合四季月刺俞穴五門一月一同一日亦有五門同年辰例客者客邪也主者主氣也知之者刺之無有不效八脈始終連八會本是紀綱十二經絡十二原是為樞要甲光明走乙肝乙蠡溝走甲膽丙腕骨走丁心丁通里走丙小腸戊豐隆走己脾己公孫走戊胃庚偏歷走辛肺辛列缺走庚大腸壬飛揚走癸腎癸大鐘走壬膀胱三焦與包絡相為表裡此為十二原穴八脈者奇經也有督脈任脈衝脈帶脈陰維陽維陰蹺陽蹺是為八脈也八會者腑會中脘臟會章門筋會陽陵泉髓會絶骨血會鬲俞骨會大杼脈會太淵氣會膻中此八穴陰通八脈相符而用一日刺六十六穴之法方見幽微一時取一十二經之原始知要妙一日刺六十六穴之法用甲丙戊庚壬五穴每時相配乙丁己辛癸一時十穴五六三十兩手兩足相對共計六十穴一時平取十二經之原亦可偏經而已矣原夫補瀉之法非呼吸而在手指速效之功要交正而識本經經云寧失其穴勿失其經寧失其時勿失其氣古人云有八法彈拈循捫攝按爪切用此如神故下再執呼吸也交經繆刺左有病而右畔取瀉絡遠針頭有病而腳上針手足大病左因右侵凌右因左攻擊黃帝云是動則病經氣更取所生者病血絡更然故上下前後左右腹背交經平刺也巨刺與繆刺各異微針與妙刺相通巨微妙毫針之刺繆交平而刺巨隨氣色而針之故不同也觀部分而知經絡之虛實視浮沉而辨臟腑之寒溫此言三部九候刺虛實寒熱表裡也而後刺法行焉且夫先令針耀而慮針損次藏口內而欲針溫古人云口溫針暖毋令針冷與皮肉相和故不損折也目無外視手如握虎心無內慕如待貴人左手重而多按欲令氣散右手輕而徐入不痛之因手法之原先要左手穴在重按有準右手輕拈至分寸自不痛也空心恐怯直立側而多暈背目沉掐坐臥平而沒昏此明用針規矩法式也推於十干十變知孔穴之開闔論其五行五臟察日時之旺衰伏如橫弩應若發機陰交陽別而定血暈陰蹺陽維而下胎衣三陰之交與三陽別走陰蹺陽維皆治産難下胎血暈此之謂也痹厥偏枯迎隨俾經絡接續漏崩帶下溫補使氣血依歸風科有一痹言風寒濕冷而為痹也接續刺包焦諸穴女人血下有四崩者急下漏者點滴下滲者浸浸而下帶者隨便溺而下榮衛氣息安定方可刺之靜以久留停針候之用針刺産難崩漏淹涎等病皆可停針留法罔不效也必准者取照海治喉中之閉塞端的處用大鐘治心內之呆癡照海通陰蹺足少陰經也可刺喉閉大鐘走足太陽可刺失心之病大抵疼痛實瀉癢麻虛補體重節疼而俞居心下痞滿而井主百病麻癢不仁清冷者虛也可補之疼痛者實也可瀉之五門所主不同並主心下滿悶滎主氣熱恍惚俞主體節疼痛經主寒熱喘嗽合主氣逆泄利也心脹咽痛針太衝而必除脾冷胃疼瀉公孫而立愈胸滿腹痛刺內關脅疼肋痛針飛虎筋攣骨痛而補魂門體熱勞嗽而瀉魄戶頭風頭痛刺申脈與金門眼癢眼疼瀉光明與地五瀉陰郤止盜汗治小兒骨蒸刺偏歷利小便醫大人水蠱中風環跳而宜刺虛損天樞而可補此一節俞穴明注不必重解由是午前卯後太陰生而疾溫離左酉南月朔死而速冷子醜寅三時者陰中之少陽不足為用也午前卯後乃辰巳之時陽中之老陽可治萬病之虛寒酉戌亥三時陰中之老陰不足生髮也離左酉南乃未申之時陽中之少陰可治萬病之煩躁者溫其虛寒則針而補之灸而呵之冷其煩燥則針而瀉之灸而吹之以丈夫同室女婦人比童子治之循捫彈怒留吸母以堅長爪下伸提疾呼子而噓短此言八法虛補其母實瀉其子也動退空歇迎奪右而瀉涼推內進搓隨濟左而補暖此明左右轉針補瀉取手俯手仰法也慎之大患危疾色脈不順而莫針寒熱風陰飢飽醉勞而切忌天有六氣陰陽風雨晦明地有六邪風寒暑濕溫燥人有六情喜怒哀樂好惡共十八事皆禁忌不可針也望不補而晦不瀉弦不奪而朔不濟望日魂魄皆滿血氣堅盈不可補也晦日月空已盡人氣亦衰不可瀉也朔日月會也月之陰魄未成日之陽魂始生人氣亦然故不可瀉也上弦月始生氣血始結衛氣始行不可奪也下弦月始減人氣血亦空不可迎也古聖有云針刺之法大禁一月之內晦朔弦望四日謂之四忌精其心而窮其法無灸艾而壞其皮正其理而求其源免投針而失其位位者胃也灸不當其穴損傷榮血肝也刺不中其法喪敗衛氣胃也避灸處而和四肢四十有九禁刺處而除六腧二十有二二禁針穴歌禁灸穴道要先明腦戶囟會及神庭絡卻玉枕角孫穴顱息承泣隨承靈神道靈臺膻中忌水分神闕並會陰橫骨氣衝手五里箕門承筋並青靈更加臂上三陽絡二十二穴不可針孕婦不宜針合谷三陰交內亦同論石門針灸應須忌女子終身無妊娠外有云門並鳩尾缺盆客主人莫深肩井深時令悶倒三里急補命還平三禁灸穴歌禁灸之穴四十五承光啞門並風府天柱素髎臨泣上睛明攢竹迎香數禾髎顴髎絲竹空頭維下關與脊中肩貞心俞白環俞天牖人迎共乳中周榮淵液並鳩尾腹哀少商魚際同經渠天府中衝位陽關陽池地五會隱白漏谷陰陵泉條口犢鼻並陰市伏兔髀關及委中殷門申脈承扶忌四古針法歌先說平針法含針口內溫按揉令氣散掐穴故教深持針安穴上令他嗽一聲隨嗽歸天部停針再至人次提針向病針退天地人補必隨經刺令他吹氣頻隨吹隨左轉逐歸天地人待氣停針久三彈更尉溫出針口吸氣急急閉其門瀉欲迎經取吸則內其針吸時須右轉依次進天人轉針仍復吸依法要停針出針吹出氣搖動大其門五古穴法歌論暈針吸針解救法汪紹達先生曰穴法歌傳世已數百年並未說明何用但云相應而已昔嘗舉以問老友濮云依據轉述其師陸九芝先生云此針灸家一大祕密也凡救暈針及拔針不出種種危險皆於此相應諸穴下針但從未有注明何穴救暈針何穴救吸針致後人無從措手然果能明於各經脈中之氣機某經與某經互相貫通此穴法歌中所云某穴與某穴互相為應者有如何關係自不難由此例彼推類而知也愚按吾師石屏先生於救暈針各穴多至十餘處皆與此歌所云之各穴相符蓋吾師之針法傳於異人聶君聶君又傳於濟寧州之高僧除傳授針法外尚須授以煉氣運氣諸法故能於極柔之金針運以剛徑之真氣由孔穴以入經絡濟危救急指揮如意又不僅在穴道之相應已也汪先生又云古法救暈針者但取奪命穴救之其穴在手膊上側筋骨陷中從肩至肘正在當中即是蝦蟆兒上邊也今各穴相應之法既經發明救急之法益廣愚按吾師石屏先生於百會人中曲池合谷足三里三陰交皆能隨時取以救治暈針之危急信乎吾師門之所發明者於古歌若合符節尤足徵淵源之有自矣承漿應風府風池應合谷迎香應上星翳風應合谷聽會應合谷啞門應人中攢竹應大陽大陰應合谷睛明內迎香應合谷人中應委中腎腧應委中髖骨應風市足三里應膏肓肩井應足三里陽陵泉應支溝崑崙應命門崑崙應行間申脈應合谷太衝應崑崙髖骨應曲池肩井應支溝尺澤應曲池肩髃應髖骨間使應百勞關衝應支溝中渚應人中少衝應上星後溪應百勞神門應後溪通里應心腧百勞應肺腧膏肓應足三里風門應列缺照海應崑崙鳩尾應神門中極應白環腧天樞應脾腧六今世所傳之針法內經難經所傳之針法通乎造化之理者也今世所傳之針法率多無稽之言豈可相提並論然古經文意深奧必須沉潛玩味乃能得其精微今人喜簡厭繁貪求淺近其於聖經視同虛文孰肯留心於此茲為普及針法計取今世針法之近理而為歷代所傳習施之病人確有實效者擇要論列以便入門所論各法雖多為他書所同有然於他書傳訛之處概行訂正故針法之名稱雖同而所述之方法多異學者幸勿以其近而忽之宏綱陳氏補瀉針法取穴既正用左手大指掐穴右手置針穴上令嗽一聲隨嗽內針至分寸候針數穴畢停少時用右手大指及食指持針細細動搖進退搓拈如手顫之狀謂之催氣約行五六次覺針下沉緊卻用瀉法令病人呼氣一口隨呼轉針如針左邊以右手持針大指推前食指向後輕提針頭左轉如針數處具依此法轉畢仍用右大指食指持針卻用食指連搓三下謂之飛卻輕提住針頭左轉略退半分許謂之三飛一退依此行至五六次覺針下沉緊是氣至極矣再輕提住針頭左轉一二次如針右邊以左手大指食指持針大指向前食指向後依前法輕提針頭右轉是針右邊瀉法欲出針時令咳一聲隨咳出針此謂之瀉補法則依前法催氣畢覺針下氣至令病人吸氣一口隨吸轉針如針左邊捻針頭轉向右邊以我之右手大指食指持針以大指向後食指向前仍捻針深入一二分使真氣深入肌肉之分如針右邊捻針頭轉向左邊以我之左手大指食指持針食指向前大指向後仍捻針深入一二分若針數穴俱依此法行畢停少時卻用手指於針頭上輕彈三下如此三次仍用我之左手大指食指持針以大指連搓三下謂之飛將針深入一二分輕提針頭轉向左邊謂之一進三飛依此法行五六次覺針下沉緊或針下氣熱是氣至足矣令病人吸氣一口隨吸出針急以手按其穴此謂之補三才法補者呼氣初針刺至皮內號曰天才少停進針刺至肉內號曰人才又停進針刺至筋骨之間號曰地才得氣補之再停良久退針人部待氣沉緊倒針朝病進退往來飛經走氣盡在其中瀉者吸氣針至天部少停直至地部得氣瀉之再停良久退針人部待氣沉緊倒針朝病施法同前少停者三息也再停者五吸也候氣法病未退者針下如根推之不動轉之不移此為邪氣吸拔其針未可出針出則病復再須補瀉停以待之直候病勢已退針下微松如魚吞餌之狀乃真氣至也方可出針豆許搓而停之補者吸之去疾急捫其穴瀉者呼之去徐不閉其穴近世針家十四法以下各法諸家之書不同茲從實驗後考訂改正其緊要異同之處識者自能辨之一切凡欲下針之時用兩手大指甲於穴旁上下左右四圍掐而動之如刀切割之狀令血氣宣散次用爪法爪者掐也用左手大指甲著力掐穴右手持針插穴有準此下針之法也二搖凡退針出穴時必須擺撼而出之所謂青龍擺尾者即搖法也故曰搖以行氣此出針法也三退凡施補瀉出針豆許補時出針宜瀉三吸瀉時出針宜補三呼再停少時方可出針又一瀉法一飛三退邪氣自退其法一插至地部三提至天部插針宜速提針作三次出每一次停三吸宜緩提時亦宜吸氣故曰退以清氣飛者進也四動凡下針時如氣不行將針搖之如搖鈴之狀動而振之每穴每次須搖五息一吹一搖按針左轉一吸一搖提針右轉故曰動以運氣所謂白虎搖頭者亦用此法又曰飛針引氣以大指次指拈針來去上下也五進下針後氣不至男左女右轉而進之外轉為左內轉為右春夏秋冬各有淺深又有補法一退三飛真氣自歸其法一提至天部三進入地部提針宜速進針三次每停三息宜緩進時亦宜吹氣故曰進以助氣六循下針後氣不至用手上下循之假如針手陽明合谷穴氣若不至以三指平直將指面於針邊至曲池上下往來撫摩使氣血循經而來故曰循以至氣七攝下針之時氣或澀滯用大食中三指甲於所屬經分來往攝之使氣血流行故曰攝以行氣八努下針至地復出人部補瀉務待氣至如欲上行將大指次指拈住針頭不得轉動卻用中指將針腰輕輕按之四五息久如撥努機之狀按之在前使氣在後按之在後使氣在前氣或行遲兩手各持其針仍行前法謂之龍虎升騰自然氣血搬運故曰努以上氣一說用大指次指拈針名曰飛針引氣至也如氣不至令病人閉氣一口著力努之外以飛針引之則氣至矣九搓下針之後將針或內或外如搓線之狀勿轉太緊令人肥肉纏針難以進退左轉插之為熱右轉提之為寒各停五息久故曰搓以使氣按內經云針入而肉著者熱氣因於針則針熱熱則肉著於針故堅焉茲謂轉緊纏針與經不同十彈補瀉之時如氣不行將針輕輕彈之使氣速行用大指彈之象左補也用次指彈之象右瀉也每穴各彈七下故曰彈以催氣十一盤如針腹部軟肉去處只用盤法兼子午搗臼提按之訣其盤法如循環之狀每次盤時各須運轉五次左盤按針為補右盤提針為瀉故曰盤以和氣如針關元穴先刺入二寸五分退出一寸只留一寸五分在內盤之且如要取上焦之病用針頭迎向上刺入二分補之使氣攻上臍下之病退出二分十二捫補時出針用手指掩閉其穴無令氣泄故曰捫以養氣一說捫者因痛處未除以手捫摩痛處外以飛針引之除其痛也十三按欲補之時以手緊捻其針按之如診脈之狀毋得挪移再入每次按之令細細吹氣五口故曰按以添氣添助其氣也十四提欲瀉之時以手捻針慢慢伸提豆許無得轉動再出每次提之令細細吸氣五口其法提則氣往故曰提以抽氣通關過節等十六法青龍擺尾如扶船舵不進不退一左一右慢慢撥動又云青龍擺尾行氣龍為陽屬之故行針之時提針至天部持針搖而按之如推船舵之緩每穴左右各搖五息如龍擺尾之狀兼用按者按則行衛也白虎搖頭似手搖鈴退方進員兼之左右搖而振之又云行針之時開其上氣閉其下氣氣必上行開其下氣閉其上氣氣必下行如刺手足欲使氣上行以指下抑之欲使氣下行以指上抑之用針頭按住少時其氣自然行也進則左轉退則右轉然後搖動是也又云白虎搖頭行血虎為陰屬之故行針之時插針地部持針提而動之如搖鈴之狀每穴每施五息退方進員非出入也即大指進前往後左右略轉提針而動之似虎擺頭之狀兼行提者提則行榮也龍補虎瀉也蒼龜探穴如入土之像一退三進鑽剔四方又云得氣之時將針似龜入土之狀緩緩進之上下左右而探之上下出內也左右拈針也又云下針時三進一退將兩指按肉持針於地部右盤提而剔之如龜入土四圍鑽之盤而剔者行經脈也赤鳳迎源展翅之儀入針至地部提針至天部候針自搖復進其源上下左右四圍飛旋病在上吸而退之病在下呼而進之吸而右退呼而左進此即上下左右也又云下針之時入天插地復提至天候氣入地針必動搖又復推至人部持住針頭左盤按而搗之如鳳衝風擺翼之狀盤而搗者行絡脈也鳳補龜瀉也以上四法所謂通關過節者也龍虎交戰下針之時先行龍而左轉可施九陽數足後行虎而右轉又施六陰數足乃首龍尾虎以補瀉此是陰中引陽陽中引陰乃反復其道也又云先於天部施青龍擺尾左盤右轉按而添之亦宜三提九按即九陽也令九陽數足後於地部行白虎搖頭右盤左轉提而抽之亦宜三按六提即六陰也令六陰數足首龍尾虎而轉之此乃陰陽升降之理住痛移痛之法也龍虎升騰先於天部持針左盤按之一回右盤按之後一回用中指將針腰插之如撥弩機之狀如此九次像青龍純陽之體卻推針至地部右盤提之一回左盤提之後一回用中指將針腰插之如此六次像白虎純陰之體按之在後使氣在前按之在前使氣在後若氣血凝滯不行兩手各持其針行之此飛經走氣之法也子午搗臼下針之後調氣得勻以針上下行九入六出之數左右轉之道引陰陽之氣百病自除諺云針轉千遭其病自消此除臌膈膨脹之疾也燒山火針入先淺後深約入五分用九陽三進三退慢提緊按熱至緊閉針穴方可插針令天氣入地氣出寒可除矣又云一退三飛飛進也如此三次為三退九進則成九矣其法一次急提至天三次慢按至地故曰疾提慢按隨按令病人天氣入地氣出謹按生成息數病愈而止一說三進三退者三度出入三次則成九矣九陽者補也先淺後深者淺則五分深則一寸透天涼先深後淺約入一寸用六陰三出三入緊提慢按寒至徐徐退出五分令地氣入天氣出熱可退也又云一飛三退如此三次為三進六退即六陰數也其法一次疾插入地三次慢提至天故曰疾按慢提隨提令病人地氣入天氣出謹按臟腑生成息數病自退矣一說一度三進三退則成六矣六陰者補也陽中隱陰先寒後熱淺以深針入五分行九陽之數熱至便進針一寸行六陰之數乃陽行陰道之理則先補後瀉也陰中隱陽先熱後寒深而淺先針一寸行六陰之數寒至便退針五分之中行九陽之數乃陰行陽道之理則先瀉後補也補者直須熱至瀉者直待寒侵抽添法針入穴後行九陽之數氣至慢慢轉換將針提按或進或退使氣隨針到於病所扶針直插復向下納回陽倒陰又云抽添即提按出納之狀抽者拔而數拔也添者按而數推也取其要穴先行九陽之數得氣隨吹按添就隨吸抽提其實在乎動搖出內呼吸同法以動搖出內呼吸相兼併施故曰同法謹按生成息數足效也此治癱瘓半身不遂之疾調氣法下針至地復出於人欲氣上行將針右拈欲氣下行將針左拈欲補先呼而吸欲瀉先吸後呼氣不至者以手循攝以爪切掐以針搖動進退搓拈直待氣至以龍虎升騰之法按之在前使氣在後按之在後使氣在前運氣走至病所再用納氣之法扶針直插復向下納使氣不回若關節阻滯氣不過者以龍虎龜鳳四法通經接氣驅而運之然後用循攝爪切無不應矣進氣法針入天部行九陽之數氣至速臥倒針候其氣行令病人吸氣五七口其針氣上行此乃進氣之法可治肘臂腰腳身疼亦可龍虎交戰走注之病左拈九右拈六是亦住痛之針納氣法下針之時先行進退之數得氣便臥倒針候氣前行催運到於病所便立起針復向下納使氣不出又云下針之後如真氣至針下微微沉緊如魚吞餌之狀兩手持針徐徐按倒令針尖向病使氣上行至病所扶針直插復向下納使氣上行不回也留氣法用針之時先進七分之中行純陽之數若得氣便深入伸提之卻退至原處又得氣依前法可治痃癖癥瘕之病九十二經四肢各穴分經主治病症此即十二經井滎俞經合各穴之主治也一手太陰肺經左右手及臂凡一十八穴少商二穴木也在手大指端內側去爪甲角如韭葉手太陰之脈所出也為井治煩心善噦心下滿汗出而寒咳逆痎瘧振寒腹滿膨膨唾沫唇乾引飲不下手攣指痛寒栗鼓頷喉中鳴以三稜針刺之微出血泄諸藏熱湊唐刺史成君綽忽腮頷腫大如升喉中閉塞水粒不下三日甄權針之立愈不宜灸魚際二穴火也在手大指本節後內側散脈中手太陰脈之所流也為滎治灑淅惡風寒虛熱舌上黃身熱頭痛咳嗽汗不出痹走胸背痛不得息目眩煩心少氣腹痛不下食肘攣支滿喉中乾燥寒栗鼓頷咳引尻痛溺出嘔血心痹悲恐針入二分留三呼太淵二穴土也在手掌後陷中手太陰脈之所注也為腧治胸痹逆氣寒厥善噦嘔飲水咳嗽煩怨不得臥肺脹滿膨膨背內廉痛目生白翳眼眥赤筋缺盆中引痛掌中熱數缺喘不得息噫氣上逆心痛唾血振寒咽乾狂言口噼可灸三壯針入二分經渠二穴金也在寸口陷中手太陰脈之所行也為經治瘧寒熱胸背拘急胸滿膨膨喉痹掌中熱咳嗽上氣數缺熱病汗不出暴痹喘逆心痛嘔吐針入二分留三呼禁不可灸灸即傷人神列缺二穴去腕側上一寸五分以手交叉頭指末筋骨罅中手太陰絡別走陽原療偏風口喎手腕無力半身不遂咳嗽掌中熱口噤不開寒瘧嘔沫善笑縱唇口健忘針入二分留三呼瀉五吸即可灸七壯慎酒面生冷物等孔最二穴在腕上七寸手太陰郤治熱病汗不出此穴可灸三壯即汗出咳逆臂厥痛針入三分灸五壯尺澤二穴水也在肘中約上動脈中手太陰脈之所入也為合治風痹肘攣手臂不得舉喉痹上氣舌乾咳嗽唾濁四肢暴腫臂寒短氣針入三分可灸五壯俠白二穴在天府下去肘五寸動脈中治心痛乾嘔煩滿針入三分可灸五壯天府二穴在腋下三寸動脈中以鼻取之治逆氣喘不得息目眩遠視䀮䀮卒中惡鬼疰不得安臥禁不可灸使人逆氣今附刺鼻衄血不止針入四分留三呼二手陽明大腸經左右手及臂凡二十八穴商陽二穴金也一名絶陽在手大指次指內側去爪甲角如韭葉手陽明脈之所出也為井治胸中氣滿喘咳支腫熱病汗不出耳鳴且聾寒熱痎瘧口乾頤頷腫齒痛惡寒肩背急相引缺盆痛目青盲可灸三壯右取左左取右如須食立已針入一分留一呼二間二穴水也一名間谷在手大指次指本節前內側陷中手陽明脈之所流也為滎治喉痹頷脛肩背痛振寒鼻鼽衄血多驚口喎針入三分可灸三壯三間二穴木也一名少谷在手大指次指本節之後內側陷中手陽明脈之所注也為腧治喉痹咽中如鞭齒齲痛嗜臥胸滿腸鳴洞泄寒瘧唇焦口乾氣喘目眥急痛針入三分留三呼可灸三壯合谷二穴一名虎口在手大指次指岐骨間陷中手陽明脈之所過也為原療寒熱瘧鼻鼽衄熱病汗不出目視不明頭痛齒齲喉痹痿臂面腫唇吻不收喑不能言口噤不開針入三分留六呼可灸三壯今附右婦人妊娠不可刺之損胎氣陽溪二穴火也一名中魁在腕中上側兩筋陷中手陽明脈之所行也為經治狂言喜笑大見鬼熱病煩心目風赤厥逆頭痛胸滿不得息寒熱瘧疾喉痹耳鳴齒驚掣肘臂不舉痂疥針入三分留七呼可灸三壯慎如前法偏歷二穴手陽明絡在腕後三寸別走太陰治寒熱瘧風汗不出目視䀮癲疾多言耳鳴口喎齒齲喉痹嗌乾鼻鼽衄血針入三分留七呼可灸三壯溫留二穴一名逆注一名蛇頭在腕後大士六寸小士五寸手陽明郤治口喎腸鳴腹痛傷寒身熱頭痛噦逆肩不得舉癲疾吐涎狂言見鬼喉痹而虛腫針入三分可灸三壯下廉二穴在輔骨下去上廉一寸輔兌肉其分外斜治頭風臂時痛溺黃針入五分留五呼灸三壯上廉二穴在三里下一寸其分獨抵陽明之會外斜治腦風頭痛小便難黃赤腸鳴氣走疰痛針入五分可灸五壯三里二穴在曲池下二寸按之肉起兌肉之端治手臂不仁肘攣不伸齒痛頰頷腫瘰癧可灸三壯針入二分曲池二穴土也在肘外輔骨屈肘曲骨之中以手拱胸取之手陽明脈之所入也為合治肘中痛偏風手身不遂刺風癮疹喉痹不能言胸中煩滿筋緩捉物不得挽弓不開屈伸難風臂肘細而無力傷寒餘熱不盡皮膚乾燥針入七分得氣先瀉後補之灸亦大良可灸三壯肘髎二穴在肘大骨外廉陷中治肘節風痹臂痛不可舉屈伸攣急可灸三壯針入三分五里二穴在肘上三寸行向里大脈中央治風勞驚恐吐血肘臂痛嗜臥四肢不得動搖寒熱瘰癧咳嗽目視䀮䀮痎瘧心下脹滿可灸十壯禁不可針臂臑二穴在肘上七寸䐃肉端手陽明絡治寒熱頸項拘急瘰癧肩背痛不得舉可灸三壯針入三分三手少陰心經左右手及臂凡一十八穴少衝二穴木也一名經始在小指內廉之端去爪甲角如韭葉手少陰脈之所出也為井治熱病煩滿上氣心痛痰冷少氣悲恐善驚掌中熱胸中痛口中熱咽中酸乍寒乍熱手攣不伸引肘腋痛針一分可灸三壯少府二穴火也在小指本節後陷中直勞宮手少陰脈之所流也為滎治煩滿少氣悲恐畏人掌中熱肘腋攣急胸中痛手卷不伸針入二分可灸七壯神門二穴土也一名兌沖在掌後鋭骨之端陷中手少陰脈之所注也為腧治瘧心煩心煩甚欲得飲冷惡寒則欲處溫中咽乾不嗜食心痛數噫恐悸少氣不足手臂寒喘逆身熱狂悲哭嘔血上氣遺溺大小人五癇可灸七壯炷如小麥大針入三分留七呼陰郤二穴在掌後動脈中去腕五分治失喑不能言灑淅振寒厥逆心痛霍亂胸中滿衄血驚恐針入三分可灸七壯通里二穴在腕後一寸治熱病卒心中懊憹數缺頻伸悲恐目眩頭痛面赤而熱心悸肘臂臑痛實則支腫虛則不能言苦嘔喉痹少氣遺溺針入三分可灸三壯靈道二穴金也去掌後一寸五分或一寸手少陰脈之所行也為經治心痛悲恐相引瘛瘲肘攣暴喑不能言可灸三壯針入三分少海二穴水也一名曲節在肘內廉節後又云肘內大骨外去肘端五分手少陰脈之所入也為合治寒熱齒齲痛目眩發狂嘔吐涎沫項不得回顧肘攣腋脅下痛四肢不得舉針入三分可灸三壯甄權云屈手向頭取之治齒寒腦風頭痛不宜灸針入五分青靈二穴在肘上三寸舉臂取之治肩臂不舉不能帶衣頭痛振寒目黃脅痛可灸七壯極泉二穴在腋下筋間動脈入胸治心痛乾嘔四肢不收咽乾煩渴臂肘厥寒目黃脅下滿痛可灸七壯針入三分四手太陽小腸經左右及臂凡一十六穴少澤二穴金也一名小吉在手小指之端去爪甲下一分陷中手太陽脈之所出也為井治瘧寒熱汗不出喉痹舌強口乾心煩臂痛瘛瘲咳嗽頸項急不可顧目生膚翳覆瞳子可灸一壯針一分前谷二穴水也在手小指外側本節之前陷中手太陽脈之所流也為滎治熱病汗不出痎瘧癲疾耳鳴頷腫喉痹咳嗽衄血頸項痛鼻塞不利目中白翳臂不得舉可灸一壯針入一分後溪二穴木也在手小指外側本節後陷中手太陽脈之所注也為腧治瘧寒熱目赤生翳鼻衄耳聾胸滿頸項強不得回顧癲疾臂肘攣急可灸一壯針入一分腕骨二穴在手外側腕前起骨下陷中手太陽脈之所過也為原治熱病汗不出脅下痛不得息頸頷腫寒熱耳鳴目冷淚生翳狂惕偏枯臂肘不得屈伸痎瘧頭痛煩悶驚風瘛瘲五指掣可灸三壯針入二分留三呼陽谷二穴火也在手外側腕中兌骨之下陷中手太陽脈之所行也為經治癲疾狂走熱病汗不出脅痛頸頷腫寒熱耳聾耳鳴齒齲痛臂腕外側痛不舉妄言左右顧瘛瘲目眩可灸三壯針入二分留二呼養老二穴在手踝骨上一空腕後一寸陷中手太陽郤治肩欲折臂如拔手臂疼不能自上下目視不明可灸三壯針入三分支正二穴在腕後五寸別走少陰治寒熱頷腫肘攣頭痛目眩風虛驚恐狂惕生疣目可灸三壯針入三分小海二穴土也在肘內大骨外去肘端五分陷中甄權云以屈手向頭取之手大陽脈之所入也為合治寒熱齒齦腫風眩頸項痛瘍腫振寒肘腋腫少腹痛四肢不舉可灸三壯針入二分五手厥陰心主脈左右手及臂凡一十六穴中衝二穴木也在手中指端去爪甲如韭葉陷中手厥陰心主脈之所出也為井治熱病煩悶汗不出掌中熱身如火痛煩滿舌強針入一分勞宮二穴火也在掌中央動脈中以屈無名指取之手厥陰脈之所流也為滎治中風善怒悲笑不休手痹熱病三日汗不出怵惕胸脅痛不可轉側大小便血衄血不止氣逆嘔噦煩渴食飲不下大小人口中腥臭胸脅支滿黃疸目黃可灸三壯大陵二穴土也在掌後兩筋間陷中手厥陰脈之所注也為腧治熱病汗不出臂攣腋腫善笑不休心懸如飢喜悲泣驚恐目赤小便如血嘔逆狂言不樂喉痹口乾身熱頭痛短氣胸脅痛針入五分可灸三壯內關二穴在掌後去腕二寸別走少陽治目赤支滿中風肘攣實則心暴痛虛則心煩惕惕針入五分可灸三壯間使二穴金也在掌後三寸兩筋間陷中手厥陰脈之所行也為經治心懸如飢卒狂胸中淡淡惡風寒嘔吐怵惕寒中少氣掌中熱腋腫肘攣卒心痛多驚喑不得語咽中如鯁可灸五壯針入三分岐伯云可灸鬼邪郤門二穴去腕五寸手厥陰郤治心痛衄血嘔噦驚恐畏人神氣不足針入三分可灸五壯曲澤二穴水也在肘內廉陷中屈肘取之手厥陰脈之所入也為合治心痛善驚身熱煩渴口乾逆氣嘔血風疹臂肘手腕善動搖可灸三壯針入三分留七呼天泉二穴一名天濕在曲腋下二寸舉臂取之治心病胸脅支滿咳逆膺背胛間臂內廉痛針入六分可灸三壯六手少陽三焦經左右手及臂凡二十四穴關衝二穴金也在手小指次指之端去爪甲角如韭葉手少陽脈之所出也為井治喉痹舌卷口乾頭痛霍亂胸中氣噎不嗜食臂肘痛不可舉目生翳膜視物不明針入一分可灸一壯慎豬魚酒麥生冷之物液門二穴水也在手小指次指間陷中手少陽脈之所流也為滎治驚悸妄言咽外腫寒厥手臂痛不能自上下痎瘧寒熱目眩頭痛暴得耳聾目赤澀齒齲痛針入二分可灸三壯中渚二穴木也在手小指次指本節後間陷中手少陽脈之所注也為腧治熱病汗不出目眩頭痛耳聾目生翳膜久瘧咽腫肘臂痛手五指不得屈伸針入一分可灸三壯陽池二穴一名別陽在手表腕上陷中手少陽脈之所過也為原治寒熱瘧或因折傷手腕捉物不得肩背痛不得舉針入二分留三呼不可灸慎生冷物等外關二穴手少陽絡在腕後二寸陷中治肘臂不得屈伸手五指盡痛不能握物耳聾無所聞可灸三壯針入三分留七呼支溝二穴火也在腕後三寸兩骨之間陷中手少陽脈之所行也為經治熱病汗不出肩臂酸腫脅腋痛四肢不舉霍亂嘔吐口噤不開暴啞不能言可灸二十七壯針入二分慎酒麥生冷豬魚物會宗二穴在腕後三寸空中一寸治肌膚痛耳聾風癇針入三分可灸三壯三陽絡二穴在臂上大交脈支溝上一寸治嗜臥身體不欲動耳卒聾齒齲暴啞不能言可灸七壯切記不可針四瀆二穴在肘前五寸外廉陷中治暴氣耳聾齒齲痛可灸三壯針入六分留七呼天井二穴土也在肘外大骨後肘後上一寸兩筋間陷中屈肘得之手少陽脈之所入也為合甄權云曲肘後一寸叉手按膝頭取之兩筋骨罅治心胸痛咳嗽上氣唾膿不嗜食驚悸瘛瘲風痹臂肘痛捉物不得可灸三壯針入三分慎如常法清冷淵二穴在肘上二寸伸肘舉臂取之治臑縱肩臂不舉不得帶衣可灸三壯針入三分消濼二穴在肩下臂外腋斜肘分下行治寒熱風痹項痛肩背急針入六分可灸三壯七足厥陰肝經左右足及股凡二十二穴大敦二穴木也在足大指端去爪甲如韭葉及三毛中足厥陰脈之所出也為井治卒疝小便數遺溺陰頭中痛心痛汗出陰上入腹陰偏大腹臍中痛悒悒不樂病左取右右取左腹脹腫滿少腹痛中熱喜寐尸蹶狀如死婦人血崩不止可灸三壯針入三分留六呼行間二穴火也在足大指間動脈應手陷中足厥陰脈之所流也為滎治溺難又曰濁寒疝少腹腫咳逆嘔血腰痛不可俯仰腹中脹心痛色蒼蒼如死狀終日不得息口喎四肢逆冷嗌乾煩渴瞑不欲視目中淚出太息癲疾短氣可灸三壯針入六分留十呼太衝二穴土也在足大指本節後二寸或一寸半陷中今附凡診大沖脈可訣男子病死生足厥陰脈之所注也為腧治腰引少腹痛小便不利狀如淋㿉疝少腹腫溏泄遺溺陰痛面目蒼色胸脅支滿足寒大便難嘔血女子漏血不止小兒卒疝嘔逆發寒嗌乾肘腫內踝前痛淫濼䯒酸腋下腫馬刀瘍瘻唇腫針入三分留十呼可灸三壯中封二穴金也在足內踝前一寸仰足取之陷中伸足乃得之足厥陰脈之所行也為經治痎瘧色蒼蒼振寒少腹腫食怏怏繞臍痛足逆冷不嗜食身體不仁寒疝引腰中痛或身微熱針入四分留七呼可灸三壯蠡溝二穴在足內踝上五寸別走少陽足厥陰絡治卒疝少腹腫時少腹暴痛小便不利如癃閉數噫恐悸少氣不足腹中痛悒悒不樂咽中悶如有息肉狀背拘急不可俯仰針入二分留三呼可灸三壯中都二穴一名中郤在內踝上七寸䯒骨中與少陰相值治腸澼㿉疝少腹痛婦人崩中因産惡露不絶針入三分可灸五壯膝關二穴在犢鼻下二寸陷中治風痹膝內痛引臏不可屈伸喉咽中痛針入四分可灸五壯曲泉二穴水也在膝內輔骨下大筋上小筋下陷中屈膝取之足厥陰脈之所入也為合治女子血瘕按之如湯浸股內少腹腫陰挺出丈夫㿉疝陰股痛小便難腹脅支滿癃閉少氣泄利四肢不舉實即身熱目眩痛汗不出目䀮䀮膝痛筋攣不可屈伸發狂衄血喘呼少腹痛引喉咽針入六分灸三壯又云正膝屈內外兩筋間宛宛中又在膝曲橫紋頭治風勞失精身體極痛泄水下利膿血陰腫䯒痛可灸三壯針入六分留十呼陰包二穴在膝上四寸股內廉兩筋間足厥陰別走治腰尻引中腹痛遺溺不禁針入六分可灸三壯五里二穴在氣衝下三寸陰股中動脈治腸中滿熱閉不得溺可灸五壯針入六分陰廉二穴在羊矢下去氣衝二寸動脈中治婦人絶産若未經生産者可灸三壯即有子針入八分留七呼八足少陽膽經左右足及股凡二十八穴竅陰二穴金也在足小指次指之端去爪甲如韭葉足少陽脈之所出也為井治脅痛咳逆不得息手足煩熱汗不出轉筋癰疽頭痛心煩喉痹舌強口乾肘不可舉卒聾不聞人語可灸三壯針入一分俠溪二穴水也在足小指次指岐骨間本節前陷中足少陽脈之所流也為滎治胸脅支滿寒熱汗不出目外眥赤目眩頰頷腫耳聾胸中痛不可轉側痛無常處可灸三壯針入三分地五會二穴在足小指次指本節後陷中去俠溪一寸治內傷唾血足外皮膚不澤乳腫針入二分不可灸灸則使羸瘦不出三年卒臨泣二穴木也在足小指次指本節後間陷中去俠溪一寸五分足少陽脈之所注也為腧治胸中滿缺盆中及腋下腫馬刀瘍瘻善齧頰天牖中腫淫濼䯒酸目眩枕骨合顱痛灑淅振寒婦人月事不利季脅支滿乳癰胸痛周痹痛無常處厥逆氣喘不能行痎瘧日發可灸三壯針入二分丘墟二穴在足外踝下如前陷中去臨泣三寸足少陽脈之所過也為原治胸脅滿痛不得息久瘧振寒腋下腫痿厥坐不能起髀樞中痛目生翳膜腿䯒酸轉筋卒疝少腹堅寒熱頸腫可灸三壯針入五分留七呼懸鐘二穴在足外踝上三寸動脈中足三陽之大絡按之陽明脈絶乃取之治心腹脹滿胃中熱不嗜食膝䯒痛筋攣足不收履坐不能起可灸五壯針入六分留七呼陽輔二穴火也在足外踝上四寸輔骨前絶骨端如前三分去丘墟七寸足少陽脈之所行也為經治腰溶溶如坐水中膝下膚腫筋攣諸節盡痛痛無常處腋下腫瘻馬刀喉痹膝䯒酸風痹不仁可灸三壯針入五分留七呼光明二穴在足外踝上五寸別走厥陰足少陽終治身解寒淫濼䯒酸不能久立與陽輔療病法同熱病汗不出卒狂虛則痿痹坐不能起實則足䯒熱膝痹身體不仁善齧頰可灸五壯針入六分留七呼外丘二穴在足外踝上七寸少陽所生治膚痛痿痹胸脅脹滿頸項痛惡風寒癲疾針入三分可灸三壯今附狾犬所傷毒不出發寒熱速以三壯又可灸所齧之處立愈陽交二穴一名別陽陽維郤在足外踝上七寸斜屬三陽分肉之間治寒厥驚狂喉痹胸滿面腫寒痹膝䯒不收灸之三壯針入六分留七呼陽陵泉二穴土也在膝下一寸外廉陷中足少陽脈之所入也為合針入六分得氣即瀉又宜灸留針為要也治膝伸不得屈冷痹腳不仁偏風半身不遂腳冷無血色又以蹲坐取之灸亦良日可灸七壯至十七壯即止陽關二穴在陽陵泉上三寸犢鼻外陷中治膝外痛不可屈伸風痹不仁針入五分不可灸中瀆二穴在髀骨外膝上五寸分肉間陷中足少陽絡治寒氣入於分肉之間痛攻上下筋痹不仁可灸五壯針入五分留七呼環跳二穴在髀樞中側臥伸下足屈上足取之治冷風溫痹風疹偏風半身不遂腰胯痛不得轉側可灸五十壯針入一寸留十呼忌熱面豬魚生冷物等九足太陰脾經左右足及股凡二十二穴隱白二穴木也在足大指端內側去爪甲角如韭葉足太陰脈之所出也為井治腹脹喘滿不得安臥嘔吐食不下暴泄衄血卒尸蹶不識人足寒不能溫針入三分今附婦人月事過時不止刺之立愈大都二穴火也在足大指本節後陷中足太陰脈之所流也為滎治熱病汗不出手足逆冷腹滿善嘔煩熱悶亂吐逆目弦可灸三壯針入三分太白二穴土也在足內側核骨下陷中足太陰脈之所注也為腧治身熱煩滿腹脹食不化嘔吐泄膿血腰痛大便難氣逆霍亂腹中切痛可灸三壯針入三分公孫二穴在足大指本節後一寸別走陽明太陰絡治寒瘧不嗜食卒面腫煩心狂言腹虛脹如鼓可灸三壯針入四分商丘二穴金也在足內踝下微前陷中足太陰脈之所行也為經治腹脹腸中鳴不便脾虛令人不樂身寒善太息心悲氣逆痔疾骨疽蝕絶子魘夢可灸三壯針入三分三陰二穴在內踝上三寸骨下陷中足太陰厥陰少陰之交會治痃癖腹中寒膝股內痛氣逆小便不利脾病身重四肢不舉腹脹腸鳴溏泄食不化女子漏下不止可灸三壯針入三分昔有宋太子性善醫術出苑逢一懷娠婦人太子診曰是一女也令徐文伯亦診之此一男一女也太子性急欲剖視之臣請針之瀉足三陰交補手陽明合谷應針而落果如文伯之言故妊娠不可刺也漏谷二穴亦名太陰絡在內踝上六寸骨下陷中治痃癖冷氣心腹脹滿食飲不為肌膚濕痹不能久立針入三分地機二穴亦名脾舍足太陰郤別走上一寸空在膝下五寸治女子血瘕按之如湯沃股內至膝丈夫溏泄腹脅氣脹水腫腹堅不嗜食小便不利可灸三壯針入三分陰陵泉二穴水也在膝下內側輔骨下陷中伸足取之足太陰脈之所入也為合又曲膝取之治腹中寒不嗜食膈下滿水脹腹堅喘逆不得臥腰痛不得俯仰霍亂疝瘕小便不和氣淋寒熱不節針入五分血海二穴在膝臏上內廉白肉際二寸中治女子漏下惡血月事不調逆氣腹脹可灸三壯針五分箕門二穴在魚腹上越筋間動脈應手在陰股內經一云在股上起筋間治淋遺溺鼠鼷腫痛小便不通可灸三壯十足陽明胃經左右及股凡三十穴厲兌二穴金也在足大指次指之端去爪甲如韭葉足陽明脈之所出也為井治尸厥口噤氣絶狀如中惡心腹脹滿熱病汗不出寒熱瘧不嗜食而腫足胻寒喉痹齒齲惡風鼻不利多驚好臥針入一分可灸一壯內庭二穴水也在足大指次指外間陷中足陽明脈之所流也為滎治四肢厥逆腹脹滿數缺惡聞人聲振寒咽中引痛口喎齒齲痛瘧不嗜食可灸三壯針入三分陷谷二穴木也在足大指次指之間本節後陷中去內庭二寸足陽明脈之所注也為腧治面目浮腫及水病善咽腸鳴腹痛熱病汗不出振寒瘧疾針入三分留七呼可灸三壯衝陽二穴在足跗上去陷谷三寸足陽明脈之所過也為原治偏風口眼喎斜肘腫齒齲痛發寒熱腹堅大不嗜食振寒久狂登高而歌棄衣而走足緩履不收針入五分可灸三壯解溪二穴火也在衝陽後一寸五分腕上陷中足陽明脈之所行也為經治風面浮腫顏黑厥氣上衝腹脹大便下重瘈驚膝股胻腫轉筋目眩頭痛癲疾煩心悲泣霍亂頭風面目赤針入五分可灸三壯豐隆二穴在外踝上八寸下廉胻外廉陷中別走太陰治厥逆胸痛如刺腹中切痛大小便難澀厥頭痛面浮腫風逆四肢腫身濕喉痹不能言針入三分可灸三壯下廉二穴一名下巨虛在上廉下三寸當舉足取穴治少腹痛飧泄次指間痛唇乾涎出不覺不得汗出毛髮焦脫肉少氣胃中熱不嗜飲食泄膿血胸脅少腹痛暴驚狂言非常女子乳癰喉痹胻腫足跗不收針入八分可灸三壯條口二穴在下廉上一寸舉足取之治膝胻寒痠痛足緩履不收濕痹足下熱針入五分可灸三壯上廉二穴一名上巨虛在三里下三寸當舉足取之治飧泄腹脅支滿狂走夾臍腹痛食不化喘息不能行可灸三壯針入三分甄權云治藏氣不足偏風腿腲手足不仁可灸以年為壯三里二穴土也在膝下三寸䯒外廉兩筋間當舉足取之足陽明脈之所入也為合治胃中寒心腹脹滿胃氣不足聞食臭腸鳴腹痛食不化秦承祖云諸病皆治食氣水氣蠱毒痃癖四肢腫滿膝䯒痠痛目不明華池云療五勞羸瘦七傷虛乏胸中瘀血乳癰外臺明堂云人年三十以上若不灸三里令氣上衝目可灸三壯針入五分犢鼻二穴在膝臏下䯒骨上俠解大筋中治膝中疼痛不仁難跪起膝臏臃腫潰者不可治不潰者可療若犢鼻堅硬勿便攻先以洗尉即微刺之愈梁丘二穴在膝上二寸兩筋間治大驚乳痛寒痹膝不能屈伸可灸三壯針入三分陰市二穴一名陰鼎在膝上三寸伏兔下若拜而取之治寒疝少腹痛脹滿腰已下伏兔上寒如注水針入三分不可灸伏兔二穴在膝上六寸起肉一本云膝蓋上七寸治風勞氣逆膝冷不得溫針入五分不可灸髀關二穴在膝上伏兔後交分中治膝寒不仁痿厥股內筋絡急針入六分十一足少陰腎經左右足及股凡二十穴湧泉二穴木也一名地衝在足心陷中屈足卷指宛宛中足少陰脈之所出也為井治腰痛大便難心中結熱風疹風癇心痛不嗜食婦人無子咳嗽身熱喉痹胸脅滿目眩男子如蠱女子如妊娠五指端盡痛足不得踐地可灸三壯針入五分無令出血淳于意云漢北齊王阿母患足下熱喘滿謂曰熱厥也當刺之足心立愈然谷二穴火也一名龍淵在足內踝前起大骨下陷中足少陰脈之所流也為滎治咽內腫心恐懼如人將捕涎出喘呼少氣足跗腫不得履地寒疝少腹脹上搶胸脅咳唾血喉痹淋瀝女子不孕男子精溢䯒酸不能久立足一寒一熱舌縱煩滿消漏初生小兒臍風口噤痿厥洞泄可灸三壯針入三分不宜見血太溪二穴土也在足內踝後跟骨上動脈陷中足少陰脈之所注也為腧治久瘧咳逆心痛如錐刺其心手足寒至節喘息者死嘔吐口中如膠善噫寒疝熱病汗不出默默嗜臥溺黃消疸大便難咽腫唾血今附痃癖寒熱咳嗽不嗜食腹脅痛瘦脊手足厥冷可灸三壯針入三分大鐘二穴在足跟後沖中走太陽足少陰絡治實則小便淋閉灑淅腰脊強痛大便祕澀嗜臥口中熱虛則嘔逆多寒欲閉戶而處少氣不足胸脹喘息舌乾咽中食噎不得下善驚恐不樂喉中鳴咳唾血可灸三壯針入二分留七呼水泉二穴少陰郤去太溪下一寸在內踝下治月事不來來即多心下悶痛目䀮䀮不能遠視陰挺出小便淋瀝腹中痛可灸五壯針入四分照海二穴陰蹺脈所生在足內踝下治嗌乾四肢懈惰善悲不樂久瘧卒疝少腹痛嘔吐嗜臥大風偏枯半身不遂女子淋瀝陰挺出針入三分可灸三壯復溜二穴金也一名昌陽一名伏白在足內踝上二寸陷中足少陰脈之所行也為經治腰脊內引痛不得俯仰起坐目䀮䀮善怒多言舌乾涎自出足痿不收履䯒寒不自溫腹中雷鳴腹脹如鼓四肢腫十水病溺青赤黃白黑青取井赤取滎黃取腧白取經黑取合血痔泄後腫五淋小便如散大骨寒熱汗注不止可灸五壯針入三分留三呼交信二穴在內踝上二寸少陰前太陰後廉前筋骨間足陰蹺之郤治氣淋㿉疝陰急股引腨內廉骨痛又泄利赤白女子漏血不止可灸三壯針入四分留五呼築賓二穴在內踝上腨分中治小兒胎疝痛不得乳癲疾狂言嘔吐沫足腨痛可灸五壯針入三分陰谷二穴水也在膝內輔骨後大筋下小筋上按之應手屈膝乃取之足少陰脈之所入也為合治膝痛如離不得屈伸舌縱涎下煩逆溺難少腹急引陰痛股內廉痛婦人漏血不止腹脹滿不得息小便黃男子如蠱女子如妊娠可灸三壯針入四分留七呼十二足太陽膀胱經左右足凡三十六穴至陰二穴金也在足小指外側去爪甲角如韭葉足太陽脈之所出也為井治目生翳鼻塞頭重風寒從足小指起脈痹上下帶胸脅痛無常轉筋寒瘧汗不出煩心足下熱小便不利失精針入二分可灸三壯通谷二穴水也在足小指外側本節前陷中足太陽脈之所流也為滎治頭重目眩善驚引鼽衄頸項痛目䀮䀮甄權云結積留飲胸滿食不化可灸三壯針入二分束骨二穴木也在足小指本節後陷中足太陽脈之所注也為腧治腰如折腨如結耳聾惡風寒目眩項不可回顧目內眥赤爛可灸三壯針三分京骨二穴在足外側大骨下赤白肉際陷中足太陽脈之所過也為原治膝痛不得屈伸目內眥赤爛發瘧寒熱善驚不欲食筋攣足䯒酸髀樞痛頸項強腰背不可俯仰鼽衄血不止目眩針入三分可灸七壯申脈二穴陽蹺脈所出在外踝下陷中容爪甲白肉際治腰痛不能舉體足䯒寒不能久立坐若下舟車中痛疾針入三分金門二穴一名梁關在足外踝下足太陽郤陽維所別屬也治霍亂轉筋膝䯒酸身戰不能久立癲癇尸厥暴疝小兒發癇張口搖頭身反折可灸三壯炷如小麥大針入一分僕參二穴一名安邪在跟骨下陷中拱足得之治足跟痛不得履地腳痿轉筋尸厥如中惡狀霍亂吐逆癲癇狂言見鬼針入三分可灸七壯崑崙二穴火也在足外踝後跟骨上陷中足太陽脈之所行也為經治腰尻痛足端腫不得履地鼽衄腳如結踝如裂頭痛肩背拘急咳喘暴滿陰腫痛小兒發癇瘛瘲炷如小麥大可灸三壯針入三分付陽二穴在足外踝上三寸太陽前少陽後筋骨間陽蹺之郤治痿厥風痹頭重䪼痛髀樞股䯒痛瘛瘲風痹不仁時有寒栗四肢不舉可灸三壯針入五分留七呼飛揚二穴一名厥陰足太陽絡別走少陰在外踝上七寸治野雞痔歷節風足指不得屈伸頭目眩逆氣鼽衄癲疾寒瘧可灸三壯針入三分承山二穴一名魚腹一名肉柱在兌腨腸下分肉之間陷中治腰背痛腳腨重戰栗不能立腳氣膝下腫霍亂轉筋大便難久痔腫痛可灸五壯針入七分承筋二穴一名腨腸一名直腸在腨腸中央陷中治寒痹轉筋肢腫大便難腳腨酸重引少腹痛鼻鼽衄腰背拘急霍亂可灸三壯禁針合陽二穴在膝約中央下二寸治腰脊強引腹痛陰股熱膝酸痠重履步難寒疝陰遍痛女子崩中針入六分可灸五壯委中二穴土也在膕中央約紋動脈陷中足太陽脈之所入也為合治腰俠脊沉沉然遺溺腰重不能舉體風痹髀樞痛可出血痼疹皆愈今附委中者血郤也熱病汗不出足熱厥逆滿膝不得屈伸取其經血立愈委陽二穴三焦下輔腧也在足太陽之後出於膕中外廉兩筋間屈伸取之承扶下六寸足太陽脈之中治腋下腫痛胸滿膨膨筋急身熱飛尸遁注痿厥不仁小便淋瀝可灸三壯針入七分浮郤二穴在委陽上一寸展膝得之治小腸熱大腸結股外經筋急髀樞不仁可灸三壯針入五分殷門二穴在肉郤下六寸治腰脊不可俯仰舉重惡血注之股外腫針入七分承扶二穴一名肉郤一名陰關一名皮部在尻臀下股陰衝上紋中治腰脊相引如解久痔尻睢腫大便難陰胞有寒小便不利針入七分十頭面偃伏正側各部各經穴主治病症一偃伏頭部中行凡一十穴神庭一穴在鼻直入髮際五分督脈足太陽陽明三脈之會治癲疾風癇戴目上不識人頭風目眩鼻出清涕不止目淚出驚悸不得安寢可灸二七壯至七七壯止岐伯曰凡欲療風勿令灸多緣風性輕多即傷惟宜灸七壯至三七壯止禁不可針針即發狂忌生冷雞豬酒面動風物等上星一穴在鼻直上入髮際一寸陷中督脈氣所發治頭風面虛腫鼻塞不聞香臭目眩痰瘧振寒熱病汗不出目睛痛不能遠視以細三稜針刺之即宣泄諸陽熱氣無令上衝頭目可灸七壯不宜多灸若頻灸即拔氣上令人目不明忌如前法囟會一穴在上星後一寸陷中可容豆督脈氣所發治目眩面腫鼻塞不聞香臭驚癇戴目上不識人可灸二七壯至七七壯初灸即不痛病去即痛痛即罷灸若是鼻塞灸至四日漸退七日頓愈針入二分留三呼得氣即瀉頭風生白屑多睡針之彌佳針訖以末鹽生麻油相和揩髮根下頭風即永除若八歲以下即不得針蓋緣囟門未合刺之不幸令人夭忌熱面豬魚物等前頂一穴在囟會後一寸五分骨陷中督脈氣所發據甄權針經云是一寸今即依素問一寸五分為定療頭風目眩面赤腫小兒驚癇風癇瘛瘲發即無時鼻多清涕頂腫痛針入一分可灸三壯至七七壯即止忌如前法百會一穴一名三陽五會在前頂後一寸五分頂中央旋毛中可容豆督脈足太陽交會於巔上治小兒脫肛久不瘥風癇中風角弓反張或多哭言語不擇發即無時盛則吐沫心煩驚悸健忘痎瘧耳鳴耳聾鼻塞不聞香臭針入二分得氣即瀉可灸七壯至七七壯即止唐秦鳴鶴刺微出血頭痛立愈凡灸頭頂不得過七七壯緣頭頂皮膚淺薄灸不宜多後頂一穴一名交沖在百會後一寸五分枕骨上督脈氣所發治目䀮䀮頸項惡風寒目眩頭偏痛可灸五壯針入三分強間一穴一名大羽在後頂後一寸五分督脈氣所發治腦旋目暈頭痛不可忍煩心嘔吐涎沫發即無時頸項強左右不得回顧可灸七壯針入二分腦戶一穴一名合顱在枕骨上強間後一寸五分督脈足太陽之會禁不可針針之令人啞不能言治目睛痛不能遠視面赤目黃頭腫可灸七壯亦不可妄灸令人失喑風府一穴一名舌本在項髮際上一寸大筋內宛宛中疾言其肉立起言休立下督脈陽維之會禁不可灸不幸使人失喑治頭痛頸急不得回顧目眩鼻衄喉咽痛狂走目妄視針入三分啞門一穴一作喑一名舌橫一名舌厭在項中央入髮際五分宛宛中督脈陽維之會入系舌本仰頭取之禁不可灸灸之令人啞治頸項強舌緩不能言諸陽熱氣盛鼻衄血不止頭痛風汗不出寒熱風痙脊強反折瘛瘲癲疾頭重針入二分二偃伏頭部第二行左右凡一十四穴曲差二穴在神庭傍一寸五分入髮際足太陽脈氣所發治心中煩滿汗不出頭頂痛身體煩熱目視不明針入二分可灸三壯五處二穴在上星旁一寸五分足太陽脈氣所發治目不明頭風目眩瘛瘲目戴上不識人針入三分留七呼可灸三壯承光二穴在五處後一寸五分足太陽脈氣所發治鼻塞不聞香臭口喎鼻多清涕風眩頭痛嘔吐心煩目生白膜針入三分禁不可灸忌如前法通天二穴在承光後一寸五分足太陽脈氣所發治頸項轉側難鼻塞悶偏風口喎鼻多清涕衄血頭重針入三分留七呼可灸三壯絡卻二穴一名強陽又名腦蓋在通天後一寸五分足太陽脈氣所發治青風內障目無所見頭旋耳鳴可灸三壯玉枕二穴在絡卻後一寸五分俠腦戶旁一寸三分起肉枕骨入髮際上三寸足太陽脈氣所發治目痛不能視腦風疼痛不可忍者可灸三壯天柱二穴俠項後髮際大筋外廉陷中足太陽脈氣所發治足不任身體肩背痛欲折目瞑視今附治頸項筋急不得回顧頭旋腦痛針入五分得氣即瀉立愈三偃伏頭部第三行左右凡一十二穴臨泣二穴在目上直入髮際五分陷中足太陽少陽之會治卒中風不識人目眩鼻塞目生白翳多淚針入三分留七呼得氣即瀉忌如前法目窗二穴在臨泣後一寸五分足少陽陽維之會治頭面浮腫痛引目外眥赤痛忽頭旋目䀮䀮遠視不明針入三分可灸五壯今附三度刺目大明正營二穴在目窗後一寸足少陽陽維之會治牙齒痛唇吻急強齒齲痛頭項偏痛針入三分可灸五壯承靈二穴在正營後一寸五分足少陽陽維之會治腦風頭疼惡風寒鼽鼻塞息不利可灸三壯腦空二穴一名顳顬在承靈後一寸五分俠玉枕骨下陷中足少陽陽維之會治腦風頭痛不可忍目瞑心悸發即為癲風引目眇勞疾羸瘦體熱頸項強不得回顧針入五分得氣即瀉可灸三壯魏公苦患頭風發即心悶亂目眩華他當針而立愈忌如前法風池二穴在顳顬後髮際陷中足少陽陽維之會治灑淅寒熱溫病汗不出目眩苦頭痛痎瘧頸項痛不得回顧目淚出缺氣多鼻鼽衄目內眥赤痛氣發耳塞目不明腰傴僂引項筋無力不收針入七分留七呼可灸七壯四側頭部左右凡二十六穴頷厭二穴在曲周下顳顬上廉手足少陽陽明之交會治頭風眩目無所見偏頭痛引目眥急耳鳴多嚏頸項痛針入七分留七呼可灸三壯忌如前法懸顱二穴在曲周上顳顬中足少陽脈氣所發治熱病煩滿汗不出頭偏痛引目外眥赤身熱齒痛面膚赤痛針入三分留三呼可灸三壯忌如前懸釐二穴在曲周上顳顬下廉手足少陽陽明之交會治熱病汗不出頭偏痛煩心不欲食目鋭眥赤痛針入三分可灸三壯天衝二穴在耳上如前三分治頭痛癲疾風痙牙齦腫善驚恐可灸七壯針入三分率谷二穴在耳上入髮際一寸五分足太陽少陽之會治膈胃寒痰傷酒風發腦兩角強痛不能飲食煩滿嘔吐不止可灸三壯針入三分曲鬢二穴在耳上髮際曲陷中鼓頷有空足太陽少陽之會治頰頷腫引牙車不得開急痛口噤不能言灸亦良可灸七壯針入三分角孫二穴在耳廓中間上開口有空手足少陽之會治目生膚翳齒齦腫可灸三壯明堂別無療病法竅陰二穴在枕骨下搖動有空足太陽少陽之會治勞疸發厲項痛引頭目痛針入三分可灸七壯浮白二穴在耳後入髮際一寸足太陽少陽之會治發寒熱喉痹咳逆痰沫胸中滿不得喘息耳鳴䐜䐜無所聞頸項癰腫及癭氣肩背不舉悉皆治之針入五分可灸七壯顱息二穴在耳後間青絡脈足少陽脈氣所發治身熱頭重脅痛不得轉側風痙耳聾小兒發癇瘛瘲嘔吐涎沫驚恐失精瞻視不明不宜針即可灸七壯瘈脈二穴一名資脈在耳本後雞足青絡脈刺出血如豆汁不宜出血多治頭風耳鳴小兒驚癇瘛瘲嘔吐泄痢無時驚恐眵瞢目睛不明可灸三壯針入一分完骨二穴在耳後入髮際四分治頭痛煩心癲疾頭面虛腫齒齲偏風口眼喎斜頸項痛不得回顧小便赤黃喉痹頰腫針入五分可灸七壯翳風二穴在耳後陷中按之引耳中手足少陽之會治耳聾口眼喎斜失缺脫頷口噤不開吃不能言頰腫牙車急痛針入七分可灸七壯五正面部中行凡六穴素髎一穴一名面正在鼻柱之端督脈所發此穴諸方闕治療法外臺云不宜灸千金治鼻塞瘜肉不消多涕生瘡針入一分水溝一穴在鼻柱下一名人中督脈手陽明之會治消渴飲水無度水氣遍身腫失笑無時癲癇語不識尊卑乍喜乍哭牙關不開面腫唇動狀如蟲行卒中惡針入四分留五呼得氣即瀉灸亦得然不及針若灸可小雀糞大為艾炷目可穴三壯至七壯即罷風水面腫針此一穴出水盡即頓愈忌如前法兌端一穴在唇上端治癲疾吐沫小便黃舌乾消渴衄血不止唇吻強齒齦痛針入二分可灸三壯炷如大麥出千金外臺甲乙經齦交一穴在唇內齒上齦縫筋中治面赤心煩痛頸項急不得回顧新附治小兒面瘡癬久不除點烙亦佳鼻塞不利目淚眵汁內眥赤癢痛生白膚翳鼻中瘜肉蝕瘡針入三分可灸三壯承漿一穴一名懸漿在頤前唇下宛宛中足陽明任脈之會療偏風口喎面腫消渴口齒疳蝕生瘡灸亦佳日可灸七壯至七七壯止灸即血脈通宣其風應時立愈其艾炷不用大一依小竹箸頭作炷脈粗細狀如細線艾炷破肉但令當脈灸亦能愈疾凡灸臍下久冷疝瘕痃癖氣塊伏梁積氣宜艾炷大故小品諸方云腹背宜灸五百壯四肢則但去風邪不宜多灸七壯至七七壯止不得過隨年數如巨闕鳩尾雖是胸腹之穴灸不過七七壯艾炷不須大以竹箸頭作炷正當脈上灸之若灸胸腹艾炷大灸多令人永無心力如頭頂穴若灸多令人失精神臂腳穴灸多令人血脈枯竭四肢細瘦無力既復失精神又加於細瘦即脫人真氣針入三分得氣即瀉忌如前法廉泉一穴一名舌本在頷下結喉上陰維任脈之會治舌下腫難言舌縱涎出咳嗽上氣喘息嘔沫口噤舌根急縮下食難可灸三壯針入三分得氣即瀉以上六穴忌並如前法六正面部第二行左右凡一十穴攢作二穴一名始光一名光明一名員柱在兩眉頭陷中足太陽脈氣所發治目䀮䀮視物不明眼中赤痛及臉瞤動針入一分留三呼瀉三吸徐徐而出針不宜灸宜以細三稜針刺之宣泄熱氣三度針目大明忌如前法睛明二穴一名淚孔在目內眥手足太陽少陽足陽明五脈之會治攀睛翳膜覆瞳子惡風淚出目內眥癢痛小兒雀目疳眼大人氣眼冷淚䐴目視物不明大眥胬肉侵睛針入一寸五分留三呼禁不可灸雀目者宜可久留針然後速出針忌如前法巨髎二穴俠鼻孔傍一作旁八分直目瞳子蹺脈足陽明之會治青盲目無所見遠視䀮䀮白翳覆瞳子面風寒鼻塞䪼上腫壅痛瘛瘲口喎針入三分得氣而瀉灸亦良可灸七壯迎香二穴在禾髎上一寸鼻孔傍五分手足陽明之會治鼻有瘜肉不聞香臭衄血偏風口喎面癢浮腫風動葉葉狀如蟲行或癢腫痛針入三分留三呼不宜灸忌如常法禾髎二穴在鼻孔下俠水溝傍五分手陽明脈氣所發治鼻衄血不止鼻清涕生瘡口噤不開針入二分七正面部第三行左右凡一十穴陽白二穴在眉上一寸直目瞳子足少陽陽維之會治頭目痛目眵背腠寒栗重衣不得溫可灸三壯針入二分承泣二穴在目下七分直目瞳子陷中蹺脈任脈足陽明之會治口眼喎斜目瞤面葉葉動牽口眼目視䀮䀮冷淚眼眥赤痛禁不宜針針之令人目烏色可灸三壯炷如大麥忌如常法四白二穴在目下一寸足陽明脈氣所發治頭痛目眩眼生白翳微風目瞤動不息可灸七壯針入三分凡用針穩審方得下針若針深即令人目烏色地倉二穴俠口吻傍四分外如近下有脈微微動蹺脈手陽明之交會若久患風其脈亦有不動者治偏風口喎目不得閉失喑不語飲食不收水漿漏落眼瞤動不止病左治右病右治左針入三分留五呼得氣即瀉灸亦得日可灸二七壯重者七七壯其艾作炷大小狀如粗叉腳大灸炷若大口轉喎卻灸承漿七七壯即愈慎豬魚熱面房勞等大迎二穴在曲頷前一寸二分骨陷中動脈又以口下當兩肩足陽明脈氣所發治寒熱頸痛瘰癧口喎齒齲痛數缺氣風痙口噤牙疼頰頷腫惡寒舌強不能言針入三分留七呼可灸三壯今附風癕面浮腫目不得閉唇吻瞤動不止當針之頓愈八正面部第四行左右凡八穴本神二穴在曲差傍一寸五分一曰直耳上入髮際四分足少陽陽維之會治目眩頸項強急痛胸脅相引不得轉側癲疾嘔吐涎沫針入三分可灸七壯絲竹空二穴一名目髎在眉後陷中手少陽脈氣所發禁不可灸不幸使人目小又令人目無所見治目眩頭痛目赤視物眩眩風癇目戴上不識人眼睫毛倒發狂吐涎沫發即無時針入三分留三呼宜瀉不宜補瞳子髎二穴在目外眥五分手太陽手足少陽之會治青盲無所見遠視䀮䀮目中膚翳白膜頭痛目外眥赤痛可灸三壯針入三分顴髎二穴在面頄骨下廉鋭骨端陷中手少陽太陽之會治口喎面赤目黃眼瞤動不止䪼腫齒痛針入二分九側面部左右凡一十六穴頭維二穴在額角入髮際本神傍一寸五分足少陽陽明脈之交會治頭偏痛目視物不明今附治微風眼瞼瞤動不止風淚出針入三分禁不可灸客主人二穴一名上關在耳前起骨上廉開口有空動脈宛宛中足陽明少陽之會治唇吻強耳聾瘛瘲口沫出目眩牙車不開口噤嚼食鳴偏風口眼喎斜耳中狀如蟬聲可灸七壯艾炷不用大箸頭作炷若針必須側臥張口取之乃得禁不可針深問曰何以不得針深岐伯曰上關若刺深令人缺而不得㰦下關不得久留針即㰦而不得缺牙關急是故上關不得刺深下關不得久留針也下關二穴在客主人下耳前動脈下廉合口有空開口即閉足陽明少陽之會療聤耳有膿汁出偏風口目喎牙關脫臼其穴側臥閉口取之針入四分得氣即瀉禁不可灸牙齦腫處張口以三稜針出膿血多含鹽湯即不畏風慎如前法和髎二穴在耳前鋭發下橫動脈手少陽脈氣所發治牙車引急頭重痛耳中嘈嘈頷頰腫針入七分可灸三壯聽會二穴在耳前陷中上關下一寸動脈宛宛中張口得之足少陽脈氣所發治耳聾耳中狀如蟬聲通耳食牙車脫臼相離一二寸其穴側臥張口取之針入七分留三呼得氣即瀉不須補灸亦良日可灸五壯至二七壯止十日後依前報灸之即愈忌食動風生冷豬魚物等耳門二穴在耳前起肉當耳缺者治耳有膿汁出生瘡𤹀都禮切耳聤耳鳴耳如蟬聲重聽無所聞齒齲針入三分留三呼可灸三壯聽宮二穴在耳中珠子大如赤小豆手足少陽太陽三脈之會治耳聾如物填塞無所聞耳中嘈嘈心腹滿臂痛失聲針入三分可灸三壯頰車二穴在耳下曲頰端陷中足陽明脈氣所發治牙關不開口噤不語失喑牙車疼痛頷頰腫頸強不得回顧其穴側臥開口取之針入四分得氣即瀉灸亦良日可灸七壯至七七壯止炷如大麥慎如常法十一肩膊背腧各部各經穴主治病症一肩膊部左右凡二十六穴肩井二穴在肩上陷缺盆上大骨前一寸半以三指按取之當中指下陷中者是一名膊井手足少陽陽維之會治五勞七傷頸項不得回顧背膊間兩手不得向頭或因撲傷腰髖疼腳氣上攻甲乙經云只可針入五分此膊井足陽明之會乃連入五臟氣若刺深則令人悶到不識人即速須三里下氣先補不瀉須臾平復如故凡針肩井皆以三里下其氣若婦人墮胎後手足厥逆針肩井立愈若灸更勝針可灸七壯天髎二穴在肩缺盆中上毖骨之際陷中央手少陽陽維之會治肩肘痛引頸項急寒熱缺盆中痛汗不出胸中煩滿針入八分可灸三壯巨骨二穴在肩端上行兩叉骨間陷中手陽明蹺脈之會治背膊痛胸中有瘀血肩臂不得屈伸而痛灸五壯針入一寸臑會二穴一名臑髎肩前廉去肩頭三寸手陽明之絡治項癭氣瘤臂痛不能舉氣腫痓痛針入七分留十呼得氣即瀉可灸七壯肩髃二穴在肩端兩骨間陷者宛宛中舉臂取之手陽明蹺脈之會療偏風半身不遂熱風癮疹手臂攣急捉物不得挽弓不開臂細無力筋骨痠疼可灸七壯至二七壯以瘥為度若灸偏風不遂七七壯止不宜多灸恐手臂細若風病筋骨無力久不瘥當灸不畏細也刺即泄肩臂熱氣唐庫狄欽若患風痹手臂不得伸引諸醫莫能愈甄權針肩髃二穴令將弓箭向垛射之如故肩髎二穴在肩端臑上陷中舉臂取之治肩重不可舉臂肘可灸三壯針入七分肩貞二穴在肩曲胛下兩骨解間肩髃後陷中治風痹手臂不舉肩中熱痛針入五分臑腧二穴在肩髎後大骨下胛上廉陷中手足太陽陽維蹺脈之會治寒熱肩腫引胛中痛臂酸無力針入八分可灸三壯天宗二穴在秉風后大骨下陷中手太陽脈氣所發治肩胛痛臂肘外後廉痛頰頷腫可灸三壯針入五分留六呼秉風二穴在肩上小髃後舉臂有空手太陽陽明手足少陽之會治肩痛不能舉可灸五壯針入五分曲垣二穴在肩中央曲胛陷中按之應手痛治肩痛周痹氣注肩膊拘急疼悶可灸三壯針入五分肩外腧二穴在肩胛上廉去脊三寸陷中治肩胛痛熱而寒至肘可灸三壯針入六分肩中腧二穴在肩胛內廉去脊二寸陷中治寒熱目視不明咳嗽上氣唾血針入三分留七呼可灸十壯二背腧部中行凡一十三穴大顀一穴一本作椎今從頁作顀余皆仿此在第一椎上陷中手足三陽督脈之會療五勞七傷溫瘧痎瘧氣疰背膊拘急頸項強不得回顧風勞食氣針入五分留三呼瀉五吸若灸以年為壯甲乙經云大椎下至尾骶骨二十一椎長三尺折量取腧穴凡度周身孔穴遠近分寸以男左女右取中指內紋為一寸素問云同身寸是也又多用繩度量孔穴繩多出縮取穴不準今以薄竹片點量分寸療病準的陶道一穴在大椎節下間俯而取之督脈足太陽之會治頭重目瞑灑淅寒熱脊強汗不出可灸五壯針入五分身柱一穴在第三椎節下間督脈氣所發治癲疾瘛瘲怒欲殺人身熱狂走譫言見鬼針入五分灸七七壯神道一穴在第五椎節下間俯而取之督脈氣所發治寒熱頭痛進退往來痎瘧恍惚悲愁健忘驚悸可灸七七壯至百壯止小兒風癇瘛瘲可灸七壯靈臺一穴在第六椎節下間俯而取之督脈氣所發經闕療病法出素問至陽一穴在第七椎節下間俯而取之督脈氣所發治寒熱解散淫濼脛酸四肢重痛少氣難言可灸三壯針入五分筋縮一穴在第九椎節下間俯而取之督脈氣所發治驚癇狂走癲疾脊急強目轉上視可灸三壯針入五分脊中一穴一名神宗在第十一椎節下間俯而取之督脈氣所發治風癇癲邪溫病積聚下利禁不可灸灸則令人腰背傴僂針入五分得氣即瀉懸樞一穴在第十三椎節下間伏而取之督脈氣所發治積氣上下行水穀不化下利腰脊強不得屈伸腹中留積針入三分可灸三壯命門一穴一名屬纍在第十四椎節下間伏而取之督脈氣所發治頭痛不可忍身熱如火汗不出瘛瘲裡急腰腹相引痛針入五分可灸三壯陽關一穴在第十六椎節下間伏而取之針入五分可灸三壯闕療病法出素問腰腧一穴一名背解一名腰柱一名腰戶在第二十一椎節下間宛宛中以挺身伏地舒身兩手相重支額縱四體然後乃取得其穴督脈氣所發治腰髖疼腰脊強不得回轉溫瘧痎瘧針入八分留三呼瀉五吸可灸七壯至七七壯慎房勞舉重強力甲乙經云針入二寸留七呼灸七七壯長強一穴一名氣之陰郤督脈絡別甲乙經云在脊骶端足少陰少陽所結會治腸風下血五種痔疳蝕下部䘌針入三分抽針以太痛為度其穴跌地取之乃得灸然不及針日灸三十壯至二百壯止此痔根本是冷慎冷食房勞甲乙經云針入二寸留七呼三背腧部第二行左右凡四十四穴大抒二穴在項後第一椎下兩傍相去各一寸五分陷中甲乙經云足太陽少陽之會療瘧頸項強不可俯仰頭痛振寒瘛瘲氣實脅滿傷寒汗不出脊強喉痹煩滿風勞勞氣咳嗽胸中鬱郁身熱目眩針入五分可灸七壯風門二穴一名熱府在第二椎下兩旁相去各一寸五分督脈足太陽之會治傷寒頸項強目瞑多嚏鼻鼽出清涕風勞嘔逆上氣胸背痛喘氣臥不安針入五分留七呼今附若頻刺泄諸陽熱氣背永不發癰疽可灸五壯肺腧二穴在第三椎下兩傍相去各一寸五分足太陽脈氣所發治上氣嘔吐支滿不嗜食汗不出腰背強痛寒熱喘滿虛煩口乾傳尸骨蒸勞肺痿咳嗽針入三分留七呼得氣即瀉出甲乙甄權針經云在第三椎下兩傍以搭手左取右右取左當中指末是穴治胸中氣滿背僂如龜腰強頭目眩令人失顏色針入五分留七呼可灸一百壯厥陰腧二穴在第四椎下兩傍相去各一寸五分治逆氣嘔吐心痛留結胸中煩悶針入三分可灸七七壯出山眺經心腧二穴在第五椎下兩傍相去各一寸五分治心中風狂走發癇語悲泣心胸悶亂煩滿汗不出結積寒熱嘔吐不下食咳唾血針入三分留七呼得氣即瀉不可灸膈腧二穴在第七椎下兩傍相去各一寸五分治咳而嘔逆膈胃寒痰食飲不下胸滿肢腫兩脅痛腹脹胃脘暴痛熱病汗不出喉痹腹中積癖默默嗜臥四肢怠情不欲動身常濕不能食食則心痛周痹身皆痛針入三分留七呼可灸三壯肝腧二穴在第九椎下兩傍相去各一寸五分治咳引兩脅急痛不得息轉側難撅脅下與脊相引而反折目上視目眩循眉頭痛驚狂鼽衄起則目䀮䀮目生白翳咳引胸中痛寒疝少腹痛唾血短氣針入三分留六呼可灸三壯膽腧二穴在第十椎下兩傍相去各一寸五分治心腹脹滿嘔則食無所出口苦舌乾咽中痛食不下目黃胸脅不能轉側頭痛振寒汗不出腋下腫針入五分可灸三壯脾腧二穴在第十一椎下兩傍相去各一寸五分治腹脹引胸背痛食飲倍多身漸羸瘦黃疸善缺脅下滿泄利體重四肢不收痃癖積聚腹痛不嗜食痰瘧寒熱針入三分留七呼灸三壯胃腧二穴在第十二椎下兩傍相去各一寸五分治胃中寒腹脹不嗜食羸瘦腸鳴腹痛胸脅支滿脊痛筋攣針入三分留七呼可灸隨年為壯三焦腧二穴在第十三椎下兩傍相去各一寸五分治腸鳴腹脹水穀不化腹中痛欲泄注目眩頭痛吐逆飲食不下肩背拘急腰脊強不得俯仰針入五分留七呼可灸三壯腎腧二穴在第十四椎下兩傍相去各一寸五分與臍平治虛勞羸瘦耳聾腎虛水藏久冷心腹䐜脹兩脅滿引少腹急痛目視䀮䀮少氣溺血小便濁出精陰中疼五勞七傷虛憊腳膝拘急足寒如冰頭重身熱振栗腰中四肢淫濼洞泄食不化身腫如水針入三分留七呼可灸以年為壯慎如前法大腸腧二穴在第十六椎下兩傍相去各一寸五分治腰痛腸鳴腹脹繞臍切痛大小便不利洞泄食不化脊強不得俯仰針入三分留六呼可灸三壯慎豬魚酒面生冷物等小腸腧二穴在第十八椎下兩傍相去各一寸五分治小便赤澀淋瀝少腹㽲痛腳腫短氣不嗜食大便膿血出五痔疼痛婦人帶下針入三分留六呼可灸三壯膀胱腧二穴在第十九椎下兩傍相去各一寸五分足太陽脈氣所發治風勞腰脊痛泄利腹痛小便赤澀遺溺陰生瘡少氣足䯒寒拘急不得屈伸女子瘕聚腳膝無力針入三分留六呼可灸三壯中膂腧二穴一名脊內腧在第二十椎下兩傍相去各一寸五分俠脊起肉治腸冷赤白痢腎虛消渴汗不出腰脊不得俯仰腹脹脅痛針入三分留十呼可灸三壯白環腧二穴在第二十一椎下兩傍相去各一寸五分足太陽脈氣所發治腰脊攣急痛大小便不利甲乙經云針如腰戶法同挺腹地端身兩手相重支額縱息令皮膚俱緩乃取其穴針入八分得氣即先瀉訖多補之治腰髖疼腳膝不遂溫瘧腰脊冷疼不得安臥勞損虛風不宜灸慎房勞不得舉重物上髎二穴在第一空腰髁下夾脊陷中足太陽少陽絡治腰膝冷痛嘔逆鼻衄寒熱瘧婦人絶嗣陰挺出不禁針入三分可灸七壯次髎二穴在第二空夾脊陷中治疝氣下墜腰脊痛不得轉搖急引陰器痛不可忍腰以下至足不仁背腠寒小便赤淋心下堅脹可灸七壯針入三分中髎二穴在第三空夾脊陷中厥陰少陽所結治丈夫五勞七傷六極腰痛大便難腹脹下利小便淋澀飧泄婦人絶子帶下月事不調針入二分留十呼可灸三壯下髎二穴在第四空夾脊陷中足太陽厥陰所結治腰痛不得轉側女子下蒼汁不禁陰中痛引少腹急疼大便下血寒濕內傷針入二分留十呼可灸三壯會陽二穴一名利機在陰尾骨兩傍督脈氣所發治腹中冷氣泄利不止久痔陽氣虛乏陰汗濕針入八分可灸五壯四背腧部第三行左右凡二十八穴附分二穴在第二椎下附項內廉兩傍相去各三寸手足太陽之會正坐取之治肩背拘急風冷客於腠理頸項強痛不得回顧風勞臂肘不仁可灸五壯針入三分魄戶二穴在第三椎下兩傍相去各三寸正坐取之足太陽脈氣所發治背髆痛咳逆上氣嘔吐煩滿虛勞肺痿五尸走疰項強不得回顧針入五分得氣即瀉又宜久留針灸亦得日可灸七壯至百壯止忌豬魚酒面生冷物等膏肓腧二穴在第四椎下兩傍相去各三寸主無所不療羸瘦虛損夢中失精上氣咳逆發狂健忘又取穴之法令人正坐曲脊伸兩手以臂著膝前令正直手大指與膝頭齊以物支肘勿令臂得動搖也從胛骨上角摸索至骨下頭其間當有四肋三間灸中間從胛骨之裡去胛容側指許摩𦛗去表肋間空處按之自覺牽引於肩中灸兩胛中一處至百壯多至三百壯當覺下嚨嚨然流水之狀亦當有所下出若得痰疾則無所不下也如病人已因不能正坐當令側臥挽上臂令前取穴灸之又以右手從左肩上住指頭所不及者是穴也左取亦然乃以前法灸之若不能久坐當伸兩臂令人挽兩胛骨使相離不爾即胛角覆其空灸之無驗此灸訖後令人陽氣康盛當消息以自補養論曰昔在和緩不救晉候之疾其在膏之上肓之下針藥不能即此穴是也人不能求得此穴所以宿病難遣若能用心此方便求得灸之無疾不愈出千金外臺神堂二穴在第五椎下兩傍相去各三寸正坐取之足太陽脈氣所發治肩痛胸腹滿灑淅寒熱背脊強急可灸五壯針入三分噫嘻二穴在肩髆內廉俠第六椎下兩傍相去各三寸正坐取之足太陽脈氣所發以手痛按之病者言噫嘻針入六分留三呼瀉五吸治腋拘攣暴脈急引脅痛熱病汗不出溫瘧肩背痛目眩鼻衄喘逆腹脹肩髆內廉痛不得俯仰可灸二七壯至百壯至忌莧菜白酒物等膈關二穴在第七椎下兩傍相去各三寸陷中正坐取之足太陽脈氣所發治背痛惡寒脊強俯仰難食飲不下嘔噦多涎唾胸中噎悶可灸五壯針入五分魂門二穴在第九椎下兩傍相去各三寸陷中正坐取之足太陽脈氣所發治食飲不下腹中雷鳴大便不節小便赤黃可灸三壯針入五分陽綱二穴在第十椎下兩傍相去各三寸陷中正坐取之足太陽脈氣所發治腹滿䐜脹大便泄利小便赤澀身熱目黃可灸三壯針入五分意舍二穴在第十一椎下兩傍相去各三寸陷中正坐取之足太陽脈氣所發治腹滿虛脹大便滑泄背痛惡風寒食飲不下嘔吐不止消渴目黃可灸五十壯至一百壯針入五分胃倉二穴在第十二椎下兩傍相去各三寸足太陽脈氣所發治腹內虛脹水腫食飲不下惡寒背脊不得俯仰可灸五七壯針入五分肓門二穴在第十三椎下兩傍相去各三寸叉肋間異經云與鳩尾相直治心下肓大堅婦人乳有餘疾可灸三十壯針入五分志室二穴在第十四椎下兩傍相去各三寸陷中足太陽脈氣所發治腰脊強痛食飲不消腹中堅急陰痛下腫失精小便淋瀝針入五分灸三壯胞肓二穴在第十九椎下兩傍相去各三寸陷中伏而取之足太陽脈氣所發治腰痛惡寒少腹堅急癃閉下重不得小便澀痛腰背卒痛可灸五七壯針入五分秩邊二穴在第二十椎下兩傍相去各三寸陷中伏而取之足太陽脈氣所發治腰痛不能俯仰小便赤澀腰尻重不能舉五痔發腫針入五分可灸三壯慎如前法十二側頸項膺腧側腋各部各經穴主治病症一側頸項部左右凡一十八穴天容二穴在耳下曲頰後手太陽脈氣所發治喉痹寒熱咽中如鯁針入一寸可灸三壯天牖二穴在頸筋缺盆上天容後天柱前完骨下髮際上手少陽脈氣所發治頭風面腫項強不得回顧針入一寸留七呼不宜補之亦不宜灸若灸之面腫眼合先取噫嘻後針天牖風池其病即瘥若不先針噫嘻即難瘳其疾也天窗二穴一名窗籠在頸大筋前曲頰下扶突後動脈應手陷中手太陽脈氣所發治耳鳴聾無所聞頰腫喉中痛暴喑不能言肩痛引項不得回顧可灸三壯針入三分天鼎二穴在頸缺盆直扶突後一寸手陽明脈氣所發治暴喑氣哽喉痹咽腫不得息飲食不下喉中鳴可灸三壯針入三分扶突二穴一名水穴在人迎後一寸五分手陽明脈氣所發治咳多唾上氣咽引喘息喉中如水雞鳴可灸三壯針入三分缺盆二穴一名天蓋在肩下橫骨陷中治寒熱瘰癧缺盆中腫外潰則生胸中熱滿腹大水氣缺盆中痛汗出喉痹咳嗽可灸三壯針入三分不直刺太深使人逆息也人迎二穴一名五會在頸大脈動脈應手俠結喉傍仰而取之以候五臟氣足陽明脈所發禁不可灸灸之不幸傷人治吐逆霍亂胸滿喘呼不得息項氣悶腫食不下針入四分水突二穴在頸大筋前直人迎下氣舍上一名水門足陽明脈氣所發治咳逆上氣咽喉癕腫呼吸短氣喘息不得針入三分可灸三壯氣舍二穴在頸直人迎俠天突陷中足陽明脈氣所發治咳逆上氣瘤癭喉痹咽腫頸項強不得回顧針入三分可灸三壯二膺腧部中行凡七穴天突一穴在結喉下一寸宛宛中陰維任脈之會針入五分留三呼得氣即瀉治咳嗽上氣胸中氣噎喉中狀如水雞聲肺癰咯唾膿血氣咽乾舌下急喉中生瘡不得下食灸亦得即不及針其下針直橫下不得低手即五臟之氣傷人慎如前法忌辛酸物等璇璣一穴在天突下一寸陷中仰頭取之任脈氣所發治胸皮滿痛喉痹咽腫水漿不下可灸五壯針入三分華蓋一穴在璇璣下一寸陷中仰頭取之任脈氣所發治胸脅支滿痛引胸中咳逆上氣喘不能言可灸五壯針入三分紫宮一穴在華蓋下一寸六分陷中仰頭取之任脈氣所發治胸脅支滿胸膺骨疼飲食不下嘔逆上氣煩心可灸五壯針入三分玉堂一穴在紫宮下一寸六分陷中一名玉英任脈氣所發治胸滿不得喘息胸膺骨疼嘔吐寒痰上氣煩心可灸五壯針入三分膻中一穴一作亶一名元兒在玉堂下一寸六分直兩乳間陷中仰臥取之任脈氣所發治肺氣咳嗽上喘唾膿不得下食胸中如塞可灸七七壯今附療膈氣嘔吐涎沫婦人乳汁少其穴禁不可針不幸令人夭折慎豬魚酒面物等中庭一穴在膻中下一寸六分陷中任脈氣所發治胸脅支滿噎塞食飲不下嘔吐食還出可灸五壯針入三分三膺腧部第二行左右凡一十二穴腧府二穴在巨骨下璇璣傍各二寸陷中仰而取之足少陰脈氣所發治咳逆上喘嘔吐胸滿不得飲食可灸五壯針入三分或中二穴在腧府下一寸六分陷中仰而取之足少陰脈氣所發治胸脅支滿咳逆喘不能食飲針入四分可灸五壯神藏二穴在或中下一寸六分陷中仰而取之足少陰脈氣所發治胸脅支滿咳逆喘不得息嘔吐胸滿不嗜食可灸五壯針入三分靈墟二穴在神藏下一寸六分陷中仰而取之足少陰脈氣所發治胸脅支滿痛引胸不得息咳逆嘔吐胸滿不嗜食針入三分可灸五壯神封二穴在靈墟下一寸六分仰而取之足少陰脈氣所發治胸滿不得息咳逆乳癰灑淅惡寒可灸五壯針入三分步郎二穴在神封下一寸六分陷中仰而取之足少陰脈氣所發治胸脅支滿鼻塞不通呼吸少氣喘息不得舉臂針入三分可灸五壯四膺腧部第三行左右凡一十二穴氣戶二穴在巨骨下腧府兩傍各二寸陷中仰而取之足陽明脈氣所發治胸脅支滿喘逆上氣胸背急不得息不知食味針入三分可灸五壯庫房二穴在氣戶下一寸六分陷中仰而取之足陽明脈氣所發治胸脅支滿咳逆上氣多唾濁沫膿血可灸五壯針入三分屋翳二穴在庫房下一寸六分陷中仰而取之足陽明脈氣所發治咳逆上氣呼吸多唾濁沫膿血身體腫皮膚痛不可近衣淫濼瘛瘲不仁可灸五壯針入三分膺窗二穴在屋翳下一寸六分足陽明脈氣所發治胸滿短氣唇腫乳癰寒熱臥不安可灸五壯針入四分乳中二穴當乳是足陽明脈氣所發禁不可灸灸不幸生蝕瘡瘡中有清汁膿血可治瘡中有瘜肉若蝕瘡者死微刺三分乳根二穴在乳下一寸六分陷中仰而取之足陽明脈氣所發治胸下滿痛臂腫乳癰悽慘寒熱痛不可按抑可灸五壯針入三分五膺腧部第四行左右凡一十二穴雲門二穴在巨骨下俠氣戶傍各二寸陷中動脈應手手太陰脈氣所發治喉痹胸中煩滿氣上衝心咳喘不得息胸脅短氣肩痛不得舉臂甲乙經云可灸五壯針入三分刺深使人氣逆故不宜深刺中府二穴肺之募一名膺中腧在雲門下一寸乳上三肋間動脈應手足太陰之會治肺系急胸中痛悚悚膽熱嘔逆上氣咳唾濁涕肩背痛風汗出腹脹食不下喉痹肩息膚骨痛寒熱針入三分留五呼可灸五壯周榮二穴在中府下一寸六分陷中仰而取之足太陰脈氣所發治胸脅支滿不得俯仰飲食不下咳唾稠膿針入四分胸鄉二穴在周榮下一寸六分陷中仰而取之足太陰脈氣所發治胸脅支滿引胸背痛臥不得轉側針入四分可灸五壯天溪二穴在胸鄉下一寸六分陷中仰而取之足太陰脈氣所發治胸中滿痛乳腫賁膺咳逆上氣喉中作聲針入四分可灸五壯食竇二穴在天溪下一寸六分舉臂取之足太陰脈氣所發治胸脅支滿膈間雷鳴滀陸滀陸常有小聲針入四分可灸五壯六側腋部左右凡八穴淵腋二穴在腋下三寸宛宛中舉臂得之治胸滿無力臂不舉禁不宜灸灸之不幸令人生腫蝕馬瘍內潰者死寒熱者生馬瘍可治針入三分輒筋二穴在腋下三寸復前一寸著脅足少陽脈氣所發治胸中暴滿不得臥喘息也可灸三壯針入六分大包二穴在淵腋下三寸脾之大絡布胸脅中出九肋間治腹有大氣氣不得息胸脅中痛內實則其身盡寒虛則百節皆縱可灸三壯針入三分天池二穴在乳後一寸腋下三寸著脅直腋撅肋間一名天會手心主足少陽脈之會治寒熱胸膈煩滿頭痛四肢不舉腋下腫上氣胸中有聲喉中鳴可灸三壯針入三分十三腹部及側脅各經穴主治病症一腹部中行凡一十五穴鳩尾一穴一名尾翳一名𩩲骭在臆前蔽骨下五分治心風驚癇發癲不喜聞人語心腹脹滿胸中滿咳逆數噫喘息喉痹咽壅水漿不下不可灸灸即令人畢世少心力此穴大難針大好手方可此穴下針不然取氣多不幸令人夭針入三分留三呼瀉五吸肥人可倍之忌如前法也巨闕一穴心之募也在鳩尾下一寸鳩尾拒者少令強一寸中人有鳩尾拒之任脈氣所發治心中煩滿熱病胸中痰飲腹脹暴痛恍惚不知人息賁時唾血蛔蟲心痛蠱毒霍亂發狂不識人驚悸少氣針入六分留七呼得氣即瀉灸亦佳可灸七壯至七七壯止忌豬魚生冷酒熱面物等上脘一穴在巨闕下一寸當一寸五分去蔽骨三寸任脈足陽明手太陽之會治心中熱煩賁豚氣脹不能食霍亂吐利身熱汗不出三焦多涎心風驚悸心痛不可忍伏梁氣狀如覆杯針入八分先補後瀉之神驗如風癇熱病宜先瀉後補其疾立愈灸亦良日可灸二七壯至一百壯未愈更倍之忌如常法中脘一穴一名大倉胃之募也在上脘下一寸手太陽少陽足陽明所生任脈之會上紀者上脘也治心下脹滿傷飽食不化霍亂出泄不自知心痛溫瘧傷寒飲水過多腹脹氣喘因讀書得賁豚氣上攻伏梁心下狀如覆杯寒癖結氣針入八分留七呼瀉五吸疾出針灸亦良可灸二七壯至一百壯止忌豬魚生冷酒面等物建里一穴在中脘下一寸治心下痛不欲食嘔逆上氣腹脹身腫針入五分留十呼可灸五壯止下脘一穴在建里下一寸足太陰任脈之會治腹痛六腑之氣寒谷不轉不嗜食小便赤腹堅硬癖塊臍上厥氣動日漸羸瘦針入八分留三呼瀉五吸灸亦良可灸七七壯至二百壯乃止水分一穴在下脘下一寸臍上一寸任脈氣之所發治腹堅如鼓水腫腸鳴胃虛脹不嗜食繞臍痛沖胸不得息針入八分留三呼瀉五吸若水病灸之大良可灸七壯至百壯止禁不可針針水盡即斃神闕一穴一名氣合當臍中是也治泄利不止小兒奶利不絶腹大繞臍痛水腫鼓脹腸中鳴狀如流水聲久冷傷憊可灸百壯禁不可針慎如常法陰交一穴一名橫戶素問云在臍下一寸任脈氣所發治臍下㽲痛寒疝引少腹痛腰膝拘攣腹滿女子月事不絶帶下産後惡露不止繞臍冷痛針入八分得氣即瀉可灸一百壯止氣海一穴一名脖胦一名下肓在臍下一寸五分任脈氣所發治臍下冷氣上衝心下氣結成塊狀如覆杯小便赤澀婦人月事不調漏下崩中因産惡露不止繞臍㽲痛針入八分得氣即瀉瀉後宜補之可灸百壯今附氣海者是男子生氣之海也治藏氣虛憊真氣不足一切氣疾久不瘥悉皆灸之慎如常法石門一穴一名利機一名精露在臍下二寸三焦之募任脈氣所發治腹脹堅硬支滿婦人因産惡露不止遂結成塊崩中漏下灸亦良可灸二七壯至一百壯止婦人不可針針終身絶子關元一穴在臍下三寸小腸之募足太陰少陰厥陰三陰任脈之會下紀者關元也治臍下㽲痛小便赤澀不覺遺溺小便處痛狀如散火溺血暴疝痛臍下結血狀如覆杯轉胞不得尿婦人帶下瘕聚因産惡露不止月脈斷絶下經冷針入八分留三呼瀉五吸灸亦良可灸百壯至三百壯止慎如常法中極一穴一名玉泉一名氣原在關元下一寸膀胱之募足三陰任脈之會治五淋小便赤澀失精臍下結如覆杯陽氣虛憊疝瘕水腫賁豚搶心甚則不得息恍惚尸厥婦人斷緒四度針針即有子故卻時任針也因産惡露不止月事不調血結成塊針入八分留十呼得氣即瀉可灸百壯至三百壯止曲骨一穴在橫骨之上毛際陷中動脈應手任脈足厥陰之會治少腹脹滿小便淋澀不通㿉疝少腹痛婦人赤白帶下惡合可灸七壯至七七壯針入二分會陰一穴一名屏翳在兩陰間任脈別絡俠督脈衝脈之會治小便難竅中熱皮疼痛穀道搔癢久痔相通者死陰中諸病前後相引痛不得大小便女子經不通男子陰端寒衝心佷佷可灸三壯二腹部第二行左右凡二十二穴幽門二穴俠巨闕兩傍各一寸五分衝脈足少陰之會治胸中引痛心下煩悶逆氣裡急支滿不嗜食數咳健忘泄利膿血少腹脹滿嘔沫吐涎喜唾女子心痛逆氣善吐食不下可灸五壯針入五分通谷二穴在幽門下一寸衝脈足少陰之會治失缺口喎食飲善嘔暴啞不能言針入五分可灸五壯陰都二穴一名食宮在通谷下一寸衝脈足少陰之會治身寒熱瘧病心下煩滿氣逆可灸三壯針入三分石關二穴在陰都下一寸衝脈足少陰之會療脊強不開多唾大便祕澀婦人無子藏有惡血上衝腹中㽲痛不可忍可灸三壯針入一寸商曲二穴在石關下一寸衝脈足少陰之會治腹中積聚腸中切痛不嗜食可灸五壯針入一寸肓腧二穴在商曲下一寸臍傍各五分衝脈足少陰之會治大腹寒疝大便乾燥腹中切痛可灸五壯針入一寸中注二穴在肓腧下一寸衝脈足少陰之會治小腹有熱大便堅燥不利可灸五壯針入一寸四滿二穴一名髓府在中注下一寸衝脈足少陰之會治臍下積聚疝瘕腸癖切痛振寒大腹石水婦人惡血㽲痛針入三分可灸三壯氣穴二穴在四滿下一寸一名胞門一名子戶衝脈足少陰之會治月事不調泄利不止賁氣上下引腰脊痛可灸五壯針入三分大赫二穴一名陰維一名陰關在氣穴下一寸衝脈足少陰之會治男子陰器結縮女子赤帶可灸五壯針入三分橫骨二穴在大赫下一寸此穴諸經闕療病法外臺云治腹脹小便難陰器縱伸痛可灸三壯三腹部第三行左右凡二十四穴不容二穴在幽門兩傍各一寸五分去任脈二寸直四肋端足陽明脈氣所發治腹滿痃癖不嗜食腹虛鳴嘔吐胸背相行痛喘咳口乾痰癖脅下痛疝瘕針入五分可灸五壯承滿二穴在不容下一寸足陽明脈氣所發治腸鳴腹脹上喘氣逆食飲不下肩息唾血可灸五壯針入三分梁門二穴在承滿下一寸足陽明脈氣所發治脅下積氣食飲不思大腸滑泄穀不化可灸五壯針入三分關門二穴在梁門下一寸足陽明脈氣所發治遺溺善滿積氣腸鳴卒痛泄利不欲食腹中氣遊走俠臍急痰瘧振寒針入八分可灸五壯太乙二穴在關門下一寸足陽明脈氣所發治癲疾狂走心煩吐舌可灸五壯針入八分滑肉門二穴在太乙下一寸足陽明脈氣所發治癲疾嘔逆吐舌可灸五壯針入八分天樞二穴大腸之募穴一名長溪一名谷門去肓腧一寸五分夾臍傍二寸足陽明脈氣所發療夾臍切痛時上衝心煩滿嘔吐霍亂寒瘧泄利食不化女子月事不時血結成塊腸鳴腹痛不嗜食可灸百壯針入五分留七呼外陵二穴在天樞下一寸足陽明脈氣所發治腹中痛心如懸引臍腹痛可灸五壯針入三分大巨二穴在外陵下一寸足陽明脈氣所發治少腹脹滿煩渴㿉疝偏枯四肢不舉可灸五壯針入五分水道二穴在大巨下三寸足陽明脈氣所發治少腹滿引陰中痛腰背強急膀胱有寒三焦結熱小便不利可灸五壯針入二寸五分歸來二穴在水道下二寸治少腹賁豚卵縮莖中痛婦人血藏積冷可灸五壯針入八分氣衝二穴一名氣街在歸來下鼠鼷上一寸動脈應手宛宛中足陽明脈氣所發治腸中大熱不得安臥腹有逆氣上攻心腹脹滿淫濼月水不利身熱腹中痛㿉疝陰腫難乳子上搶心痛不得息氣衝腰痛不得俯仰陰痿莖中痛兩丸蹇痛不可忍可灸七壯立愈炷如大麥禁不可針四腹部第四行左右凡一十四穴期門二穴肝之募在不容傍一寸五分直兩乳第二肋端足太陰厥陰陰維之會治胸中煩熱賁豚上下目青而嘔霍亂泄利腹堅硬大喘不得安臥脅下積氣女子産後余疾食飲不下胸脅支滿心中切痛善噫若傷寒過經不解當針期門使經不傳針入四分可灸五壯日月二穴膽之募在期門下五分足太陰少陽陽維之會治太息善悲小腹熱欲走多唾言語不正四肢不收可灸五壯針入七分腹哀二穴在日月下一寸五分足太陰陰維之會治大便膿血寒中食不化腹中痛針入三分大橫二穴在腹哀下三寸五分直臍傍足太陰陰維之會療大風逆氣多寒善悲可灸五壯針入七分腹結二穴在大橫下三分一名腸窟治繞臍痛上衝搶心腹寒泄利咳逆針入七分可灸五壯府舍二穴在腹結下三寸足太陰厥陰陰維之交會此三脈上下三入腹絡肝脾結心肺從脅上至肩此太陰郤三陰陽明支別治疝痛脾中急痛循脅上下搶心腹滿積聚厥氣霍亂針入七分可灸五壯衝門二穴一名慈宮上去大橫五寸府舍下橫骨兩端約中動脈足太陰厥陰之會治腹寒氣滿積聚疼淫濼陰疝難乳子上衝心不得息針入七分可灸五壯五側脅部左右凡一十二穴章門二穴脾之募一名長平一名脅髎在大橫外直季脅肋端側臥屈上足伸下足舉臂取之足厥陰少陽之會治腸鳴盈盈然食不化脅痛不得臥煩熱口乾不嗜食胸脅支滿喘息心痛腰不得轉側傷飽身黃羸瘦賁豚腹腫脊強四肢懈惰善恐少氣厥逆肩臂不舉可灸百壯針入六分忌如常法京門二穴腎之募一名氣腧一名氣府在監骨下腰中季脅本俠脊治腰痛不得俯仰寒熱䐜脹引背不得息水道不利溺黃少腹急腫腸鳴洞泄髀樞引痛可灸三壯針入三分留七呼帶脈二穴在季脅下一寸八分治婦人少腹堅痛月事不調帶下赤白裡急瘛瘲可灸五壯針入六分五樞二穴在帶脈下三寸一云在水道傍一寸五分治男子寒疝陰卵上入小腹痛針入一寸可灸五壯維道二穴在章門下五寸三分足少陽帶脈之會治嘔逆不止三焦不調水腫不嗜食針入八分可灸三壯居髎二穴在章門下八寸三分監骨上陷中陽蹺足少陽之會治腰引少腹痛肩引胸臂攣急手臂不得舉而至肩灸三壯針入八分十四或問豫編祕傳竟或有進而問者曰諸家所言某穴主某病某病必宜取某穴其說確不可易乎曰此不過示以大概其實治病無定穴也大凡邪中於人與正周流上下或在氣分或在血分無有定止故喻用針正如用兵彼動則此應或出以奇或守以正無有定製如醫者不究病因不察傳變惟守某穴主某病之說執中無權按譜施治譬之狂潦泛溢欲塞下流而獲安者亦偶然耳夫病變無窮針法亦無窮病或在上而從下取之病或在下而從上取之或正取或直取審經與絡分氣與血病隨經而在穴隨經而取庶得隨機應變之理豫所以選録靈樞素問難經置於卷首使人熟讀深思者正欲人知此隨機應變之理而得圓機活法也或又曰圓機活法既得聞命矣但學者望洋無下手處奈何曰譬猶匠者教人以規矩取方圓也規矩之法在師方圓之法則在弟子矣夫聖人之於針非經絡孔穴無以教後學後學非經絡孔穴無以受之師苟不知變通徒執孔穴所謂按圖索驥安能盡其法哉故曰粗守形上守神粗守關上守機機之動不離其空此之謂也或曰今有專取奇穴治病亦多有效究竟是否曰人身正經十二奇經有八大絡十五小絡三百餘皆所以行氣血也聖人取穴三百六十有六按歲之三百六十六日也後人以為未盡更取奇穴是猶置閏月也奇穴者絡穴六經穴二余絡余經置而不用速求巧捷遂悖聖經又有六十六穴拘於日時開合用之猶未周備而況拘於八穴者乎蓋八穴病在氣分則有可劫之功若在血分徒損元氣病何由安正是血病而瀉氣也邪在血分則直求病之所在而取之可也今人泥而不用豈非可笑或曰針灸宜避天忌日何也曰經云左足應立春其日戊子己丑左脅應春分其日己卯左手應立夏其日戊辰己巳膺喉首頭應夏至其日丙午右手應立秋其日戊申己未右脅應秋分其日辛酉右足應立冬其日戊戌己亥腰尻下竅應冬至其日壬子六腑膈下三藏應四季中州其日戊己大禁太乙所在日即前所云凡此九者善候八正所在之處所主左右上下身有癰腫者欲治之無以其所值之日潰治之是謂天忌日也或曰後世有子午流注之說始於南唐何若愚謂三焦是陽氣之父心包絡是陰氣之母二經尊重不繫五行所攝主受納十經氣血養育故只言十經陰陽二脈逐日各注井滎俞經合各五時晨畢每日遇陽干合處注於三焦遇陰乾合處注於包絡此二經亦各注井滎俞經合五穴陽干注府陰乾注藏如甲日甲戌時膽氣初出為井乙日乙酉時肝出穴為井云云其說甚長蓋謂左轉從子能外行諸陽右轉從午能內行諸陰其說於經亦有據乎曰此皆臆說內經難經所不載不惟悖其經旨而所說亦自相矛盾者多矣彼謂陽日陽時陽經穴開故甲子日甲戌時甲膽竅陰井開此固然矣丙子時屬於乙丑日辰乃陰日陽時也而謂丙小腸前谷滎穴開其與陽日陽時之說合乎否乎舉此一端其餘可推類而知其自相矛盾不待言矣經言榮衛之氣五十度大會於手太陰終古不改其常度此謂陽日氣先血後陰日血先氣後其亂經旨也大矣豈可為法於天下後世哉或曰針灸家動謂各有祕法不輕示人信乎曰傳世所傳十四法十六法如青龍擺尾云云可謂已盡之矣舍此謂更有神祕吾未之信也況此等法證之於經則有悖於經質之於理則有違於理彼以為神我以為詭彼以為祕我以為妄此編雖亦羅列諸法於前因既為世俗之所通行固不可不知其法且外間所傳者往往名是而實非豫故為之考證其說歸於至當免其以訛傳訛且可與內難諸法考究異同俾能實驗於針下如果精研經旨深明古法則於近世之所謂祕密雖全棄而不可用也或曰諸家針科書所載某穴針幾分留幾呼灸幾壯出於經歟否歟曰此多出於後世於經並無考也經曰病有浮沉刺有淺深淺深不得反為大賊過之則內傷不及則生外壅古人治法惟視病之浮沉而為刺之淺深豈以定穴分寸為拘哉又謂某穴宜留幾呼悻理尤甚經曰刺實須其虛者留針陰氣隆至針下寒乃去針也經氣已至慎守勿失又曰刺之而氣不至無問其數刺之而氣至乃去之勿復針針各有所宜各不同形各任其所為刺之要氣至而有效效之信若風之吹雲明乎若見蒼天豈留呼而可為定準耶經又云靜以久留以氣至為故不以息之多數而便去針是古人用針惟以氣至為期而不以呼之多少為候若依留呼之說氣至則可氣若不至亦依呼數而去針徒使破皮損肉有何益於病哉故曰凡刺之害中而不去則精泄不中而去則致氣精泄則病甚而恇致氣則生為癰疽也又謂某穴宜灸幾壯亦非至言惟當視其穴俞肉之厚薄病之輕重而為灸之多少大小則可耳不必守其成規所言某穴針幾分灸幾壯謂病宜針某穴則宜入幾分病宜灸某穴則宜灸幾壯針則不灸灸則不針不知其說者既針復灸既灸復針為害不淺或曰內經明言足陽明者五臟六腑之海也其脈大血多氣甚熱壯刺此者不深不散不留不瀉也足陽明刺深六分留十呼足太陽深五分留七呼足少陽深四分留五呼足太陰深三分留四呼足少陰深二分留三呼足厥陰深一分留二呼手之陰陽其受氣之道近其氣之來疾其刺深者皆無過二分其留皆無過一呼灸之亦然灸而過此者得惡火則骨枯脈澀刺而過此者則脫氣此皆古法也如先生所說則經中所論並皆非歟曰此古人特論其理之常如此耳凡用刺法自有所宜初不必以是為拘也經曰邪氣在上濁氣在中清氣在下故針陷脈則邪氣出針中脈則濁氣出針太深則邪氣反沉而病益又曰少長小大肥瘦以心撩之又曰其可為度量者不甚脫肉而血氣不衰也若夫瘠瘦而形肉脫者惡可以度量刺乎審切循捫按視其寒溫盛衰而調之是謂因適而為之真者是也或曰近世針法刺左邊之穴將針右拈而氣上行將針左拈而氣下行刺右邊則反之欲補先呼後吸欲瀉先吸後呼其法亦可師歟曰經絡周於人身無有左右上下之別今針左右不同如此將謂左之經絡與右之上下兩不相同耶經曰刺不知經絡之往來血氣之流行不足以為工此亦可謂不知經絡之往來矣或問近世補瀉之法男用大指進前左轉呼之為補退後右轉吸之為瀉提針為熱插針為寒女用大指退後右轉吸之為補進前左轉呼之為瀉插針為熱提針為寒午前如此午後反之其法是耶非耶曰經云冬至四十五日陽氣微上陰氣微下夏至四十五日陰氣微上陽氣微下此論一年陰陽之升降也即此一日陰陽之升降午前陽升陰降午後陰升陽降無分於男女也考之內難男女臟腑經絡穴俞血氣晝夜周流無不同今言午前午後男女補瀉顛倒錯亂如此悖經旨也甚矣故曰診不知陰陽逆從之理此治之一失也又曰刺實須其虛者針下寒也刺虛須其實者針下熱也曰寒曰熱以針下為候何嘗以提按而分男與女哉十五針驗摘録一頭風袁總統身體素來甚好其思想與記憶力亦遠過常人冬日不怕寒頭更不畏冷在小站練兵時於溯風凜烈之中常光頭出外初不以為意後因受風過久時覺頭痛一遇思想太過即發民國初年遇有不如意事更甚但不過數日即瘥三年之春因某項事逆意而痛增劇至三十餘日不愈南通張季直先生電保石屏先師力言可愈此疾得京電覆時適慎庵在滬師囑隨行其病系前後腦痛第一日針百會第二日針風池風府皆以泄風泄熱為主每一針刺入袁即感覺腦中發有大聲沖牆倒壁而出再針如服巴豆大黃直扶腸胃而下師曰此即風散熱降之象應手而愈袁總統稱奇不置厚謝而歸二陽痿南通張澀老中年即痿而不興其時尚未生子病原由於幼年用腦過度可見性與腦最有關係不盡由於性病也耳石屏師名情托請治其時石屏師為富安場鹽大使情不可卻為針腎俞關元氣海中極數穴即日見效後每覺疲勞時必延往治石屏師罷官後常駐於通皆澀老為東道主也一次隨師往見其僅針關元一穴因詢一針足乎師曰此補精而活其氣不宜太過過之則興奮過甚反於年老陽強陰弱之體不宜豫亦承賜一聯能以金針引痾起曾從黃石受書來並長跋於側今尚什襲藏之耳三中風戊辰之秋張盛全病中風不語在中西醫束手之時余為之針百會一穴而蘇其時人皆以余為善治中風其實中國之針何病不可治己巳春櫪城曹幼珊先生忽中風而神昏不語由張盛全急邀余往脈已停止兩目緊閉呼之不應詢其家人知病發僅一小時數日前已覺口眼歪斜此乃實症不可誤認為虛乃為針肩井三里等處其脈立出口已能言詢其本人則云四肢麻甚余復針頭之風府足之湧泉三日即能起坐復刺口角之地倉而口正刺目眥之睛明而眼不斜七日即康復如常八年來體健身輕雖七十有一視之如五十許人也曾以神針壽我四字為贈四臂痛臂痛不能舉在醫理上緣因甚多虛實寒熱皆可使其病也初起人不留意後至半身不遂全體不用大病造成治之已遲此星星之火可以燎原也褚德彝先生之夫人臂痛經年中西雜治百藥無靈最後就診於余其右手不能平肩日夜酸楚無寧息斷為肺絡之痰阻滯血脈為針曲池合谷應手而瘥是以褚先生贈聯疢石名言徵呂覽針俞神術闡倉公有一針而愈之跋所以紀實也五手麻吳興陸連奎先生體健無疾惟左手常麻曾經中西雜治而不效皆云防作風疾前年其夫人因患偏頭風痛為余治愈而信金針必可療斯疾針手三里即愈是以本書序文中曾道及也凡手足微麻人都不在意而不知風症之初多有此類現狀如不即早圖之引起他症以至不救者甚多如腦充血腦裂心臟病等在中醫醫理上追本窮源皆中風一症之分門別類也六盲腸炎庚午冬余受蘇州朱姓之請頻行有竺氏者來延治盲腸炎有急不待緩之勢而朱姓之中風又不能略遲不得已允以當夜歸來夜返申時在站為其迎往病人年三十許服務於滬寧鐵路道其家人曾患盲腸炎剖腹而死其父羲庵先生年七十有八見其子病而焦灼惶急之象溢於言表病象在右少腹奇痛右足不能伸豫只針歸來三里氣海數穴其痛立時即止足亦能直三次後即行走如常來寓就診五日其病如失羲庵先生仁和旺族善繪事而能詩因其子鹿奇先生之疾即寫竹屏四幅中有一詩橫截風煙竹兩竿黃山白嶽出群看金針度盡人間厄太乙真傳不用丹之句乃見其子大病之愈出乎意外極其高興故詩畫皆生氣勃勃也七中風師君蘭亭老而健某年來滬寓於浦應仙家夜半睡醒忽口眼歪斜語言難出而半身肢體同時麻痹延西醫王某治之謂此病西法並無專藥如延余診當有效師仍遊疑復請某國醫博士多方療治猶不見輕乃請余治豫謂病在少陰痱症也為針氣海環跳腎俞等穴頃刻之間麻痹半身即能自行轉側十日即完全告愈某西醫聞之曰奇矣師君時已六十有三次年又生一子八腸癖書家顏二民患腸癖十餘年其苦萬狀中西醫治終未能愈乙丑余由陝軍謝職歸遇於邗上殷殷求治為針手陽明數穴以瀉其熱而通其壅數日而愈顏書一聯鐵騎威邊徼金針度世人以志感謝腸癖之症虛實並有顏乃實故效速如屬虛症則養陰補脾清胃固脫缺一不可甚矣同一用針同一治病而其難易相差如此是故學針易識症難也九腳面毒瘀甲戌春往上海某醫院為某姓治第四期梅毒入絡因其心臟衰弱該院無法療治而由某君求余針之是以間日必一往一日聞女病室中有北方口音之女子嚶嚶作泣余問故某君謂此是警局董隊長之妻今將鋸腿是以悲泣詢其病狀則云腳面紅腫而痛已住院六月不瘥某君慫恿豫為之設法余憐此婦如無足幾等於死即往詳詢病情始知由鬱熱而兼外感邪留經絡中西雜治藥石亂投斷以溫補之劑邪不能出下注於足以致紅腫大痛氣上衝心日夜不安寢食俱廢者數月余謂此病無需鋸腿可用別法以救之而該院之某醫謂君能愈此病乎余雲中西醫皆能愈獨君不識此症耳先以提毒散瘀外治之法即在委中放毒血盈升針三里懸鐘三陰交等穴次日即安十日大愈節至中天惠我角黍金丸夫妻同來叩謝再生之恩也十肩背痛葉氏媼六十又三患肩背痛由頸循督脈而下七八寸轉側不能因此兩臂亦痛不能舉日夜呼號慘不忍聞診其脈沉遲舌絳滑靈樞雲氣勝有餘肩背痛適在督脈之上肺實可知先瀉其肺俞當夜即能安睡再針肩井肩髃曲池而愈十一胸痛朱右年四十二體素弱中脘常隱隱作痛已十餘年時發時愈近月連痛不已甚且至於昏厥初以手按之痛可暫止繼則拒按似覺有一氣塊由下而上如至鳩尾處則大痛再至咽間則厥矣脈大而數舌黃黑且垢膩斷為濁陰之氣結於胃脘不散為針中脘三里而痛漸止再刺關元照海即下黑色如栗之矢若干粒而愈十二子宮岩老友解梅生兄之夫人少腹中硬痛拒按某西醫謂為子宮生岩一再檢驗確定無疑舍解剖之外更無生理以此病商之餘余謂子宮岩乃新病名其實乃氣血所凝到處皆可成岩不獨子宮宜以氣化之為針氣海腎俞諸穴當日痛止更數日而塊消凡有形之病皆宜設法消散為上策實在不能消散再設他法以解之去塊之法甚多有急治有緩治病實無妨用猛劑以攻之病虛亦有助其中氣使其輔正祛邪亦可漸收大效十三腎不納氣南海莫君敏莊僑居燕北有年平生喜藏金石是以搜羅甚富庚午以臂痛不舉向余求治見其行動即喘脈大而空兩尺尤少力入夜則口渴咽乾小溲頻數余告以君之本病乃腎氣不能收納其臂痛不舉乃標症也如不根本治之花甲之年豈有腎虛而能延壽者即針腎俞關元等穴並書專門補斂腎氣之方為丸治之二月之後本標各病全愈莫君以其收藏之歷代帝王玉璽印成四屏並跋豫為治病經過以留記念云十四臂痛宋子良先生患左臂痛連帶至手延至三年百方醫治而無效後由某外醫為之解剖先後六次痛勢仍不少減且不能確指此症究屬何病最後延余治之身強體壯一望而知為康健之體脈亦堅實飲食起居無一不好惟右手掌背之肌肉瘦削異常僅餘皮骨以虎口萎縮尤甚多處穴道無法下針只好先針曲池去針以後云甚鬆快次日告余曰往日多為痛醒今晨居然醒而不痛計針三日痛勢全愈惜合谷一穴因肌肉縮盡僅餘上下二層皮無受針之餘地蓋解剖之術只能施之於有形可以割而棄之若經絡之氣為邪所傷無形無影於此而加以剖割此在高明之西醫或可優為之而在中醫之治法中則殊不能贊一詞也十五心癢丙寅春余來遊滬時下榻同益公其司帳何紹全邗人也素有心癢病聞余至欣然向豫求治自述病起於八年前初覺癢時異常難受百治不效後為癢所逼狂奔多時居然癢止起初二三月一發後即愈來愈勤現在一日一夜之中亦屢發不止雖嚴冬亦不暇著衣癢發時非速奔不快豫謂此乃心氣鬱結血液過膩所致狂奔則結氣解散血亦轉清此所以有效也為針肺經雲門心包絡天池內關各穴專用瀉氣散血之法二次以後癢不復發此亦奇疾之一也十六腰痛甘鏡先律師留歐美有年飲食起居皆有西洋化以致遇有疾病亦無不用外醫一日其夫人病腰痛不能輾轉注射電療諸法無不用盡終歸無效余素與甘友善甘乃詢以斯疾足下金針能愈否余答金針無病不治何況區區腰痛乃刺腎俞一補而瘥鏡先以神術目之夫腰痛之起因甚多虛實寒熱皆有須看準病原自然發無虛射甘夫人乃腎虛腰痛如認為實症用力去邪殆矣如孫東吳俞逸芬諸子皆患此病無不病隨針去而針法亦各不同蓋皆按照各人病原針之不是千篇一律也十七膈食姚守仁先生之夫人肝木不和體又素弱于歸十載未經生育以此肝脾之病影響於胃發生膈症三年來不能進粒米僅以流汁度其生命咽中如有物窒塞腹雖覺飢而不能下咽夜來必有潮熱經亦不調而多帶細思非舒肝和脾不能開其生機徒治胃病如以石投水乃先刺期門再針膈俞白環俞中脘中極等穴食欲大增升能經調帶止今年已育麟兒此乃病理中應有之效並非出乎意外也十八胃病曾則生任滬保安處副處長時曾病胃疾食不甘味中脘作痛日漸瘦削臥床數月幾無生理解震皋先生與則生有師生之誼往探其病而則生淚出以為生機絶望震皋先生以其侄梅生兄曾有痼疾為余所愈令延豫治之詢其經過中西雜治補瀉兼施終無起色豫只為針中脘關元諸穴其疾良已蓋曾君之病不過胃陽不足消化不良以致失其營養治法雖多毫不中病誅伐無過安得生機豫不過為之撥動機關令其胃陽暢遂而已豈有其他妙巧哉十九蛇蠱蠱症江浙不多見余隨宦在川滇及遊歷兩廣曾有聞見放蠱害人之說謂由五毒蠱合而為一飲食起居坐臥之地皆能傳毒此齊東野語不見經傳之談然亦有受山嵐瘴氣腹中便爾成形或水土不宜初到水遠山遙之地體質與風土不合亦易發生此病庚午奧人陳姓肢痛治愈後其家一區姓媼云有胃疾余以為普通胃病囑其來寓針之可也越日媼來求治自云病已七年而中脘墳起腹飢則痛多吃不易消化之物則安七年來日漸加重人則奇瘦其脈大小不一頃刻異狀其舌滿布紅白相間雜之小點而如蒙以一層灰白之薄苔斷為蠱症無疑試針數處次日再來云不針尚可針後雖多食而痛不能止即為再針中脘不十分鐘而狂呼大痛欲自拔其針禁之則云要吐口即噴出奇臭之水隨出一物類似蛇形長逾一尺蠕蠕而動同時診室中之病者皆帶針而逃一時秩序大亂而區媼暈矣頃刻即蘇七年痼疾經此一針病根全去良深快慰憐其貧困乃以藥物助其調理不久即平復如常二十乾血曹女年十七忽停經九月人漸瘦脈沉實舌白口渴心燒中脘痛少腹左脅下痛而拒按夜來潮熱盜汗便結溲少而熱微咳無痰皮膚枯燥肌如甲錯無一不是乾血癆之症狀但室女停經與婦人稍異治法亦各有不同較之曾經生育之婦人尤為棘手乃一方用去瘀之法刺其肝脾各經之穴其腹痛拒按之狀漸解一方又以培養新血之法從期門等穴啓其生機心燒潮熱等症亦退前後月餘其經復至諸病霍然二十一死脈一日在蔣某家治疾有附診者一三十許之婦人云日來偶覺胃納不健請書一開胃方劑按其脈大異之詢其有無他狀云無余未書方而告其家人曰殆矣其脈二十至必一停停後不能復還繼而復動則與前後不能接續經云一息不運則生機窮此在脈法中謂之代脈雖無大病必難久存蔣某以余故神其說未之信十餘日後忽患氣塞而沒是乃氣脫非真窒塞也至此方信余言之不謬二十二小腸氣名畫師金健吾乙丑春病小腸氣左囊腫大寒熱交作轉側不能者有日矣余因嗜畫耳其名由友人之請託而往診乃為針歸來腎俞氣海諸穴數日即愈今已十餘年而未一發夫小腸氣之病雖似有形而實為氣所結其氣一散其形立消今之醫家誤認為實在有形之病可以割而棄之豈知此等病朝割去而夕復生屢生屢割不死不止不揣其本而齊其末即在他事且猶不可況病關生死豈可草率從動用剖割草菅人命因論小腸氣而可悟其他類似之病狀治法矣二十三齒痛黃金榮先生病齒痛二十餘日遍服清瀉苦降之劑始終不效寢食為之不安余適有他事往謁問此病針法能治否余謂舍蛀齒外皆可治也即為針合谷呂細等穴針去痛除先生云金針治病如此神速悔不早用之致多受二十餘日之痛楚云二十四腰痛中外醫家商討金針醫學時有同文書院院長大內暢三先生在坐詢及金針能治年久腰痛否余曰可間日邀診謂餘年六十有二病已十又三年平日起居坐臥均感不便惟陰雨之先節氣之前不但不能轉側且腰部膚冷如冰中西雜治終未離去痛苦前曾一度歸國請其國中著名針灸家治之亦無大效言次即以手臂腰腿等處之灸疤出視余謂內經云太陽所至為腰痛太陽膀胱府也又云腰為腎之府轉側不能腎將憊矣今既不能轉搖而腰部肌肉又異常覺冷其為腎陽衰敗無疑宜溫通腎府以去寒濕而助元陽即針腎俞腰部立覺奇暖去針後即起立如常謂十餘年之痛苦去於一針何神速乃爾即書東亞神術四字為贈跋金針祕傳為吾師合肥方先生慎庵手著師世家子嫺兵法總師千軍旅之餘得黃公石屏金針祕訣十年來蔽蓰尊榮行道海上起死人而肉白骨何可勝紀竊惟一命之士必懷濟人利物之心良相良醫本有異途同歸之趣誦古人一將成功萬骨枯之句則舍彼就此人爵何如天爵乎癡佛浮沉宦海無補時艱一官匏繫非所願也前年函求方師指示金針大法蒙恩開導遙沐春風獲其餘緒頗有奇效推吾師之學而廣之不亦足以濟世活人耶今師將黃公石屏所授祕訣及歷代針經之奧妙著成此書則活人功德垂百世而無替也中華民國二十六年一月弟子趙癡佛謹書于山東高等法院
