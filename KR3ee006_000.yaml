body:
  text: 一論針灸學之淵源及真傳之難得世人每以針灸學術久已失傳又有謂針灸家多守祕密靳其術而不傳此皆未悉針灸學之甘苦是以有此想當然之說耳無論何種學術凡可以文字相傳者多屬其中之糟粕若其精華所在絶非文字可以相傳其中之曲折奧妙非由耳提面命不可甚至可以意會而不可以言傳孟子所謂大匠誨人能與人規矩不能使人巧非故靳其術而不傳實有千言萬語而不能領略一二者即孟子之所謂巧乃學術之精華也針灸之學精華多而糟粕少所以數千年來能得其真傳者一代不過數人職此故也即以文字可傳者而論似乎內經難經所有之文字即由上古相傳而來必無謬誤無如五代以前印書之學尚未發明各種書籍皆有手抄甚為難得又易錯落舛誤一經世亂往往焚燬無遺此相傳之一難也秦漢以上各種學術率以口耳相傳未能筆之於書人存則學存人亡則學亦亡此相傳之二難也有此二難是以上古學術存於今者十不逮一並非故守祕密靳而不傳也針灸一道首重經絡穴道次即手法針法如靈樞素問難經等書皆為針灸家之祖籍數千年來無能出其範圍但某經某穴主治某病即已略而弗詳至某穴應如何下針某病應如何寒溫補瀉更不得其要領何也考內經難經而外專論經絡穴道及主治病症者據隋書經籍志尚有明堂孔穴五卷明堂孔穴圖三卷唐志有黃帝內經明堂十三卷黃帝十二經脈明堂五臟圖一卷黃帝十二經明堂偃側人圖十二卷黃帝明堂三卷又隋之楊上善黃帝內經明堂類成十三卷楊元孫黃帝明堂三卷皆足以補內難之不足無如今世一字無存如但守內經難經即各經穴道尚不能備何論其他幸有晉人皇甫士安當漢魏經籍散亡之後以上各書尚未殘缺得以搜羅纂輯著為甲乙經十二卷垂示後人至今學針灸者能知某經有若干穴某穴確在某處某病宜取某穴及各穴應如何下針皆以甲乙經為根據除此以外更無可考是以甲乙經之有功於醫直與內經難經並垂不朽針灸家更宜奉為金科玉律不可不熟讀而深究也由晉宋以迄隋初百數十年之間大亂迭興學術道喪醫學尤荒除王叔和之脈經葛洪之肘後方褚澄之褚氏遺書巢元方之病源以外更無他種醫書流傳針灸之書更無有起而述之者至唐初孫思邈真人著千金方始稍稍論及針灸而王燾著外臺祕要即以針灸為絶無所用惟於六朝人之方劑則廣收博採一字不遺因此有唐一代談針法者絶少內難甲乙之學至此幾乎失傳矣史雖盛稱狄梁公腦後下針贅疣立墜僅堪播為美談並無一字撰述此則深可痛惜者也趙宋崛興居然為醫設學定考醫程式造就醫學人才命林億高保衡等校正內經傷寒論金匱要略等書傳世官家著有惠民和劑局方聖濟總録諸書嘉惠醫林於針灸一科並極留意朝廷以世傳針砭之法方術不同易滋訛舛於是命尚藥奉御王惟一等考求古代明堂氣穴經絡之說鑄有銅人二具天聖五年十月製成奉詔一置醫官院一置大相國寺仁濟殿又命纂集舊聞訂正訛謬著為銅人腧穴針灸圖經三卷刊刻頒布俾資遵守前代失傳之明堂圖說至是始復傳於世凡讀內難甲乙者可以有所考鏡矣又據周密齊東野語云舅氏章叔恭倅襄州日嘗獲銅人背面二器相合則渾然全身後由趙南仲歸之內府叔恭嘗寫有銅人背面二圖云云則宋時內府銅人不止王惟一所制一種王制之銅人當為全身故可分置二處此為兩面相合而成不知何時何人所作其異同優劣如何俱不可考即章叔恭所繪之圖亦不可得見至為可惜今言孔穴圖者惟銅人腧穴圖經略存梗概耳王惟一所制章叔恭所繪皆只有正背二面側伏尚不完全惟世傳明堂灸經所繪之圖兼及側面伏面足補兩種銅人之不足益可寶貴惟此書不題著書人姓名惟題西方子撰想系宋之高人隱士精於灸術不屑以醫著名者之所為也元明之間針灸之學益微歷代傳習不廢者只有席氏一家考明陳會著有神應經一卷卷首列有宗派圖稱梓桑君席宏達得針灸真傳世世專精九傳而至席華叔十傳而至席信卿十一世始傳於陳會會即廣傳其術共授二十四人得其真傳者有二人一為康叔達一為劉瑾書中有席宏達傳授誓詞謂傳道者必盟天歃血立誓以傳當於宗派圖下注其姓名如或妄傳非人私相付度陰有天刑明有陽譴云云此針灸家誓守祕密之明證但內經即有勿傳非人之語當以針法易習難精深恐無識之徒得其皮毛肆意圖利貽害病人故鄭重傳授藉以垂戒耳明季大江南北以針名世者尚有二家一為姑蘇凌漢章其於周身穴道不須按揣隔衣針之亦百不失一所謂目無全牛者也一為六合李千戶針法亦極精但其按穴必須去衣折量先以墨點記其應針之穴然後下針其術不同而神乎其技則初無二致人謂其異曲同工元明之間有一祕密之針灸書得之者視如枕中鴻寶名曰衛生針灸元機祕要萬曆中太醫院官楊繼洲得其書謂當公之於世乃為之補輯刊刻易其名曰針灸大全同時有高武者著有針灸聚英針灸節要諸書凡歷代相傳之針法灸法及針灸家之備歌各賦多搜括無遺元王國端之扁鵲神應針灸玉龍經亦多録私相傳誦之歌括歌賦蓋皆熱心針灸學惟恐古法失傳同抱一普及公開之思想者也吾師黃石屏先生為人治病亦隔衣下針無須留意揣量穴道而自然百無一誤蓋與明季凌漢章所傳針法為一脈相傳固由於周身穴道爛熟胸中無須臨時脫衣挨按然其隨手下針百無一誤者另有取穴準確之法較之脫衣挨按尤為迅速故鄙人平生治病亦遵吾師之法隔衣下針並非故為所難亦由習之既久反較脫衣為易此等處可以意會而不可以言傳將來實習時吾師所傳隔衣下針之法當可望其普及也習針科者對於暈針及吸針之解法務宜講明有素庶不致臨事倉皇暈針固險而吸針尤險而危昔朱丹溪有一門人為病者用針針為氣所吸牢不可拔而吸入甚速其人急趨丹溪求教丹溪聞之變色曰吾不能解惟速求可久先生葛至急於他穴下一針其吸入之針應手射出可見針法自有真傳到此緊要關頭絲毫不容假借矣二醫經録要漢書藝文志醫經者録凡七家二百一十六卷計黃帝內經十八卷外經三十七卷扁鵲內經九卷外經十二卷白氏內經三十八卷外經三十六卷旁篇二十五卷今傳於世者只靈樞九卷素問九卷合為黃帝內經十八卷扁鵲難經二卷其餘各家久已湮沒失傳嘗謂醫經傳自上古其時方劑未興所賴以治病者惟恃針灸而已古聖針灸之術存於今之內難兩經者已十不逮一居今日而講求針灸之學斷未有不讀內難而能洞悉原委者以內難諸經為一切針法所自出方脈家尚在必讀針灸家更不可不詳考貫通但今之習針灸者如責其先讀內難諸經未有不望洋而嘆茲擇其最關重要為針灸家所萬不可不知者於內經選録數篇難經則録自六十二難以後二十條為學者立一基礎較之毫無根底以訛傳訛者固有天壤之別倘由此而探本尋源推求經義其造詣更未可限量也一靈樞經脈篇此篇為醫學之大本原無論方脈針灸兩家皆不可不熟讀深思心知其意凡人身臟腑經絡如何貫通如何聯絡十二經之界限起止以及分經辨症之所以然皆歷歷分明絲毫不紊非上古之神聖何由推測而知針灸家如不讀此篇非但不知辨症且亦無從下手真乃針灸家之金科玉律萬不可不讀之大文也雷公問於黃帝曰禁服之言凡刺之理經脈為始營其所行制其度量內次五臟外別六腑願盡聞其道黃帝曰人始生先成精精成而腦髓生骨為幹脈為營筋為剛肉為牆皮膚堅而毛髮長谷入於胃脈道以通血氣乃行雷公曰願卒聞經脈之始生黃帝曰經脈者所以能決死生處百病調虛實不可不通肺手太陰之脈起於中焦下絡大腸還循胃口上膈屬肺從肺系橫出腋下下循臑內行少陰心主之前下肘中循臂內上骨下廉入寸口上魚循魚際出大指之端其支者從腕後直出次指內廉出其端是動則病肺脹滿膨膨而喘咳缺盆中痛甚則交兩手而瞀此為臂厥是主肺所生病者咳上氣喘渴煩心胸滿臑臂內前廉痛厥掌中熱氣盛有餘則肩背痛風寒汗出中風小便數而缺氣虛則肩背痛寒少氣不足以息溺色變為此諸病盛則瀉之虛則補之熱則疾之寒則留之陷下則灸之不盛不虛以經取之盛者寸口大三倍於人迎虛者則寸口反小於人迎也大腸手陽明之脈起於大指次指之端循指上廉出合谷兩骨之間上入兩筋之中循臂上廉入肘外廉上臑外前廉上肩出髃骨之前廉上出於柱骨之會上下入缺盆絡肺下膈屬大腸其支者從缺盆上頸貫頰入下齒中還出挾口交人中左之右右之左上挾鼻孔是動則病齒痛頸腫是主津液所生病者目黃口乾鼽衄喉痹肩前臑痛大指次指痛不用氣有餘則當脈所過者熱腫虛則寒栗不復為此諸病盛則瀉之熱則疾之寒則留之陷下則灸之不盛不虛以經取之盛者人迎大三倍於寸口虛者人迎反小於寸口也胃足陽明之脈起於鼻之交頞中旁約太陽之脈下循鼻外上入齒中還出挾口環唇下交承漿卻循頤後下廉出大迎循頰車上耳前過客主人循髮際至額顱其支者從大迎前下人迎循喉嚨入缺盆下膈屬胃絡脾其直者從缺盆下乳內廉下挾臍入氣街中其支者起於胃口下循腹裡下至氣街中而合以下髀關抵伏兔下膝臏中下循脛外廉下足跗入中指內間其支者下廉三寸而別下入中指外間其支者別跗上入大指間出其端是動則病灑灑振寒善呻數缺顏黑病至則惡人與火聞木聲則惕然而驚心欲動獨閉戶塞牖而處甚則欲上高而歌棄衣而走賁響腹脹是為骭厥是主血所生病者狂瘧溫淫汗出鼽衄口喎唇疹頸腫喉痹大腹水腫膝臏腫痛循膺乳氣街股伏兔骭外廉足跗上皆痛中指不用氣盛則身以前皆熱其有餘於胃則消穀善飢溺色黃氣不足則身以前皆寒栗胃中寒則脹滿為此諸病盛則瀉之虛則補之熱則疾之寒則留之陷下則灸之不盛不虛以經取之盛者人迎大三倍於寸口虛者人迎反小於寸口也脾足太陰之脈起於大指之端循指內側白肉際過核骨後上內踝前廉上踹內循脛骨後交出厥陰之前上膝股內前廉入腹屬脾絡胃上膈挾咽連舌本散舌下其支者復從胃別上膈注心中是動則病舌本強食則嘔胃脘痛腹脹善噫得後與氣則快然如衰身體皆重是主脾所生病者舌本痛體不能動搖食不下煩心心下急痛溏瘕泄水閉黃疸不能臥強立股膝內腫厥足大指不用為此諸病盛則瀉之虛則補之熱則疾之寒則留之陷下則灸之不盛不虛以經取之盛者寸口大三倍於人迎虛者寸口反小於人迎也心手少陰之脈起於心中出屬心系下膈絡小腸其支者從心系上挾咽系目系其直者復從心系卻上肺下出腋下下循臑內後廉行手太陰心主之後下肘內循臂內後廉抵掌後鋭骨之端入掌內後廉循小指之內出其端是動則病嗌乾心痛渴而欲飲是為臂厥是主心所生病者目黃脅痛臑臂內後廉痛厥掌中熱痛為此諸病盛則瀉之虛則補之熱則疾之寒則留之陷下則灸之不盛不虛以經取之盛者寸口大再倍於人迎虛者寸口反小於人迎也小腸手太陽之脈起於小指之端循手外側上腕出踝中直上循臂骨下廉出肘內側兩筋之間上循臑外後廉出肩解繞肩胛交肩上入缺盆絡心循咽下膈抵胃屬小腸其支者從缺盆循頸上頰至目鋭眥卻入耳中其支者別頰上䪼抵鼻至目內眥斜絡於顴是動則病嗌痛頷腫不可以顧肩似拔臑似折是主液所生病者耳聾目黃頰腫頸頷肩臑肘臂外後廉痛為此諸病盛則瀉之虛則補之熱則疾之寒則留之陷下則灸之不盛不虛以經取之盛者人迎大再倍於寸口虛者人迎反小於寸口也膀胱足太陽之脈起於目內眥上額交巔其支者從巔至耳上角其直者從巔入絡腦還出別下項循肩膊內挾脊抵腰中入循膂絡腎屬膀胱其支者從腰中下挾脊貫臀入膕中其支者從髆內左右別下貫胛扶脊內過髀樞循髀外從後廉下合膕中以下貫踹內出外踝之後循京骨至小指外側是動則病沖頭痛目似脫項如拔脊痛腰似折髀不可以曲膕如結踹如裂是為踝厥是主筋所生病者痔瘧狂癲疾頭囟項痛目黃淚出鼽衄項背腰尻膕踹腳皆痛小指不用為此諸病盛則瀉之虛則補之熱則疾之寒則留之陷下則灸之不盛不虛以經取之盛者人迎大再倍於寸口虛者人迎反小於寸口也腎足少陰之脈起於小指之下邪趨足心出於然谷之下循內踝之後別人跟中以上踹內出膕內廉上股內後廉貫脊屬腎絡膀胱其直者從腎上貫肝膈入肺中循喉嚨挾舌本其支者從肺出絡心注胸中是動則病飢不欲食面如漆柴咳唾則有血喝喝而喘坐而欲起目䀮䀮如無所見心如懸若飢狀氣不足則善恐心惕惕如人將捕之是為骨厥是主腎所生病者口熱舌乾咽腫上氣嗌乾及痛煩心心痛黃疸腸澼脊股內後廉痛痿厥嗜臥足下熱而痛為此諸病盛則瀉之虛則補之熱則疾之寒則留之陷下則灸之不盛不虛以經取之灸則強食生肉緩帶披髮大杖重履而步盛者寸口大再倍於人迎虛者寸口反小於人迎也心主手厥陰心包絡之脈起於胸中出屬心包絡下膈歷絡三焦其支者循胸出脅下腋三寸上抵腋下循臑內行太陰少陰之間入肘中下臂行兩筋之間入掌中循中指出其端其支者別掌中循小指次指出其端是動則病手心熱臂肘攣急腋腫甚則胸脅支滿心中憺憺大動面赤目黃喜笑不休是主脈所生病者煩心心痛掌中熱為此諸病盛則瀉之虛則補之熱則疾之寒則留之陷下則灸之不盛不虛以經取之盛者寸口大一倍於人迎虛者寸口反小於人迎也三焦手少陽之脈起於小指次指之端上出兩指之間循手表腕出臂外兩骨之間上貫肘循臑外上肩而交出足少陽之後入缺盆布膻中散落心包下膈循屬三焦其支者從膻中上出缺盆上項系耳後直上出耳上角以屈下頰至䪼其支者從耳後入耳中出走耳前過客主人前交頰至目鋭眥是動則病耳聾渾渾焞焞嗌腫喉痹是主氣所生病者汗出目鋭眥痛頰痛耳後肩臑肘臂外皆痛小指次指不用為此諸病盛則瀉之虛則補之熱則疾之寒則留之陷下則灸之不盛不虛以經取之盛者人迎大一倍於寸口虛者人迎反小於寸口也膽足少陽之脈起於目鋭眥上抵頭角下耳後循頸行手少陽之前至肩上卻交出手少陽之後入缺盆其支者從耳後入耳中出走耳前至目鋭眥後其支者別鋭眥下大迎合於手少陽抵於䪼下加頰車下頸合缺盆以下胸中貫膈絡肝屬膽循脅裡出氣街繞毛際橫入髀厭中其直者從缺盆下腋循胸過季脅下合髀厭中以下循髀陽出膝外廉下外輔骨之前直下抵絶骨之端下出外踝之前循足跗上入小指次指之間其支者別跗上入大指之間循大指岐骨內出其端還貫爪甲出三毛是動則病口苦善太息心脅痛不能轉側甚則面微有塵體無膏澤足外反熱是為陽厥是主骨所生病者頭痛頷痛目鋭眥痛缺盆中腫痛腋下腫馬刀俠癭汗出振寒瘧胸脅肋髀膝外至脛絶骨外踝前及諸節皆痛小指次指不用為此諸病盛則瀉之虛則補之熱則疾之寒則留之陷下則灸之不盛不虛以經取之盛者人迎大一倍於寸口虛者人迎反小於寸口也肝足厥陰之脈起於大指叢毛之際上循足跗上廉去內踝一寸上踝八寸交出太陰之後上膕內廉循股陰入毛中過陰器抵小腹挾胃屬肝絡膽上貫膈布脅肋循喉嚨之後上入頏顙連目系上出額與督脈會於巔其支者從目系下頰裡環唇內其支者復從肝別貫隔上注肺是動則為腰痛不可以俯仰丈夫㿉疝婦人少腹腫甚則嗌乾面塵脫色是肝所生病者胸滿嘔逆飧泄狐疝遺溺閉癃為此諸病盛則瀉之虛則補之熱則疾之寒則留之陷下則灸之不盛不虛以經取之盛者寸口大一倍於人迎虛者寸口反小於人迎也手太陰氣絶則皮毛焦太陰者行氣溫於皮毛者也故氣不榮則皮毛焦皮毛焦則津液去皮節津液去皮節者則爪枯毛折毛折者則毛先死丙篤丁死火勝金也手少陰氣絶則脈不通脈不通則血不流血不流則髦色不澤故其面黑如漆紫者血先死壬篤癸死水勝火也足太陰氣絶者則脈不榮肌肉唇舌者肌肉之本也脈不榮則肌肉軟肌肉軟則舌萎人中滿人中滿則唇反唇反者肉先死甲篤乙死木勝土也足少陰氣絶則骨枯少陰者冬脈也伏行而濡骨髓者也故骨不濡則肉不能著也骨肉不相親則肉軟卻肉軟卻故齒長而垢發無澤發無澤者骨先死戊篤己死土勝水也足厥陰氣絶則筋絶厥陰者肝脈也肝者筋之合也筋者聚於陰氣而脈絡於舌本也故脈弗榮則筋急筋急則引舌與卵故唇青舌卷卵縮則筋先死庚篤辛死金勝木也五陰氣俱絶則目系轉轉則目運目運者為志先死志先死則遠一日半死矣六陽氣絶則陰與陽相離離則腠理發泄絶汗乃出故旦占夕死夕占旦死經脈十二者伏行分肉之間深而不見其常見者足太陰過於外踝之上無所隱故也諸脈之浮而常見者皆絡脈也六經絡手陽明少陽之絡起於五指間上合肘中飲酒者衛氣先行皮膚先充絡脈絡脈先盛故衛氣已平營氣乃滿而經脈大盛脈之卒然動者皆邪氣居之留於本末不動則熱不堅則陷且空不與衆同是以知其何脈之動也雷公曰何以知經脈之與絡脈異也黃帝曰經脈者常不可見也其虛實也以氣口知之脈之見者皆絡脈也雷公曰細子無以明其然也黃帝曰諸絡脈皆不能經大節之間必行絶道而出入復合於皮中其會皆見於外故諸刺絡脈者必刺其結上甚血者雖無結急取之瀉其邪而出其血留之發為痹也凡診絡脈脈色青則寒且痛赤則有熱胃中寒手魚之絡多青矣胃中有熱魚際絡赤其暴黑者留久痹也其有赤有黑有青者寒熱氣也其青短者少氣也凡刺寒熱者皆多血絡必間日而一取之血盡而止乃調其虛實其小而短者少氣甚者瀉之則悶悶甚則僕不得言悶則急坐之也手太陰之別名曰列缺起於腕上分間並太陰之經直入掌中散入於魚際其病實則手鋭掌熱虛則缺㰦小便遺數取之去腕半寸別走陽明也手少陰之別名曰通里去腕一寸半別而上行循經入於心中系舌本屬目系其實則支膈虛則不能言取之掌後一寸別走太陽也手心主之別名曰內關去腕二寸出於兩筋之間循經以上繫於心包絡心系實則心痛虛則為頭強取之兩筋間也手太陽之別名曰支正上腕五寸內注少陰其別者上走肘絡肩髃實則節弛肘廢虛則生疣小者如指痂疥取之所別也手陽明之別名曰偏歷去腕三寸別入太陰其別者上循臂乘肩髃上曲頰偏齒其別者入耳合於宗脈實則齲聾虛則齒寒痹隔取之所別也手少陽之別名曰外關去腕二寸外繞臂注胸中合心主病實則肘攣虛則不收取之所別也足太陽之別名曰飛陽去踝七寸別走少陰實則鼽窒頭背痛虛則鼽衄取之所別也足少陽之別名曰光明去踝五寸別走厥陰下絡足跗實則厥虛則痿躄坐不能起取之所別也足陽明之別名曰豐隆去踝八寸別走太陰其別者循脛骨外廉上絡頭項合諸經之氣下絡喉嗌其病氣逆則喉痹瘁喑實則狂巔虛則足不收脛枯取之所別也足太陰之別名曰公孫去本節之後一寸別走陽明其別者入絡腸胃厥氣上逆則霍亂實則腸中切痛虛則鼓脹取之所別也足少陰之別名曰大鐘當踝後繞跟別走太陽其別者並經上走於心包下外貫腰脊其病氣逆則煩悶實則閉癃虛則腰痛取之所別者也足厥陰之別名曰蠡溝去內踝五寸別走少陽其別者徑脛上睪結於莖其病氣逆則睪腫卒疝實則挺長虛則暴癢取之所別也任脈之別名曰尾翳下鳩尾散於腹實則腹皮痛虛則癢搔取之所別也督脈之別名曰長強挾膂上項散頭上下當肩胛左右別走太陽入貫膂實則脊強虛則頭重高搖之挾脊之有過者取之所別也脾之大絡名曰大包出淵腋下三寸布胸脅實則身盡痛虛則百節盡皆縱此脈若羅絡之血者皆取之脾之大絡脈也凡此十五絡者實則必見虛則必下視之不見求之上下人經不同絡脈異所別也二靈樞本輸篇此篇為針灸家依經認穴扼要治病之祖其十二經五臟六腑之井滎俞經合各穴之發明非開天明道之聖人不能通曉非後世言解剖者所能幾其萬一凡人周身之穴道及用針灸治病之方法俱由此篇逐漸發明尤為針灸家不可不讀黃帝問於岐伯曰凡刺之道必通十二經絡之所終始絡脈之所別處五輸之所留六腑之所與合四時之所出入五臟之所溜處闊數之度淺深之狀高下所至願聞其解岐伯曰請言其次也肺出於少商少商者手大指端內側也為井木溜於魚際魚際者手魚也為滎注於太淵太淵魚後一寸陷者中也為腧行於經渠經渠寸口中也動而不居為經入於尺澤尺澤肘中之動脈也為合手太陰經也心出於中衝中衝手中指之端也為井木溜於勞宮勞宮掌中中指本節之內間也為滎注於大陵大陵掌後兩骨之間方下者也為腧行於間使間使之道兩筋之間三寸之中也有過則至無過則止為經入於曲澤曲澤肘內廉下陷者之中也屈而得之為合手少陰也肝出於大敦大敦者足大指之端及三毛之中也為井木溜於行間行間足大指間也為滎注於太衝太衝行間上二寸陷者之中也為腧行於中封中封內踝之前一寸半陷者之中使逆則宛使和則通搖足而得之為經入於曲泉曲泉輔骨之下大筋之上也屈膝而得之為合足厥陰也脾出於隱白隱白者足大指之端內側也為井木溜於大都大都本節之後下陷者之中也為滎注於太白太白腕骨之下也為腧行於商丘商丘內踝之下陷者之中也為經入於陰之陵泉陰之陵泉輔骨之下陷者之中也伸而得之為合足太陰也腎出於湧泉湧泉者足心也為井木溜於然谷然谷然骨之下者也為滎注於太溪太溪內踝之後跟骨之上陷中者也為腧行於復溜復溜上內踝二寸動而不休為經入於陰谷陰谷輔骨之後大筋之下小筋之上也按之應手屈膝而得之為合足少陰經也膀胱出於至陰至陰者足小指之端也為井金溜於通谷通谷本節之前外側也為滎注於束骨束骨本節之後陷者中也為腧過於京骨京骨足外側大骨之下為原行於崑崙崑崙在外踝之後跟骨之上為經入於委中委中膕中央為合委而取之足太陽也膽出於竅陰竅陰者足小指次指之端也為井金溜於俠溪俠溪足小指次指之間也為滎注於臨泣臨泣上行一寸半陷者中也為腧過於丘墟丘墟外踝之前下陷者中也為原行於陽輔陽輔外踝之上輔骨之前及絶骨之端也為經入於陽之陵泉陽之陵泉在膝外陷者中也為合伸而得之足少陽也胃出於厲兌厲兌者足大指內次指之端也為井金溜於內庭內庭次指外間也為滎注於陷谷陷谷者上中指內間上行二寸陷者中也為腧過於衝陽衝陽足跗上五寸陷者中也為原搖足而得之行於解溪解溪上衝陽一寸半陷者中也為經入於下陵下陵膝下三寸胻骨外三里也為合復下三里三寸為巨虛上廉復下上廉三寸為巨虛下廉也大腸屬上小腸屬下足陽明胃脈也大腸小腸皆屬於胃是足陽明也三焦者上合手少陽出於關衝關衝者手小指次指之端也為井金溜於液門液門小指次指之間也為滎注於中渚中渚本節之後陷者中也為腧過於陽池陽池在腕上陷者之中也為原行於支溝支溝上腕三寸兩骨之間陷者中也為經入於天井天井在肘外大骨之上陷者中也為合屈肘乃得之三焦下腧在於足大指之前少陽之後出於膕中外廉名曰委陽是太陽絡也手少陽經也三焦者足少陽太陰之所將太陽之別也上踝五寸別入貫腨腸出於委陽並太陽之正入絡膀胱約下焦實則閉癃虛則遺溺遺溺則補之閉癃則瀉之手太陽小腸者上合手太陽出於少澤少澤小指之端也為井金溜於前谷前谷在手外廉本節前陷者中也為滎注於後溪後溪者在手外側本節之後也為腧過於腕骨腕骨在手外側腕骨之前為原行於陽谷陽谷在鋭骨之下陷者中也為經入於小海小海在肘內大骨之外去端半寸陷者中也伸臂而得之為合手太陽經也大腸上合手陽明出於商陽商陽大指次指之端也為井金溜於本節之前二間為滎注於本節之後三間為腧過於合谷合谷在大指岐骨之間為原行於陽溪陽溪在兩筋間陷者中也為經入手曲池在肘外輔骨陷者中屈臂而得之為合手陽明也是五臟六腑之腧五五二十五腧六六三十六腧也六腑皆出足之三陽上合於手者也缺盆之中任脈也名曰天突一次任脈側之動脈足陽明也名曰人迎二次脈手陽明也名曰扶突三次脈手太陽也名曰天窗四次脈足少陽也名曰天容五次脈手少陽也名曰天牖六次脈足太陽也名曰天柱七次脈頸中央之脈督脈也名曰風府腋內動脈手太陰也名曰天府腋下三寸手心主也名曰天池刺上關者呿不能缺刺下關者缺不能呿刺犢鼻者屈不能伸刺兩關者伸不能屈足陽明挾喉之動脈也其腧在膺中手陽明次在其腧外不至曲頰一寸手太陽當曲頰足少陽在耳下曲頰之後手少陽出耳後上加完骨之上足太陽挾項大筋之中髮際陰尺動脈在五里五腧之禁也肺合大腸大腸者傳道之府心合小腸小腸者受盛之府肝合膽膽者中精之府脾合胃胃者五穀之府腎合膀胱膀胱者津液之府也少陽屬腎腎上連肺故將兩臟三焦者中瀆之府也水道出焉屬膀胱是孤之腑也是六腑之所與合者春取絡脈諸滎大筋分肉之間甚者深取之間者淺取之夏取諸腧孫絡肌肉皮膚之上秋取諸合余如春法冬取諸井諸腧之分欲深而留之此四時之序氣之所處病之所舍藏之所宜轉筋者立而取之可令遂已痿厥者張而刺之可令立快也三靈樞九針十二原篇此篇為內經言針法之祖雖所用之針古今沿革不同而所云針法之精微奧妙萬世不能出其範圍針灸家不讀此篇是數典而忘其祖不知其如何措手矣黃帝問於岐伯曰餘子萬民養百姓而收其租稅余哀其不給而屬有疾病余欲勿使被毒藥無用砭石欲以微針通其經脈調其血氣營其逆順出入之會令可傳於後世必明為之法令終而不滅久而不絶易用難忘為之經紀異其章別其表裡為之終始令各有形先立針經願聞其情岐伯答曰臣請推而次之令有綱紀始於一終於九焉請言其道小針之要易陳而難入粗守形上守神神乎神客在門未睹其疾惡知其原刺之微在速遲粗守關上守機機之動不離其空空中之機清靜而微其來不可逢其往不可追知機之道者不可掛以發不知機道叩之不發知其往來要與之期粗之暗乎妙哉工獨有之往者為逆來者為順明知逆順正行無問迎而奪之惡得無虛追而濟之惡得無實迎之隨之以意和之針道畢矣凡用針者虛則實之滿則泄之宛陳則除之邪勝則虛之大要曰徐而疾則實疾而徐則虛言實與虛若有若無察後與先若存若亡為虛與實若得若失虛實之要九針最妙補瀉之時以針為之瀉曰必持內之放而出之排陽得針邪氣得泄按而引針是謂內溫血不得散氣不得出也補曰隨之隨之意若妄之若行若按如蚊虻止如留如還去如弦絶今左屬右其氣故止外門已閉中氣乃實必無留血急取誅之持針之道堅者為寶正指直刺無針左右神在秋毫屬意病者審視血脈者刺之無殆方刺之時必在懸陽及與兩衛神屬勿去知病存亡血脈者在腧橫居視之獨澄切之獨堅九針之名各不同形一曰鑱針長一寸六分二曰員針長一寸六分三曰匙針長三寸半四曰鋒針長一寸六分五曰鈹針長四寸廣二分半六曰員利針長一寸六分七曰毫針長三寸六分八曰長針長七寸九曰大針長四寸鑱針者頭大末鋭去瀉陽氣員針者針如卵形揩摩分間不得傷肌肉以瀉分氣匙針者鋒如黍粟之鋭主按脈勿陷以致其氣鋒針者刃三偶以發痼疾鈹針者末知劍鋒以取大膿員利針者大如氂且員且鋭中身微大以取暴氣毫針者尖如蚊虻喙靜以徐往微以久留之而養以取痛痹長針者鋒利身薄可以取遠痹大針者尖如挺其鋒微員以瀉機關之水也九針畢矣夫氣之在脈也邪氣在上濁氣在中清氣在下故針陷脈則邪氣出針中脈則濁氣出針太深則邪氣反沉病益故曰皮肉筋脈各有所處病各有所宜各不同形各以任其所宜無實無虛損不足而益有餘是謂甚病病益甚取五脈者死取三脈者恇奪陰者死奪陽者狂針害畢矣刺之而氣不至無問其數刺之而氣至乃去之勿復針針各有所宜各不同形各任其所為刺之要氣至而有效效之信若風之吹雲明乎若見蒼天刺之道畢矣黃帝曰願聞五臟六腑所出之處岐伯曰五臟五腧五五二十五腧六腑六腧六六三十六腧經脈十二絡脈十五凡二十七氣以上下所出為井所溜為滎所注為腧所行為經所入為合二十七氣所行皆在五腧也節之交三百六十五會知其要者一言而終不知其要流散無窮所言節者神氣之所遊行出入也非皮肉筋骨也睹其色察其目知其散復一其形聽其動靜知其邪正右主推之左持而御之氣至而去之凡將用針必先診脈視氣之劇易乃可以治也五臟之氣已絶於內而用針者反實其外是謂重竭重竭必死其死也靜治之者輒反其氣取腋與膺五臟之氣已絶於外而用針者反實其內是謂逆厥逆厥則必死其死也躁治之者反取四末刺之害中而不去則精泄害中而去則致氣精泄則病益甚而恇致氣則生為癰瘍五臟有六腑六腑有十二原十二原出於四關四關主治五臟五臟有疾當取之十二原十二原者五臟之所以稟三百六十五節氣味也五臟有疾也應出十二原而原各有所出明知其原睹其應而知五臟之害矣陽中之少陰肺也其原出於太淵太淵二陽中之太陽心也其原出於大陵大陵二陰中之少陽肝也其原出於太衝太衝二陰中之至陰脾也其原出於太白太白二陰中之太陰腎也其原出太溪太溪二膏之原出於鳩尾鳩尾一肓之原出於脖胦脖胦一凡此十二原者主治五臟六腑之有疾者也脹取三陽飧泄取三陰今夫五臟之有疾也譬猶刺也猶汙也猶結也猶閉也刺雖久猶可拔也汙雖久猶可雪也結雖久猶可解也閉雖久猶可決也或言久疾之不可取者非其說也夫善用針者取其疾也猶拔刺也猶雪汙也猶解結也猶決閉也疾雖久猶可畢也言不可治者未得其術也刺諸熱者如以手探湯刺寒清者如人不欲行陰有陽疾者取之下陵三里正往無殆氣下乃止不下復始也疾高而內者取之陰之陵泉疾高而外者取之陽之陵泉也四靈樞小針解此篇乃前篇之注解與素問針解篇大同小異皆古聖針法之真傳恐後世以訛傳訛故特著此二篇以防後世之貽誤凡習針法者萬不可不讀所謂易陳者易言也難入者難著於人也粗守形者守刺法也上守神者守人之血氣有餘不足可補瀉也神客者正邪共會也神者正氣也客者邪氣也在門者邪循正氣之所出入也未睹其疾者先知邪正何經之疾也惡知其原者先知何經之病所取之處也刺之微在數遲者徐疾之意也粗守關者守四肢而不知血氣正邪之往來也上守機者知守氣也機之動不離其空中者知氣之虛實用針之徐疾也空中之機清淨以微者針以得氣密意守氣勿失也其來不可逢者氣盛不可補也其往不可追者氣虛不可瀉也不可掛以發者言氣易失也扣之不發者言不知補瀉之意也血氣已盡而氣不下也知其往來者知氣之逆順盛虛也要與之期者知氣之可取之時也粗之暗者冥冥不知氣之微密也妙哉工獨有之者盡知針意也往者為逆者言氣之虛而小小者逆也來者為順者言形氣之平平者順也明知逆順正行無問者言知所取之處也迎而奪之者瀉也追而濟之者補也所謂虛則實之者氣口虛而當補之也滿則泄之者氣口盛而當瀉之也宛陳則除之者去血脈也邪勝則虛之者言諸經有盛者皆瀉其邪也徐而疾則實者言徐內而疾出也疾而徐則虛者言疾內而徐出也言實與虛若有若無者言實者有氣虛者無氣也察後與先若亡若存者言氣之虛實補瀉之先後也察其氣之已下與常存也為虛與實若得若失者言補者佖然若有得也瀉則恍然有失也夫氣之在脈也邪氣在上者言邪氣之中人也高故邪氣在上也濁氣在中者言水穀皆入於胃其精氣上注於肺濁溜於腸胃言寒溫不適飲食不節而病生於腸胃故命曰濁氣在中也清氣在下者言清濕地氣之中人也必從足始故曰清氣在下也針陷脈則邪氣出者取之上針中脈則濁氣出者取之陽明合也針太深則邪氣反沉者言淺浮之病不欲深刺也深則邪氣從之入故曰反沉也皮肉筋脈各有所處者言經絡各有所主也取五脈者死言病在中氣不足但用針盡大瀉其諸陰之脈也取三陽之脈者唯言盡瀉三陽之氣令病恇然不復也奪陰者死言取尺之五里五往者也奪陽者狂正言也睹其色察其目知其散復一其形聽其動靜者言上工知相五色於目有知調尺寸小大緩急滑澀以言所病也知其邪正者知論虛邪與正邪之風也右主推之左持而御之者言持針而出入也氣至而去之者言補瀉氣調而去之也調氣在於終始一者持心也節之交三百六十五會者絡脈之滲灌諸節者也所謂五臟之氣已絶於內者脈口氣內絶不至反取其外之病處與陽經之合有留針以致陽氣陽氣至則內重竭重竭則死矣其死也無氣以動故靜所謂五臟之氣已絶於外者脈口氣外絶不至反取其四末之輸有留針以致其陰氣陰氣至則陽氣反入入則逆逆則死矣其死也陰氣有餘故躁所以察其目者五臟使五色循明循明則聲章聲章者則言聲與平生異也五靈樞營氣篇此篇論營血之專行於經隧循環無端而成十二經脈須與第一篇參看其理益明黃帝曰營氣之道內谷為寶谷入於胃乃傳之肺流溢於中布散於外精專者行於經隧常營無已終而復始是謂天地之紀故氣從太陰出注手陽明上行注足陽明下行至跗上注大指間與太陰合上行抵髀從脾注心中循手少陰出腋下臂注小指合手太陽上行乘腋出䪼內注目內眥上巔下項合足太陽循脊下尻下行注小指之端循足心注足少陰上行注腎從腎注心外散於胸中循心主脈出腋下臂出兩筋之間入掌中出中指之端還注小指次指之端合手少陽上行注膻中散於三焦從三焦注膽出脅注足少陽下行至跗上復從跗注大指間合足厥陰上行至肝從肝上注肺上循喉嚨入頏顙之竅究於蓄門其支別者上額循巔下項中循脊入骶是督脈也絡陰器上過毛中入臍中上循腹裡入缺盆下注肺中復出太陰此營氣之所行也逆順之常也六靈樞營衛生會篇此篇論營衛之所由生及三焦生化之原理凡針法皆借營衛以為用如不明營衛循行與三焦相關之理則區區毫芒之針如何發生效力且所謂刺營無傷衛刺衛無傷營者果如所指又果何以措手耶黃帝問於岐伯曰人焉受氣陰陽焉會何氣為營何氣為衛營安從生衛於焉會老壯不同氣陰陽異位願聞其會岐伯答曰人受氣於谷谷入於胃以傳與肺五臟六腑皆以受氣其清者為營濁者為衛營在脈中衛在脈外營周不休五十而復大會陰陽相貫如環無端衛氣行於陰二十五度行於陽二十五度分為晝夜故氣至陽而起至陰而止故曰日中而陽隴為重陽夜半而陰隴為重陰故太陰主內太陽主外各行二十五度分為晝夜夜半為陰隴夜半後而為陰衰平旦陰盡而陽受氣矣日中為陽隴日西而陽衰日入陽盡而陰受氣矣夜半而大會萬民皆臥命曰合陰平旦陰盡而陽受氣如是無已與天地同紀黃帝曰老人之不夜瞑者何氣使然少壯之人不晝瞑者何氣使然岐伯答曰壯者之氣血盛其肌肉滑氣道通營衛之行不失其常故晝精而夜瞑老者之氣血衰其肌肉枯氣道澀五臟之氣相搏其營氣衰少而衛氣內伐故晝不精夜不瞑黃帝曰願聞營衛之所行皆何道從來岐伯答曰營出於中焦衛出於下焦黃帝曰願聞三焦之所出岐伯答曰上焦出於胃上口並咽以上貫膈而布胸中走腋循太陰之分而行還至陽明上至舌下足陽明常與營俱行於陽二十五度行於陰亦二十五度一周也故五十度而復大會於手太陰矣黃帝曰人有熱飲食下胃其氣未定汗則出或出於面或出於背或出於身半其不循衛氣之道而出何也岐伯曰此外傷於風內開腠理毛蒸理泄衛氣走之固不得循其道此氣慓悍滑疾見開而出故不得從其道故命曰漏泄黃帝曰願聞中焦之所出岐伯答曰中焦亦並胃中出上焦之後此所受氣者泌糟粕蒸津液化其精微上注於肺脈乃化而為血以奉生身莫貴於此故獨得行於經隧命曰營氣黃帝曰夫血之與氣異名同類何謂也岐伯答曰營衛者精氣也血者神氣也故血之與氣異名同類焉故奪血者無汗奪汗者無血故人生有兩死而無兩生黃帝曰願聞下焦之所出岐伯曰下焦者別回腸注於膀胱而滲入焉故水穀者常並居於胃中成糟粕而俱下於大腸而成下焦滲而俱下濟泌別汁循下焦而滲入膀胱焉黃帝曰人飲酒酒亦入胃谷未熟而小便獨先下何也岐伯答曰酒者熟谷之液也其氣悍以清故後谷而入先谷而液出焉黃帝曰善余聞上焦如霧中焦如漚下焦如瀆此之謂也七素問離合真邪論篇此篇論審症候氣引針補瀉之法至詳且盡為後世針家所宗祖亟録之以示模範黃帝問曰余聞九針九篇夫子乃因而九之九九八十一篇余盡通其意矣經言氣之盛衰左右傾移以上調下以左調右有餘不足補瀉於滎輸余知之矣此皆榮衛之傾移虛實之所生非邪氣從外入於經也余願聞邪氣之在經也其病人何如取之奈何岐伯對曰夫聖人之起度數必應於天地故天有宿度地有經水人有經脈天地溫和則經水安靜天寒地凍則經水凝泣天暑地熱則經水沸溢卒風暴起則經水波湧而隴起夫邪之入於脈也寒則血凝泣暑則氣淖澤虛邪因而入客亦如經水之得風也經之動脈其至也亦時隴起其行於脈中循循然其至寸口中手也時大時小大則邪至小則平其行無常處在陰與陽不可為度從而察之三部九候卒然逢之早遏其路吸則內針無令氣忤靜以久留無令邪布吸則轉針以得氣為故候呼引針呼盡乃去大氣皆出故命曰瀉帝曰不足者補之奈何岐伯曰必先捫而循之切而散之推而按之彈而怒之抓而下之通而取之外引其門以閉其神呼盡內針靜以久留以氣至為故如待所貴不知日暮其氣以至適而自護候吸引針氣不得出各在其處推闔其門令神氣存大氣留止故命曰補帝曰候氣奈何岐伯曰夫邪去絡入於經也舍於血脈之中其寒溫未相得如湧波之起也時來時去故不常在故曰方其來也必按而止之止而取之無逢其沖而瀉之真氣者經氣者經氣太虛故曰其來不可逢此之謂也故曰候邪不審大氣已過瀉之則真氣脫脫則不復邪氣復至而病益蓄故曰其往不可追此之謂也不可掛以發者待邪之至時而髮針瀉矣若先若後者血氣已盡其病不可下故曰知其可取如發機不知其取如扣椎故曰知機道者不可掛以發不知機者扣之不發此之謂也帝曰補瀉奈何岐伯曰此攻邪也疾出以去盛血而復其真氣此邪新客溶溶未有定處也推之則前引之則止逆而刺之溫血也刺出其血其病立已帝曰善然真邪以合波隴不起候之奈何岐伯曰審捫循三部九候之盛虛而調之察其左右上下相失及相減者審其病藏以期之不知三部者陰陽不別天地不分地以候地天以候天人以候人調之中府以定三部故曰刺不知三部九候病脈之處雖有大過且至工不能禁也誅罰無過命曰大惑反亂大經真不可復用實為虛以邪為真用針無義反為氣賊奪人正氣以從為逆榮衛散亂其氣已失邪獨內著絶人長命豫人天殃不知三部九候故不能久長因不知合之四時五行因加相勝釋邪攻正絶人長命邪之新客來也未有定處推之則前引之則止逢而瀉之其病立已八素問刺要論篇此篇與下篇刺齊論全元起本原為一篇王冰分而為二統論刺法之淺深戒以過深致害針家不可不知黃帝問曰願聞刺要岐伯對曰病有浮沉刺有淺深各至其理無過其道過之則內傷不及則生外壅壅則邪從之淺深不得反為大賊內動五臟後生大病故曰病有在毫毛腠理者有在皮膚者有在肌肉者有在脈者有在筋者有在骨者有在髓者是故刺毫毛胰理無傷皮皮傷則內動脈肺動則秋病溫瘧泝泝然寒栗刺皮無傷肉肉傷則內動脾脾動則七十二日四季之月病腹脹煩不嗜食刺肉無傷脈脈傷則內動心心動則夏病心痛刺脈無傷筋筋傷則內動肝肝動則春病熱而筋弛刺筋無傷骨骨傷則內動腎腎動則冬病脹腰痛刺骨無傷髓髓傷則銷鑠胻酸體解㑊然不去矣九素問刺齊論篇義已見前黃帝問曰願聞刺淺深之分岐伯對曰刺骨者無傷筋刺筋者無傷肉刺肉者無傷脈刺脈者無傷皮刺皮者無傷肉刺肉者無傷筋刺筋者無傷骨帝曰余未知其所謂願聞其解岐伯曰刺骨無傷筋者針至筋而去不及骨也刺筋無傷肉者至肉而去不及筋也刺肉無傷脈者至脈而去不及肉也刺脈無傷皮者至皮而去不及脈也所謂刺皮無傷肉者病在皮中針入皮中無傷肉也刺肉無傷筋者過肉中筋也刺筋無傷骨者過筋中骨也此之謂反也十素問刺禁論篇此篇論禁刺之要害凡針家皆宜三復之黃帝問曰願聞禁數岐伯曰臟有要害不可不察肝生於左肺藏於右心部於表腎治於裡脾為之使胃為之市鬲肓之上中有父母七節之傍中有小心從之有福逆之有咎刺中心一日死其動為噫刺中肝五日死其動為語刺中腎六日死其動為嚏刺中肺三日死其動為咳刺中脾十日死其動為吞刺中膽一日半死其動為嘔刺跗上中大脈血出不止死刺面中溜脈不幸為盲刺頭中腦戶入腦立死刺舌下中脈太過血出不止為喑刺足下布絡中脈血不出為腫刺郤中大脈令人僕脫色刺氣街中脈血不出為腫鼠僕刺脊間中髓為傴刺乳上中乳房為腫根蝕刺缺盆中內陷氣泄令人喘咳逆刺手魚腹內陷為腫無刺大醉令人氣亂無刺大怒令人氣逆無刺大勞人無刺新飽人無刺大飢人無刺大渴人無刺大驚人刺陰股中大脈血出不止死刺客主人內陷中脈為內漏為聾刺膝臏出液為跛刺臂太陰脈出血多立死刺足少陰脈重虛出血為舌難以言刺膺中陷中肺為喘逆仰息刺肘中內陷氣歸之為不屈伸刺陰股下三寸內陷令人遺溺刺掖下脅間內陷令人咳刺少腹中膀胱溺出令人少腹滿刺腨腸內陷為腫刺匡上陷骨中脈為漏為盲刺關節中液出不得屈伸十一素問刺志論篇此篇以氣血隨谷脈為虛實叮嚀反復以免誤針可見針灸家於虛實寒熱補瀉之道亟應講求不得籠統施治黃帝問曰願聞虛實之要岐伯對曰氣實形實氣虛形虛此其常也反此者病谷盛氣盛谷虛氣虛此其常也反此者病脈實血實脈虛血虛此其常也反此者病帝曰如何而反岐伯曰氣虛身熱此謂反也谷入多而氣少此謂反也谷不入而氣多此謂反也脈盛血少此謂反也脈小血多此謂反也氣盛身寒得之傷寒氣虛身熱得之傷暑谷入多而氣少者得之有所脫血濕居下也谷入少而氣多者邪在胃及與肺也脈小血多者飲中熱也脈大血少者脈有風氣水漿不入此之謂也夫實者氣入也虛者氣出也氣實者熱也氣虛者寒也入實者左手開針空也入虛者左手閉針空也十二素問針解篇此篇與靈樞小針解大同小異後半所釋非九針十二原篇之文疑另有九針一篇或在外經今佚不傳篇末百二十四字王冰已稱義理殘缺莫可尋究因上古之書故且載之以示一字千金之義黃帝問曰願聞九針之解虛實之道岐伯對曰刺虛則實之者針下熱也氣實乃熱也滿而泄之者針下寒也氣虛乃寒也菀陳則除之者出惡血也邪勝則虛之者出針勿按徐而疾則實者徐出針而疾按之疾而徐則虛者疾出針而徐按之言實與虛者寒溫氣多少也若無若有者疾不可知也察後與先者知病先後也為虛與實者工勿失其法若得若失者離其法也虛實之要九針最妙者為其各有所宜也補瀉之時者與氣開闔相合也九針之名各不同形者針窮其所當補瀉也刺實須其虛者留針陰氣隆至乃去針也刺虛須其實者陽氣隆至針下熱乃去針也經氣已至慎守勿失者勿變更也深淺在志者知病之內外也近遠如一者深淺其候等也如臨深淵者不敢墮也手如握虎者欲其壯也神無營於衆物者靜志觀病人無左右視也義無邪下者欲端以正也必正其神者欲瞻病人目制其神令氣易行也所謂三里者下膝三寸也所謂跗之者舉膝分易見也巨虛者蹺足䯒獨陷者下廉者陷下者也帝曰余聞九針上應天地四時陰陽願聞其方令可傳於後世以為常也岐伯曰夫一天二地三人四時五音六律七星八風九野身形亦應之針各有所宜故曰九針人皮應天人肉應地人脈應人人筋應時人聲應音人陰陽合氣應律人齒面目應星人出入氣應風人九竅三百六十五絡應野故一針皮二針肉三針脈四針筋五針骨六針調陰陽七針益精八針除風九針通九竅除三百六十五節氣此之謂各有所主也人心意應八風人氣應天人發齒耳目五聲應五音六律人陰陽脈血氣應地人肝目應之九九竅三百六十五人一以觀動靜天二以候五色七星應之以候發毋澤五音一以候宮商角徵羽六律有餘不足應之二地一以候高下有餘九野一節俞應之以候閉節三人變一分人候齒泄多血少十分角之變五分以候緩急六分不足三分寒關節第九分四時人寒溫燥濕四時一應之以候相反一四方各作解十三難經録要六十二難曰藏井滎有五府獨有六者何謂也然府者陽也三焦行於諸陽故置一俞名曰原所以府有六者亦與三焦共一氣也共一氣謂亦行於諸陽非謂其氣皆出於三焦也六十三難曰十變言五臟六腑滎合皆以井為始者何也然井者東方春也萬物之始生諸蚑行喘息蜎飛蠕動當生之物莫不以春生故歲數始於春日數始於甲故以井為始也靈本輸篇臟之井皆屬木腑之井皆屬金此言臟腑之井皆屬木越人或另有所本難經有與內經互異之處皆注明於每難之後以俟考訂六十四難曰十變又言陰井木陽井金陰滎火陽滎水陰俞土陽俞木陰經金陽經火陰合水陽合土陰陽皆不同其意何也然是剛柔之事也陰井乙木陽井庚金陽井庚庚者乙之剛也陰井乙乙者庚之柔也乙為木故言陰井木也庚為金故言陽井金也余皆仿此後半言陰陽配合之道義頗精當六十五難曰經言所出為井所入為合其法奈何然所出為井井者東方春也萬物之始生故言所出為井也所入為合合者北方冬也陽氣入藏故言所入為合也六十六難曰經言肺之原出於太淵心之原出於大陵肝之原出於太衝脾之原出於大白腎之原出於太溪少陰之原出於兌骨膽之原出於丘墟胃之原出於衝陽三焦之原出於陽池膀胱之原出於京骨大腸之原出於合谷小腸之原出於腕骨十二經皆以俞為原者何也然五臟俞者三焦之所行氣之所留止也三焦所行之俞為原者何也然齊下腎間動氣者人之生命也十二經之根本也故名曰原三焦者原氣之別使也主通行三氣經歷於五臟六腑原者三焦之尊號也故所止輒為原五臟六腑之有病者皆取其原也靈本輸篇心出於中衝為井木云云乃以手厥陰包絡之穴為心所出入之處因心為人身之主精神所舍其臟堅固邪弗能客故邪在心者皆在包絡故以大陵為心之原然甲乙經以少衝為心之井云云是以心經仍以本經之穴為井滎俞經合實兩經之所無此以兌骨為少陰之原或即甲乙之所本六十七難曰五臟募皆在陰而俞皆在陽者何謂也然陰病行陽陽病行陰故令募在陰俞在陽也六十八難曰五臟六腑皆有井滎俞經合皆何所主然經言所出為井所流為滎所注為俞所行為經所入為合井主心下滿滎主身熱俞主體重節痛經主喘咳寒熱合主逆氣而泄此五臟六腑井滎俞經合所主病也六十九難曰經言虛者補之實者瀉之不實不虛以經取之何謂也然虛者補其母實者瀉其子當先補之然後瀉之不實不虛以經取之者是正經自生病不中他邪也當自取其經故言以經取之內經補瀉之法或取本經或取他經或先瀉後補或先補後瀉或取一經或取三四經其法不一若概以補母瀉子為定法則未必然也七十難曰春夏刺淺秋冬刺深者何謂也然春夏者陽氣在上人氣亦在上故當淺取之秋冬者陰氣在下人氣亦在下故當深取之春夏各致一陰秋冬各致一陽者何謂也然春夏溫必致一陰者初下針沉之至腎肝之部得氣引持之陰也秋冬寒必致一陽者初內針淺而浮之至心肺之部得氣推內之陽也是謂春夏必致一陰秋冬必致一陽七十一難曰經言刺榮無傷衛刺衛無傷榮何謂也然針陽者臥針而刺之刺陰者以左手攝按所針滎俞之處氣散乃內針是謂刺榮無傷衛刺衛無傷榮也臥針即靈官針篇浮刺之法攝按散氣即素問離合真邪論捫而循之等法此取之以為刺陰刺陽之道亦簡當可法七十二難曰經言能知迎隨之氣可令調之調氣之方必在陰陽何謂也然所謂迎隨者知榮衛之流行經脈之往來也隨其逆順而取之故曰迎隨調氣之方必在陰陽者知其內外表里隨其陰陽而調之故曰調氣之方必在陰陽七十三難曰諸井者肌肉淺薄氣少不足使也刺之奈何然諸井者木也滎者火也火者木之子當刺井者以滎瀉之故經言補者不可以為瀉瀉者不可以為補此之謂也六十九難以別經為子母此又以一經子母義各殊而理極精七十四難曰經言春刺井夏刺滎季夏刺俞秋刺經冬刺合者何謂也然春刺井者邪在肝夏刺滎者邪在心季夏刺俞者邪在脾秋刺經者邪在肺冬刺合者邪在腎其肝心脾肺腎而繫於春夏秋冬者何也然五臟一病輒有五也假令肝病色青者肝也臊臭者肝也喜酸者肝也喜呼者肝也喜泣者肝也其病衆多不可盡言也四時有數而並繫於春夏秋冬者也針之要妙在於秋毫者也七十五難曰經言東方實西方虛瀉南方補北方何謂也然金木水火土當更相平東方木也西方金也木欲實金當平之火欲實水當平之土欲實木當平之金欲實火當平之水欲實土當平之東方肝也則知肝實西方肺也則知肺虛瀉南方火補北方水南方火火者木之子也北方水水者木之母也水勝火子能令母實母能令子虛故瀉火補水欲令金得平木也經曰不能治其虛何問其餘此之謂也六十九難虛則補母實則瀉子今實則瀉子補母虛則反補其子未詳何故七十六難曰何謂補瀉當補之時何所取氣當瀉之時何所置氣然當補之時從衛取氣當瀉之時從榮置氣其陽氣不足陰氣有餘當先補其陽而後瀉其陰陰氣不足陽氣有餘當先補其陰而後瀉其陽榮衛通行此其要也七十七難曰經言上工治未病中工治已病者何謂也然所謂治未病者見肝之病則知肝當傳之與脾故先實其脾氣無令得受肝之邪故曰治未病焉中工者見肝之病不曉相傳但一心治肝故曰治已病也金匱要略首篇云上工治未病節與此正合而不見於靈素兩經想仲景即引越人所說而越人又另有所本也七十八難曰針有補瀉何謂也然補瀉之法非必呼吸出內針也知為針者信其左不知為針者信其右當刺之時先以左手厭按所針滎俞之處彈而努之爪而下之其氣之來如動脈之狀順針而刺之得氣因推而內之是謂補動而伸之是謂瀉不得氣乃與男外女內不得氣是為十死不治也呼吸出納為補瀉之法即素問離合真邪論所云是也越人以為補瀉之法不止於死故以信左信右之說發揮之七十九難曰經言迎而奪之安得無虛隨而濟之安得無實虛之與實若得若失實之與虛若有若無何謂也然迎而奪之者瀉其子也隨而濟之者補其母也假令心病瀉手心主俞是謂迎而奪之者也補手心主井是謂隨而濟之者也所謂實之與虛者牢濡之意也氣來實牢者為得濡虛者為失故曰若得若失也內經針法候其氣之呼吸出入及針鋒之所向以為補瀉是皆以一穴之順逆為迎隨此則以針本經來處之穴為迎為瀉針去處之穴為隨為補是以本穴之前後穴為迎隨矣義相近而法各殊八十難曰經言有見如入有見如出者何謂也然所謂有見如入者謂左手見氣來至乃內針針入見氣盡乃出針是謂有見如入有見如出也此節內如字皆讀作而字其義自明八十一難曰經言無實實虛虛損不足而益有餘是寸口脈耶將病自有虛實耶其損益奈何然是病非謂寸口脈也謂病自有虛實也假令肝實而肺虛肝者木也肺者金也金木當更相平當知金平木假令肺實而肝虛微少氣用針不補其肝而反重實其肺故曰實實虛虛損不足而益有餘此者中工之所害也三骨度尺寸圖說一周身骨部名目巔頂巔也腦頭中髓也囟音信腦蓋骨也嬰兒腦骨未合軟而跳動之處謂之囟門是也額顱顱前為髮際髮際前為額顱顏額上曰顏說文曰眉目之間也頞音遏鼻梁亦名下極即山根也䪼音拙目下為䪼顳顬顳柔涉切顬間儒耳前動處蓋即俗所云兩太陽也一曰鬢骨顑音坎又海敢切釋義曰飢而面黃與經義未合詳見經絡類部分頄音求顴頰間骨頰耳下曲處為頰頤音移頷中為頤頷何敢切腮下也虎頭燕頷義即此目系目內深處脈也目內眥目內角也目鋭眥目外角也人中唇之上鼻之下也齒牙前小者曰齒後大者曰牙舌本舌根也咽所以通飲食居喉之後喉所以通呼吸居咽之前嗌音益喉也會厭在喉間為音聲啓閉之戶肺系喉嚨也頏顙頏音杭又去上二聲顙思黨切咽顙也頸項頭莖之側曰頸頭莖後為項又腦後曰項天柱骨肩骨上際頸骨之根也肩解膂上兩角為肩解肩胛胛音甲肩解下成片骨也亦名肩膊巨骨膺上橫骨膺音英胸前為膺一曰胸兩旁高處為膺胸中兩乳之間也膈膈膜也膈上為宗氣之所聚是為膻中腋脅之上際腹臍之上下皆曰腹臍下為少腹季脅脅下小肋胠區去二音腋之下脅之上也鳩尾蔽心骨也𩩲骬音結於即鳩尾別名牛宀隹中牛宀隹音秒季脅下兩旁空軟處也脊骨脊音即椎骨也胂音申膂內曰胂夾脊肉也膂呂同脊骨曰呂象形也又曰夾脊兩旁肉也髃骨髃音魚端也肩端之骨腰骨尻上橫骨也腰髁髁苦瓦切中原雅音作去聲即腰胯骨自是六椎而下俠脊附著之處也毛際曲骨兩旁為毛際其動脈即足陽明之氣衝也睪音高陰丸也篡初貫切屏翳兩筋間為篡篡內深處為下極下極兩陰之間屏翳處也即會陰穴臀音屯機後為臀尻旁大肉機挾腰髖骨兩旁為機髖音寬尻臀也一曰兩股間尻開高切尾骶骨也亦名窮骨肛音工又好綱切俗作綱大腸門也臑儒軟二音又奴刀切肩膊下內側對腋處高起耎白肉也肘手臂中節也一曰自曲池以上為肘臂肘之上下皆名為臂一曰自曲池以下為臂腕臂掌之交也兌骨手外踝也寸口關前後兩手動脈處皆曰寸口關手掌後動脈高骨處曰關魚際在手腕之前其肥肉隆起處形如魚者統謂之魚寸之前魚之後曰魚際穴大指次指謂大指之次指即食指也足亦同小指次指小指之次指即無名指也足亦同髀比婢二音股也一曰股骨髀關伏兔上交絞處曰髀關髀厭捷骨之下為髀厭即髀樞中也髀樞捷骨之下髀之上曰髀樞當環跳穴股大腿也伏兔髀前膝上起肉處曰伏兔臏頻牝二音膝蓋骨也膕音國膝後曲處曰膕輔骨膝下內外側大骨也成骨膝外廉之骨獨起者臑音篆一名腓腸下腿肚也腓腸腓音肥足肚也胻骨胻音杭又形敬切足脛骨也骭音干足脛骨也脛形景形敬二切足莖骨也絶骨外踝上尖骨曰絶骨䐃劬允切筋肉結聚之處也直音云腸中脂王氏曰肘膝後肉如塊者踝骨踝胡寡切足跗後兩旁圓骨內曰內踝外曰外踝俗名孤拐骨手腕兩旁圓骨亦名踝骨跗附敷二音足面也內筋內踝上大筋在太陰後上踝二寸所足岐骨大指本節後曰岐骨跟音根骨足根也核骨核亥陌切又胡骨亥不二切一作核骨足大指本節後內側圓骨也踵足根也踹音煅足根也本經與腨通用臚閭盧二音皮也一曰腹前曰臚三毛足大指爪甲後為三毛毛後橫紋為聚毛二骨度下文皆骨度篇古數然骨之大者則大過小者則不及此亦言其則耳頭部頭之大骨圍二尺六寸發所覆者顱至項一尺二寸顱額顱覆者言前髮際至後項髮際也發以下至頤長尺頷中為頤頷腮也兩顴相去七寸角以下至柱骨長一尺耳上側旁曰角肩膺上際頸根曰柱骨耳前當耳門者廣一尺三寸耳後當完骨者廣九寸完骨耳後髮際高骨也項發以下至背骨長三寸半自後髮際以至大椎項骨三節處也頭部折法以前髮際至後髮際折為一尺二寸如髮際不明則取眉心直上後至大杼骨折作一尺八寸此為直寸橫寸法以眼內角至外角比為一寸頭部橫直寸法並依此督脈神庭至太陽曲差曲差至少陽本神本神至陽明頭維各開一寸半自神庭至頭維共開四寸半胸腹部結喉以下至缺盆中長四寸此以巨骨上陷中而言即天突穴處缺盆以下至𩩲骬之中長九寸𩩲骬中至天樞長八寸天樞足陽明穴名在臍旁此指平臍而言天樞以下至橫骨長六寸半橫骨橫長六寸半毛際下骨曰橫骨按此古數以今用上下穴參較多有未合宜從後胸腹折法為當胸圍四尺五寸腰圍四尺二寸兩乳之間廣九寸半當折八寸為當兩髀之間廣六寸半此當兩股之中橫骨兩頭之處俗名髀縫胸腹折法直寸以中行為三自缺盆中天突穴起至岐骨際上中庭穴止折作八寸四分自𩩲骬上岐骨際下至臍心折作八寸臍心下至毛際曲骨穴折作五寸橫寸以兩乳相去折作八寸胸腹橫直寸法並依此背部膂骨以下至尾骶二十一節長三尺膂骨脊骨也脊骨外小而內巨人之所以能負任者以是骨之巨也脊骨二十四節今云二十一節者除項骨三節不在內尾骶骨男子者尖女子者平背部折法自大椎至尾骶通折三尺上七節各長一寸四分一釐共九寸八分七釐中七節各一寸六分一釐共一尺一寸二分七釐第十四節與臍平下七節各一寸二分六釐共八寸八分二釐總共二尺九寸九分六釐不足四釐者有零未盡也直寸依此橫寸用中指同身寸法脊骨內闊一寸凡云第二行夾脊一寸半三行夾脊三寸者皆除脊一寸外淨以寸半三寸論故在二行當為二寸在三行當為三寸半側部自柱骨下行腋中不見者長四寸柱骨頸項根骨也腋以下至季脅長一尺二寸季脅小肋也季脅以下至髀樞長六寸大腿曰股股上曰髀捷骨之下大股之上兩骨合縫之所曰髀樞當足少陽之環跳穴處也髀樞下至膝中長一尺九寸四肢部肩至肘長一尺七寸肘至腕長一尺二寸半臂之中節曰肘腕至中指本節長四寸臂掌之交曰腕本節至其末長四寸半指之後節曰本節橫骨上廉下至內輔之上廉長一尺八寸骨際曰廉膝旁之骨突出者曰輔骨內曰內輔外曰外輔內輔之上廉以下至下廉長三寸半上廉下廉可摸而得內輔下廉下至內踝長一尺三寸踝骨義見前內踝以下至地長三寸膝以下至外踝長一尺六寸外踝以下至京骨長三寸京骨以下至地長一寸膝膕以下至跗屬長一尺二寸膕腿彎也跗足面也膝在前膕在後跗屬者凡兩踝前後脛掌所交之處皆為跗之屬也跗屬以下至地長三寸足長一尺二寸廣四寸半手足折量並用後中指同身寸法同身寸法說同身寸者謂同於人身之尺寸也人之長短肥瘦各自不同而穴之橫直尺寸亦不能一如今以中指同身寸法一概混用則人瘦而指長人肥而指短豈不謬誤故必因其形而取之方得其當如標幽賦曰取五穴用一穴而必端取三經用一經而可正蓋謂並鄰經而正一經聯鄰穴而正一穴譬之切字之法上用一音下用一韻而夾其聲於中則其經穴之情自無所遁矣故頭必因於頭腹必因於腹背必因於背手足必因於手足總其長短大小而折中之庶得謂之同身寸法法附前各條之下而後之所謂中指同身寸法者雖不可混用而亦有當用之處並列於後中指同身寸法以男左女右手大指中指圓曲交接如環取中指小節橫紋兩頭盡處比為一寸凡手足尺寸及背部橫寸無折法之處乃用此法其他不必混用古今尺寸不同說骨度篇曰人長七尺五寸者其骨節之大小長短各幾何伯高曰頭之大骨圍二尺六寸蓋古之尺小大約古之一尺得今之八寸其言七尺五寸者得今之六尺其言二尺六寸者得今之二尺零八分也其餘仿此然骨大者必有太過骨小者必有不及凡用折法者但隨人之大小而為盈縮庶盡其善四經脈孔穴起止圖說經絡次序十二經絡始於手太陰其支者從腕後出次指端而交於手陽明手陽明之支者從缺盆上挾口鼻而交於足陽明足陽明之支者從跗上出大指端而交於足太陰足太陰之支者從胃別上膈注心中而交於手少陰手少陰無支者直至本經少衝穴而交於手太陽手太陽之支者別頰上至目內眥而交於足太陽足太陽之支者從膊內左右別下合膕中下至小指外側端而交於足少陰足少陰之支者從肺出注胸中而交於手厥陰手厥陰之支者從掌中循小指次指出其端而交於手少陽手少陽之支者從耳後出至目鋭眥而交於足少陽足少陽之支者從跗上入大指爪甲出三毛而交於足厥陰足厥陰之支者從肝別貫膈上注肺入喉嚨之後上額循巔行督脈絡陰器過毛中行任脈入缺盆下注肺中而復交於手太陰也十二經脈起止歌經始太陰而厥陰最後穴先中府而終則期門原夫肺脈胸中始生出腋下而行於少商絡食指而接乎陽明大腸起自商陽終迎香於鼻外胃歷承泣而降尋厲兌於足經脾自足之隱白趨大包於腋下心由極泉而出注小指之少衝小腸兮起端於少澤維肩後上絡乎聽宮膀胱穴自睛明出至陰於足外腎以湧泉發脈通俞府於前胸心包起乳後之天池絡中衝於手中指三焦始名指之外側從關衝而絲竹空膽從童子髎穴連竅陰於足之四指肝因大敦而上至期門而復於太陰肺經周身經絡總訣有小序治病須分經絡古人以經界喻之猶夫射之的御之範也靈樞經脈一篇為我醫所必讀惟是其文參差繁復習者苦之東垣編為歌訣國朝汪訒庵更為諧暢可謂記誦無難矣惟是熟此經脈於逐經之起止循行雖已了了而人之身體每一處有兩三經或四五經錯綜循及者皆散見於各經之下臨證倉卒未免或遺茲不揣愚陋竊以人身自巔至足凡十二經絡行及之所匯而輯之再奇經八脈除帶脈及陰陽維蹺皆簡明易曉可無纂輯外其衝任督三經亦為摘入仿四六之體編為俚句而不拘拈對不嫌粗俗惟求便於記誦俾人之身體四肢一云某處便識為某經某絡實為臨證辨經分經議治之捷徑但不敢曰熟此總訣竟可置經文而不讀也譬之本草綱目既已按藥而治病復有本草類方為之按病以集方二者縱橫為用尤為心目瞭然耳頭上諸脈蓋聞手之三陰從臟走手手太陰肺少陰心厥陰心包手之三陽從手走頭手少陽三焦陽明大腸太陽小腸足之三陽從頭走足足太陽膀胱陽明胃少陽膽足之三陰從足走腹足太陰脾少陰腎厥陰肝靈已逐一而分言茲乃合編而便讀膀胱之脈交於巔肝與督脈會於巔絡腦須知膀督惟欲便於誦讀故用簡字訣余仿此髮際循乎胃脈胃至額顱髮際下為額顱膽抵頭額上額者督與膀胱在內直上出額者其惟肝脈在外直出目系連於肝脈心之支者並系目之內角名曰內眥小支至而膀胱起胃經遠約於其旁小腸之支者至目內眥膀胱之脈起於目內眥胃脈起於鼻之交頞中旁約太陽之脈下循鼻外約一作納目之外角名曰鋭眥膽接焦支三焦之支者至目鋭眥膽脈起於目鋭眥小腸亦至目下為䪼音拙焦膽小腸而合至三脈俱支者兩旁為頰大小肝焦而上下夾面橫骨為頰大腸貫頰小腸上頰肝與三焦俱下頰四脈亦俱支者小腸之支斜絡於顴督脈至於鼻柱胃脈起於交頞即山根大腸之支挾鼻孔而交中挾口從下齒還出挾口交人中左之右右之左上挾鼻孔至迎香穴而終交足陽明經胃經之脈循鼻外而挾口環唇肝又環於唇內胃又交於承漿下唇陷中胃經之脈入上齒大腸之支入下齒頷前大迎胃脈出而膽支下腮下為頷頷前一寸三分動脈陷中為大迎乃胃經穴頷下為頤胃脈循而任脈上胃脈循頤後下廉耳之上角焦支出而膀支至客主人穴膽出走而胃脈過耳前上廉起骨曰客主人乃膽經穴膽脈之支者出走耳前至目鋭眥後胃脈上耳前過客主人三焦之孫脈出走客主人前靈樞云經脈為里支而橫者為絡絡之別者為孫此支之岐者故曰孫脈後仿此小腸與焦膽三支併入耳中膽脈焦支繫於耳後膽支胃脈循在頰車耳下曲骨為夾車咽有小心脾腎之脈小腸脈循咽心脈之支者挾咽脾脈挾咽腎脈至咽喉為胃支腎脈之循二脈循喉嚨肝循喉後而入咽顙肝脈循喉嚨之後上入咽顙咽顙一名頏顙在上齶後脾連舌本而散舌下腎脈挾乎舌本胃支下在人迎結喉旁一寸五分動脈此為諸陽之會先須大略而陳在身諸脈原夫腦後為項膀胱督脈與焦支兩旁為頸大小腸支同膽脈肩髃骨之前廉大腸出之肩後之下為膊膀胱循也焦膽小腸交合於肩會於大椎者為肩腎經督脈並貫於脊脊骨兩旁第一行相去各一寸五分挾脊肉為膂膀胱循之而挾脊脊骨兩旁第二行相去各三寸成片骨為胛音夾小腸繞而膀支貫至於肩前陷下名曰缺盆焦膽胃腸併入其中是以膽脈循胸三焦布膻上焦兩乳中間為膻中乳內廉乃胃經直下腋之中分膽經包絡心包絡亦有直者支者之分恐辭句繁復故此處支者僅云包絡下文正脈乃用心包二字以別之腋下為包絡之過心直下而肺橫出脅裡為膽脈之循心包出而肝經布脅骨之下為季脅須識膽經之過臍下四寸為中極當知任脈之起任脈起於中極之下然而任脈當臍沖胃挾臍脾脈入腹胃支循腹肝脈上抵乎小腹膽胃出入於氣街臍下毛際兩旁動脈為氣街一名氣衝乃胃經穴膽繞毛際曲骨之外為毛際肝環陰器此在身軀之脈所當臚列而明臟腑中諸脈其在臟腑之脈太陽與少陰為表裡手太陽小腸少陰心足太陽膀胱少陰腎少陽與厥陰為表裡手少陽三焦厥陰心包足少陽膽厥陰肝陽明與太陰為表裡手陽明大腸太陰肺足陽明胃太陰脾凡此六經脈皆互絡手足同然無須詳贅如肺脈絡大腸大腸脈絡肺之類十二經皆仿此更有肺之一臟心直上而腎直入胃之一腑肝脈挾而肺小循肝脈挾胃肺脈還循胃口小腸之脈抵胃心有腎支之絡肝有腎經之貫肝支又注於心中肺脈自起於中焦心下有膈惟膀胱為無涉十有一經皆上下而貫之心下膈膜遮隔濁氣不使上薰心肺惟膀胱之脈挾脊抵腰中入循膂絡腎屬膀胱故不貫膈此屬臟腑之間並須熟諳者手經諸脈論乎肩肘之間乃號為臑音柔俗名大臂臑之內廉有三肺循前而心循後包絡恰循乎其間臑之外廉有三小循後而大循前三焦乃循乎其外臑下為肘三焦上貫內廉尺澤包絡入之包絡之支者入肘內陷中尺澤穴肺則下於內前心又下於內後肺脈下肘中心脈下肘內惟肺脈行前心脈行後心包行其中間為別小腸出於內側兩筋之間大腸入於外廉肘下為臂包仍在中即上文支者大循上而小循下心脈仍循內後廉上骨下廉之內仍循肺脈臂外兩骨之間還出三焦肺入寸口而循魚際關前動脈為寸口大指後肉隆起處為魚際魚際其間穴名心抵鋭骨而入後廉心脈抵掌後鋭骨之端入掌內後廉包絡直入於掌中從曲澤行掌後兩筋之間橫紋陷中入掌中三焦仍循乎表腕大腸出於合谷而上入兩筋之中合谷俗名虎口大腸經穴小腸循於外側而出腕下之踝循手外側上腕出踝中踝音華上聲腕外兌骨肺脈出於大指包絡出於中指次指為肺支腸脈之交肺脈之支者直出次指內廉出其端大腸之脈起於次指之端四指為包絡焦脈之接三焦又上出小次之間小指為心脈小腸之接所謂手經大略如斯足經諸脈至如尻上為腰膀胱脈抵背脊下橫骨為腰腰下為臀膀支貫之兩旁捷骨之下名髀樞而膽橫膀過一名髀厭膽脈橫入髀厭中膀胱之支者過脾樞前面氣街之下號髀關而胃經直下股之內廉前廉脾而後廉腎又肝脈內循於股陰股外為髀後膀支而前胃脈髀前膝上六寸起肉為伏兔胃脈抵之又膽脈下循於髀陽循髀外行太陽陽明之間是以挾膝筋中為臏即膝蓋骨仍屬胃經之直下而膝內脾經內前廉膝外膽脈外廉膝後曲處為膕還是膀支之直入而腎出肝上俱在內廉腎脈出膕內廉肝脈上膕內廉脾腎上於腨內腨足肚也二豚上腨內廉旁支貫於腨外從膕中下貫腨內出外踝之後膽下於外輔骨前而直抵絶骨之端脾骨為輔骨外踝上為絶骨肝斜於脛胻內側而胃循脛外之廉內踝有脾前腎後之分外踝有膽前膀後之別跟上兩旁內外曰踝大指節後為核骨脾經脈過足外側骨為京骨膀脈支循腎入跟中胃膽循跗跗上廉乃肝經循處足心中有腎脈斜趨湧泉穴大指甲後屬膽支肝脈之交大指內側為胃支脾脈之接中指內外分胃直胃支之入四指之間又膽經直入而終膀支至於小指之外腎脈起於小指之下足經之脈又如此也五周身孔穴總圖六十二經孔穴圖及歌括一手太陰肺經穴圖及歌括肺經諸穴歌手太陰十一穴中府雲門天府列俠白下尺澤孔最見列缺經渠太淵下魚際抵指少商如韭葉古離爪甲如韭今如米許肺經穴分寸歌太陰肺兮出中府雲門之下一寸許雲門璇璣旁六寸巨骨之下二骨數天府腋下三寸求俠白肘上五寸主尺澤肘中約橫紋孔最腕上七寸取列缺腕側一寸半經渠寸口陷中主太淵掌後橫紋頭魚際節後散脈舉少商大指端內側相去爪甲韭葉許雲門巨骨下俠氣戶旁二寸陷中去中行任脈六寸氣戶巨骨下俞府